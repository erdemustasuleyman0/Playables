<!DOCTYPE html>
<html lang="en">
<head>
<script src="mraid.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Match Villains</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: center;
}
#wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
}
#iq-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  width: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
#iq-bar-outer {
  flex: 1;
  height: 18px;
  background: #333;
  border-radius: 9px;
  overflow: hidden;
  position: relative;
}
#iq-bar-inner {
  height: 100%;
  border-radius: 9px;
  background: linear-gradient(90deg, #ff3333, #ffdd33, #33ff57);
  transition: width 0.3s ease;
}
#iq-label {
  color: #fff;
  font-size: 16px;
  font-weight: 800;
  white-space: nowrap;
  min-width: 70px;
  text-align: right;
}
#brain-icon {
  font-size: 28px;
  line-height: 1;
  transition: font-size 0.3s ease;
}
@keyframes brain-shake {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  10% { transform: translate(-3px, -2px) rotate(-8deg); }
  20% { transform: translate(3px, 2px) rotate(8deg); }
  30% { transform: translate(-3px, 1px) rotate(-6deg); }
  40% { transform: translate(3px, -1px) rotate(6deg); }
  50% { transform: translate(-2px, 2px) rotate(-4deg); }
  60% { transform: translate(2px, -2px) rotate(4deg); }
  70% { transform: translate(-1px, 1px) rotate(-2deg); }
  80% { transform: translate(1px, -1px) rotate(2deg); }
  90% { transform: translate(0, 0) rotate(0deg); }
}
#brain-icon.shake {
  animation: brain-shake 0.6s ease-in-out;
}
canvas {
  display: block;
}
#endcard {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(43, 43, 61, 0.92);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  opacity: 0;
  transition: opacity 0.5s ease-in;
}
#endcard.show { opacity: 1; }
#endcard-character { width: 120px; height: auto; }
#endcard-title {
  font-size: 26px; font-weight: 800; color: #fff;
  text-align: center; line-height: 1.3;
}
#endcard-title span { color: #e84393; }
#endcard-subtitle {
  font-size: 16px; color: rgba(255,255,255,0.7); text-align: center;
}
#cta-btn {
  background: #e84393; color: #fff; border: none;
  border-radius: 16px; padding: 16px 44px;
  font-family: inherit; font-size: 20px; font-weight: 800;
  cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
  animation: pulse 1.5s ease-in-out infinite;
  -webkit-tap-highlight-color: transparent;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
</style>
</head>

      ...a,

      exited: false,
      animatingOut: false,
      bumping: false,
      blocked: false
    }); });
    displayPos = arrows.map(function(a) { return a.cells.map(function(c) { return ({...c}); }); });
    assignArrowColors();

  }

  // --- Logic ---
  // Viktor's zone (cols 4-8, rows 7-15) acts as a blocker
  var VZONE = { x0: 5, y0: 8, x1: 7, y1: 14 };         // inner blocker
  var VZONE_VIS = { x0: 4, y0: 7, x1: 8, y1: 15 };    // full visual zone (for dots/drawing)

  function isBlockedByOther(cell, selfId) {
    // Viktor blocks
    if (cell.x >= VZONE.x0 && cell.x <= VZONE.x1 &&
        cell.y >= VZONE.y0 && cell.y <= VZONE.y1) return true;
    for (var a of arrows) {
      if (a.id === selfId || a.exited) continue;
      for (var c of a.cells) {
        if (c.x === cell.x && c.y === cell.y && onGrid(c)) return true;
      }
    }
    return false;
  }

  function allOffGrid(a) { return a.cells.every(function(c) { return !onGrid(c); }); }

  function stepArrow(arrow) {
    var head = arrow.cells[arrow.cells.length - 1];
    var nh = { x: head.x + arrow.dir.x, y: head.y + arrow.dir.y };
    if (isBlockedByOther(nh, arrow.id)) return false;
    for (var i = 0; i < arrow.cells.length - 1; i++) {
      arrow.cells[i].x = arrow.cells[i + 1].x;
      arrow.cells[i].y = arrow.cells[i + 1].y;
    }
    arrow.cells[arrow.cells.length - 1] = nh;
    return true;
  }

  // --- Animation ---
  function snapDisplay(ai) {
    displayPos[ai] = arrows[ai].cells.map(function(c) { return ({...c}); });
  }

  function animateBump(ai) {
    var arrow = arrows[ai];
    arrow.bumping = true;
    arrow.blocked = true;
    playBump();
    var BUMP = 0.1;
    var prev = displayPos[ai].map(function(c) { return ({...c}); });
    var bumped = prev.map(function(c) { return ({
      x: c.x + arrow.dir.x * BUMP,
      y: c.y + arrow.dir.y * BUMP
    }); });
    var DUR = 200;
    var start = performance.now();

    function tick() {
      var elapsed = performance.now() - start;
      var t = Math.min(1, elapsed / DUR);
      var v = Math.sin(t * Math.PI);
      for (var i = 0; i < prev.length; i++) {
        displayPos[ai][i] = {
          x: prev[i].x + (bumped[i].x - prev[i].x) * v,
          y: prev[i].y + (bumped[i].y - prev[i].y) * v
        };
      }
      draw();
      if (t >= 1) {

      } else {

      }

    requestAnimationFrame(tick);

  // Check if arrow can fully exit: simulate all steps.
  // Returns keyframes array if it can exit, or null if blocked.
  function canFullyExit(ai) {
    var arrow = arrows[ai];
    var saved = arrow.cells.map(function(c) { return ({...c}); });

    var keyframes = [arrow.cells.map(function(c) { return ({...c}); })];
    var exited = false;
    while (true) {
      var moved = stepArrow(arrow);
      if (!moved) break;
      keyframes.push(arrow.cells.map(function(c) { return ({...c}); }));
      if (allOffGrid(arrow)) { exited = true; break; }
    }

    // Restore arrow to original position
    arrow.cells = saved;

    return exited ? keyframes : null;
  }

  // --- Rail-based animation (grid-aligned, no diagonal movement) ---

  // Build a rail: polyline of corner waypoints the snake slides along.
  // Returns { waypoints, arcLens, bodyLen, initialHeadArc }
  function buildRail(ai) {
    var arrow = arrows[ai];
    var cells = arrow.cells;
    var n = cells.length;

    // Step 1: Extract corner waypoints from cells (collapse collinear runs)
    var wp = [{ x: cells[0].x, y: cells[0].y }];
    for (var i = 1; i < n; i++) {
      var prev = wp[wp.length - 1];
      var curr = cells[i];
      if (i < n - 1) {
        var next = cells[i + 1];
        var d1x = Math.sign(curr.x - prev.x), d1y = Math.sign(curr.y - prev.y);
        var d2x = Math.sign(next.x - curr.x), d2y = Math.sign(next.y - curr.y);
        if (d1x !== d2x || d1y !== d2y) {
          wp.push({ x: curr.x, y: curr.y }); // direction changes here — corner
        }
      } else {
        wp.push({ x: curr.x, y: curr.y }); // always include last cell
      }
    }

    // Step 2: Extend rail from head in exit direction
    var last = wp[wp.length - 1];
    var ext = n + Math.max(COLS, ROWS);
    wp.push({ x: last.x + arrow.dir.x * ext, y: last.y + arrow.dir.y * ext });

    // Step 3: Compute cumulative arc lengths (in grid units)
    var al = [0];
    for (var i = 1; i < wp.length; i++) {
      var dx = Math.abs(wp[i].x - wp[i - 1].x);
      var dy = Math.abs(wp[i].y - wp[i - 1].y);
      al.push(al[i - 1] + dx + dy);
    }

    return {
      waypoints: wp,
      arcLens: al,
      bodyLen: n - 1,                 // in grid cells
      initialHeadArc: n - 1           // head starts (n-1) cells from tail along rail
    };
  }

  // Sample a position on the rail at arc distance d (grid units).
  function sampleRail(wp, al, d) {
    if (d <= 0) return { x: wp[0].x, y: wp[0].y };
    for (var i = 1; i < al.length; i++) {
      if (d <= al[i]) {
        var segLen = al[i] - al[i - 1];
        var t = segLen > 0 ? (d - al[i - 1]) / segLen : 0;
        return {
          x: wp[i - 1].x + (wp[i].x - wp[i - 1].x) * t,
          y: wp[i - 1].y + (wp[i].y - wp[i - 1].y) * t
        };
      }
    }
    var last = wp[wp.length - 1];
    return { x: last.x, y: last.y };
  }

  // Get the complete grid-aligned polyline from tailArc to headArc.
  // Includes intermediate corner waypoints so rendering never diagonals.
  function getDisplayPath(wp, al, tailArc, headArc) {
    var path = [];
    path.push(sampleRail(wp, al, tailArc));
    // Add all corner waypoints between tail and head
    for (var i = 0; i < al.length; i++) {
      if (al[i] > tailArc + 0.001 && al[i] < headArc - 0.001) {
        path.push({ x: wp[i].x, y: wp[i].y });
      }
    }
    path.push(sampleRail(wp, al, headArc));
    return path;
  }

  // Animate exit by sliding along the rail. Ease-in then cruise (30% faster).
  function animateExit(ai, rail, totalSteps, cb) {
    var arrow = arrows[ai];
    var { waypoints: wp, arcLens: al, bodyLen, initialHeadArc } = rail;
    var CRUISE_MS = 70;
    var EASE_IN_MS = 112;
    var start = performance.now();

    function tick() {
      var elapsed = performance.now() - start;

      // Map elapsed time → distance (in grid cells)
      var dist;
      if (totalSteps === 1) {
        var t = Math.min(1, elapsed / EASE_IN_MS);
        dist = t * t;
      } else {
        if (elapsed <= EASE_IN_MS) {
          var t = elapsed / EASE_IN_MS;
          dist = t * t;
        } else {
          dist = 1 + (elapsed - EASE_IN_MS) / CRUISE_MS;
        }
      }
      dist = Math.min(dist, totalSteps);

      var headArc = initialHeadArc + dist;
      var tailArc = headArc - bodyLen;
      displayPos[ai] = getDisplayPath(wp, al, tailArc, headArc);
      draw();

      if (dist >= totalSteps) {
        arrow.animatingOut = false;
        draw();
        if (cb) cb();
        return;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

    arrowColorMap = {};
    for (var i = 0; i < arrows.length; i++) {
      if (!arrows[i].color) {
        arrowColorMap[arrows[i].id] = ARROW_COLORS[i % ARROW_COLORS.length];
      }
    }
  }
  var COL_BLOCKED = '#ff4444';
  var COL_EXIT = '#ffffff';

  function getArrowColor(arrow) {
    if (arrow.animatingOut) return COL_EXIT;
    if (arrow.blocked) return COL_BLOCKED;
    if (arrow.color) return arrow.color;
    return arrowColorMap[arrow.id] || '#ff3333';
  }

  function drawDots() {
    ctx.fillStyle = '#333';
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        // Never draw dots in Viktor zone
        if (c >= VZONE_VIS.x0 && c <= VZONE_VIS.x1 && r >= VZONE_VIS.y0 && r <= VZONE_VIS.y1) continue;
        // Only draw dot if no active arrow occupies this cell
        var occupied = false;
        for (var a of arrows) {
          if (a.exited) continue;
          for (var cell of a.cells) {
            if (cell.x === c && cell.y === r && onGrid(cell)) { occupied = true; break; }
          }
          if (occupied) break;
        }
        if (occupied) continue;
        var p = g2p(c, r);
        ctx.beginPath();
        ctx.arc(p.x, p.y, DOT_R, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawArrow(ai) {
    var arrow = arrows[ai];
    if (arrow.exited && !arrow.animatingOut) return;
    var pos = displayPos[ai];
    if (!pos || pos.length === 0) return;

    ctx.save();
    ctx.beginPath();
    ctx.rect(PAD - 2, PAD - 2, COLS * CELL + 4, ROWS * CELL + 4);
    ctx.clip();

    var color = getArrowColor(arrow);
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = THICKNESS;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Draw the body as a connected path (tail to neck)
    var pts = pos.map(function(p) { return g2p(p.x, p.y); });

    if (pts.length > 1) {
      // Body line: from tail to the cell before head
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (var i = 1; i < pts.length; i++) {
        ctx.lineTo(pts[i].x, pts[i].y);
      }
      ctx.stroke();
    }

    // Draw arrowhead at the head
    var head = pts[pts.length - 1];
    var dir = arrow.dir;
    var tipX = head.x + dir.x * HEAD_LEN;
    var tipY = head.y + dir.y * HEAD_LEN;
    var baseX = head.x - dir.x * 2;
    var baseY = head.y - dir.y * 2;
    var perpX = -dir.y;
    var perpY = dir.x;

    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(baseX + perpX * HEAD_W / 2, baseY + perpY * HEAD_W / 2);
    ctx.lineTo(baseX - perpX * HEAD_W / 2, baseY - perpY * HEAD_W / 2);
    ctx.closePath();
    ctx.fill();

    // Small tail cap (rounded end is already handled by lineCap)

    ctx.restore();
  }

  function drawViktor() {
    if (!viktorImg.complete || !viktorImg.naturalWidth) return;
    // Center in the empty zone: cols 4-8, rows 7-15
    var zoneX = PAD + 4 * CELL;
    var zoneY = PAD + 7 * CELL;
    var zoneW = 5 * CELL;
    var zoneH = 9 * CELL;
    var cx = zoneX + zoneW / 2;
    var cy = zoneY + zoneH / 2;
    // Fit image within zone, scaled up 20%
    var maxW = zoneW * 1.2;
    var maxH = zoneH * 1.2;
    var scale = Math.min(maxW / viktorImg.naturalWidth, maxH / viktorImg.naturalHeight);
    var w = viktorImg.naturalWidth * scale;
    var h = viktorImg.naturalHeight * scale;
    // Idle animation: gentle bob + breathing scale + slight tilt
    var t = performance.now() / 1000;
    var bobY = Math.sin(t * 1.8) * 3;              // float up/down 3px
    var breath = 1 + Math.sin(t * 2.2) * 0.015;    // 1.5% scale pulse
    var tilt = Math.sin(t * 1.1) * 0.02;            // tiny sway ~1 degree

    ctx.save();
    ctx.translate(cx, cy + bobY);
    ctx.rotate(tilt);
    ctx.scale(breath, breath);
    ctx.drawImage(viktorImg, -w / 2, -h / 2, w, h);
    ctx.restore();
  }

  function drawFinger() {
    if (!fingerVisible || !fingerImg.complete || !fingerImg.naturalWidth) return;
    var arrow = arrows[fingerTargetAi];
    if (!arrow || arrow.exited) { pickFingerTarget(); return; }

    // Finger size: 35% of Viktor's rendered height (30% smaller than before)
    var viktorMaxH = 9 * CELL * 1.2;
    var fingerMaxH = viktorMaxH * 0.35;
    var fScale = fingerMaxH / fingerImg.naturalHeight;
    var fw = fingerImg.naturalWidth * fScale;
    var fh = fingerImg.naturalHeight * fScale;

    // Arrow tip position (the actual arrowhead point, not just cell center)
    var head = arrow.cells[arrow.cells.length - 1];
    var hp = g2p(head.x, head.y);
    var tipX = hp.x + arrow.dir.x * HEAD_LEN;
    var tipY = hp.y + arrow.dir.y * HEAD_LEN;

    // Tap animation: press down and back (1s cycle)
    var elapsed = performance.now() - fingerAnimStart;
    var cycle = (elapsed % 1000) / 1000;
    // 0-0.3: press down, 0.3-0.5: hold, 0.5-0.8: release, 0.8-1: idle
    var press = 0;
    if (cycle < 0.3) press = cycle / 0.3;
    else if (cycle < 0.5) press = 1;
    else if (cycle < 0.8) press = 1 - (cycle - 0.5) / 0.3;
    var pressOffset = press * 4; // 4px press distance
    var scaleAnim = 1 - press * 0.08; // slight shrink on press

    // Position: fingertip (~28% from left, ~5% from top of image) at arrow tip
    var tipOffX = 0.28 * fw;
    var tipOffY = 0.05 * fh;
    var drawX = tipX - tipOffX + pressOffset * 0.7;
    var drawY = tipY - tipOffY + pressOffset;

    ctx.save();
    ctx.translate(drawX + fw * 0.28, drawY + fh * 0.05);
    ctx.scale(scaleAnim, scaleAnim);
    ctx.translate(-(drawX + fw * 0.28), -(drawY + fh * 0.05));
    ctx.drawImage(fingerImg, drawX, drawY, fw, fh);
    ctx.restore();
  }

  // --- Confetti system ---
  function spawnConfetti() {
    var colors = ['#e84393', '#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#fff'];
    var cx = W / 2;
    var cy = H / 2;
    for (var i = 0; i < 80; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 2 + Math.random() * 5;
      confetti.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 3,
        size: 3 + Math.random() * 5,
        color: colors[Math.floor(Math.random() * colors.length)],
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.3,
        life: 1.0,
        decay: 0.008 + Math.random() * 0.008
      });
    }
  }

  function updateAndDrawConfetti() {
    for (var i = confetti.length - 1; i >= 0; i--) {
      var p = confetti[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.rotation += p.rotSpeed;
      p.life -= p.decay;
      if (p.life <= 0) { confetti.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    }
  }

  // --- Screen flash (white — win) ---
  function triggerFlash() { flashAlpha = 0.7; }

  function updateAndDrawFlash() {
    if (flashAlpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    flashAlpha = Math.max(0, flashAlpha - 0.03);
  }

  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    drawDots();
    drawViktor();
    for (var i = 0; i < arrows.length; i++) drawArrow(i);
    if (!gameWon) drawFinger();
    updateAndDrawConfetti();
    updateAndDrawFlash();
  }

  // --- Input ---
  function hitTest(px, py) {
    var gx = (px - PAD) / CELL;
    var gy = (py - PAD) / CELL;
    for (var ai = 0; ai < arrows.length; ai++) {
      var arrow = arrows[ai];
      if (arrow.exited) continue;
      for (var c of arrow.cells) {
        if (!onGrid(c)) continue;
        if (Math.abs(gx - (c.x + 0.5)) < 0.5 && Math.abs(gy - (c.y + 0.5)) < 0.5) {
          return ai;
        }
      }
    }
    return -1;
  }

  canvas.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    hideFinger();
    var rect = canvas.getBoundingClientRect();
    var px = (e.clientX - rect.left) * (W / rect.width);
    var py = (e.clientY - rect.top) * (H / rect.height);
    var hit = hitTest(px, py);
    if (hit >= 0) tapArrow(hit);
  });

  reset();
  // Start finger animation on load
  pickFingerTarget();

  // Persistent animation loop (drives Viktor idle + finger)
  function gameLoop() {
    draw();
    requestAnimationFrame(gameLoop);
  }
  gameLoop();

  return { arrows, tapArrow, reset, triggerWin };
})();
</script>
</body>
</html>
