  catch(e) { window.open(storeUrl, '_blank'); }

var tapCount = 0;
var G = (function() {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');

  // --- Web Audio SFX ---
  var audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playSwoosh() {
    var dur = 0.25;
    var bufSize = audioCtx.sampleRate * dur;
    var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) {
      var t = i / audioCtx.sampleRate;
      var env = Math.exp(-t * 12) * 0.4;
      data[i] = (Math.random() * 2 - 1) * env;
    }
    var src = audioCtx.createBufferSource();
    src.buffer = buf;
    var bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.setValueAtTime(2000, audioCtx.currentTime);
    bp.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + dur);
    bp.Q.value = 0.8;
    var gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    src.connect(bp).connect(gain).connect(audioCtx.destination);
    src.start();
  }

  function playBump() {
    var dur = 0.15;
    var osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + dur);
    var gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  }

  var COLS = 13, ROWS = 22, CELL = 28, PAD = 14, DOT_R = 2;
  var W = COLS * CELL + PAD * 2;
  var H = ROWS * CELL + PAD * 2;
  var dpr = window.devicePixelRatio || 1;

  ctx.scale(dpr, dpr);

  function g2p(gx, gy) {
    return { x: PAD + gx * CELL + CELL / 2, y: PAD + gy * CELL + CELL / 2 };

  function onGrid(c) {
    return c.x >= 0 && c.x < COLS && c.y >= 0 && c.y < ROWS;

    { id:27, cells:[{x:7,y:20},{x:8,y:20},{x:8,y:19},{x:9,y:19},{x:10,y:19}], dir:{x:1,y:0} },
    { id:28, cells:[{x:10,y:18},{x:11,y:18},{x:11,y:19},{x:11,y:20}], dir:{x:0,y:1} },
    // === NEW — Area 1: top-left fill (rows 0-6) ===
    { id:29, cells:[{x:0,y:6},{x:0,y:5},{x:0,y:4},{x:0,y:3},{x:0,y:2},{x:0,y:1},{x:0,y:0}], dir:{x:0,y:-1} },
    { id:30, cells:[{x:5,y:0},{x:4,y:0},{x:3,y:0},{x:2,y:0},{x:1,y:0}], dir:{x:-1,y:0} },
    { id:31, cells:[{x:6,y:0},{x:6,y:1},{x:6,y:2},{x:5,y:2},{x:5,y:1}], dir:{x:0,y:-1} },
    { id:32, cells:[{x:1,y:3},{x:1,y:2}], dir:{x:0,y:-1} },
    // === NEW — Area 2: top-right fill (rows 0-5) ===
    { id:33, cells:[{x:12,y:5},{x:12,y:4},{x:12,y:3},{x:12,y:2},{x:12,y:1},{x:12,y:0}], dir:{x:0,y:-1} },
    { id:34, cells:[{x:8,y:2},{x:8,y:1},{x:8,y:0},{x:9,y:0},{x:10,y:0},{x:11,y:0}], dir:{x:1,y:0} },
    { id:35, cells:[{x:10,y:2},{x:11,y:2}], dir:{x:1,y:0} },
    // === NEW — Area 3: small 2x2 block (rows 4-5) ===
    { id:36, cells:[{x:2,y:4},{x:3,y:4},{x:3,y:5},{x:2,y:5}], dir:{x:-1,y:0} },
    // === NEW — Area 4: middle rows 4-6 ===
    { id:37, cells:[{x:6,y:4},{x:7,y:4},{x:7,y:5},{x:7,y:6},{x:8,y:6},{x:9,y:6},{x:10,y:6},{x:11,y:6}], dir:{x:1,y:0} },
    { id:38, cells:[{x:5,y:6},{x:6,y:6}], dir:{x:1,y:0} },
    // === NEW — Area 5: (rows 4) ===
    { id:39, cells:[{x:9,y:4},{x:10,y:4}], dir:{x:1,y:0} },
    // === NEW — Area 6: left-side rows 7-8 ===
    { id:40, cells:[{x:2,y:7},{x:2,y:8},{x:1,y:8},{x:1,y:7}], dir:{x:0,y:-1} },
    // === NEW — Area 8: left-side row 10 ===
    { id:41, cells:[{x:3,y:10},{x:2,y:10}], dir:{x:-1,y:0} },
    // === NEW — Area 9: left col 0 rows 11-15 ===
    { id:42, cells:[{x:0,y:15},{x:0,y:14},{x:0,y:13},{x:0,y:12},{x:0,y:11}], dir:{x:0,y:-1} },
    // === NEW — Area 12: bottom-right + row 21 ===
    { id:43, cells:[{x:10,y:15},{x:11,y:15},{x:12,y:15}], dir:{x:1,y:0} },
    { id:44, cells:[{x:9,y:16},{x:10,y:16},{x:11,y:16},{x:12,y:16},{x:12,y:17},{x:12,y:18},{x:12,y:19},{x:12,y:20}], dir:{x:0,y:1} },
    { id:45, cells:[{x:0,y:19},{x:0,y:18},{x:0,y:17}], dir:{x:0,y:-1} },
    { id:46, cells:[{x:4,y:20},{x:3,y:20},{x:2,y:20},{x:1,y:20},{x:0,y:20}], dir:{x:-1,y:0} },
    { id:47, cells:[{x:9,y:20},{x:10,y:20}], dir:{x:1,y:0} },
    { id:48, cells:[{x:5,y:21},{x:4,y:21},{x:3,y:21},{x:2,y:21},{x:1,y:21},{x:0,y:21}], dir:{x:-1,y:0} },
    { id:49, cells:[{x:8,y:21},{x:7,y:21},{x:6,y:21}], dir:{x:-1,y:0} },
    { id:50, cells:[{x:9,y:21},{x:10,y:21},{x:11,y:21},{x:12,y:21}], dir:{x:1,y:0} },
    // === NEW — Area 14: middle-bottom rows 17-18 ===
    { id:51, cells:[{x:5,y:17},{x:4,y:17},{x:3,y:17},{x:3,y:18}], dir:{x:0,y:1} },
    // === NEW — Area 15: middle-bottom rows 18-19 ===
    { id:52, cells:[{x:7,y:18},{x:7,y:19},{x:6,y:19}], dir:{x:-1,y:0} },
    // === Area: right-side rows 13-14 ===
    { id:53, cells:[{x:12,y:13},{x:12,y:14}], dir:{x:0,y:1} },

  var arrows = [];
  var displayPos = [];

  function reset() {
    arrows = INITIAL.map(function(a) { return ({
      ...a,
      cells: a.cells.map(function(c) { return ({...c}); }),
      exited: false,
      animatingOut: false,
      bumping: false,
      blocked: false
    }); });
    displayPos = arrows.map(function(a) { return a.cells.map(function(c) { return ({...c}); }); });
    draw();
  }

  // --- Logic ---
  // Viktor's zone (cols 4-8, rows 7-15) acts as a blocker
  var VZONE = { x0: 4, y0: 7, x1: 8, y1: 15 };

  function isBlockedByOther(cell, selfId) {
    // Viktor blocks
    if (cell.x >= VZONE.x0 && cell.x <= VZONE.x1 &&
        cell.y >= VZONE.y0 && cell.y <= VZONE.y1) return true;
    for (var a of arrows) {
      if (a.id === selfId || a.exited) continue;
      for (var c of a.cells) {
        if (c.x === cell.x && c.y === cell.y && onGrid(c)) return true;
      }
    }
    return false;
  }

  function allOffGrid(a) { return a.cells.every(function(c) { return !onGrid(c); }); }

  function stepArrow(arrow) {
    var head = arrow.cells[arrow.cells.length - 1];
    var nh = { x: head.x + arrow.dir.x, y: head.y + arrow.dir.y };
    if (isBlockedByOther(nh, arrow.id)) return false;
    for (var i = 0; i < arrow.cells.length - 1; i++) {
      arrow.cells[i].x = arrow.cells[i + 1].x;
      arrow.cells[i].y = arrow.cells[i + 1].y;
    }
    arrow.cells[arrow.cells.length - 1] = nh;
    return true;
  }

  // --- Animation ---
  function snapDisplay(ai) {
    displayPos[ai] = arrows[ai].cells.map(function(c) { return ({...c}); });
  }

  // Bump animation (blocked)
  function animateBump(ai) {
    var arrow = arrows[ai];
    arrow.bumping = true;
    arrow.blocked = true;
    playBump();
    var BUMP = 0.1;
    var prev = displayPos[ai].map(function(c) { return ({...c}); });
    var bumped = prev.map(function(c) { return ({
      x: c.x + arrow.dir.x * BUMP,
      y: c.y + arrow.dir.y * BUMP
    }); });
    var DUR = 200;
    var start = performance.now();

    function tick() {
      var elapsed = performance.now() - start;
      var t = Math.min(1, elapsed / DUR);
      var v = Math.sin(t * Math.PI);
      for (var i = 0; i < prev.length; i++) {
        displayPos[ai][i] = {
          x: prev[i].x + (bumped[i].x - prev[i].x) * v,
          y: prev[i].y + (bumped[i].y - prev[i].y) * v
        };
      }
      draw();
      if (t >= 1) {
        snapDisplay(ai);
        arrow.bumping = false;
      } else {
        requestAnimationFrame(tick);
      }
    }
    requestAnimationFrame(tick);
  }

  // Check if arrow can fully exit: simulate all steps.
  // Returns keyframes array if it can exit, or null if blocked.
  function canFullyExit(ai) {
    var arrow = arrows[ai];
    var saved = arrow.cells.map(function(c) { return ({...c}); });

    var keyframes = [arrow.cells.map(function(c) { return ({...c}); })];
    var exited = false;
    while (true) {
      var moved = stepArrow(arrow);
      if (!moved) break;
      keyframes.push(arrow.cells.map(function(c) { return ({...c}); }));
      if (allOffGrid(arrow)) { exited = true; break; }
    }

    // Restore arrow to original position
    arrow.cells = saved;

    return exited ? keyframes : null;
  }

  // --- Rail-based animation (grid-aligned, no diagonal movement) ---

  // Build a rail: polyline of corner waypoints the snake slides along.
  // Returns { waypoints, arcLens, bodyLen, initialHeadArc }
  function buildRail(ai) {
    var arrow = arrows[ai];
    var cells = arrow.cells;
    var n = cells.length;

    // Step 1: Extract corner waypoints from cells (collapse collinear runs)
    var wp = [{ x: cells[0].x, y: cells[0].y }];
    for (var i = 1; i < n; i++) {
      var prev = wp[wp.length - 1];
      var curr = cells[i];
      if (i < n - 1) {
        var next = cells[i + 1];
        var d1x = Math.sign(curr.x - prev.x), d1y = Math.sign(curr.y - prev.y);
        var d2x = Math.sign(next.x - curr.x), d2y = Math.sign(next.y - curr.y);
        if (d1x !== d2x || d1y !== d2y) {
          wp.push({ x: curr.x, y: curr.y }); // direction changes here — corner
        }
      } else {
        wp.push({ x: curr.x, y: curr.y }); // always include last cell
      }
    }

    // Step 2: Extend rail from head in exit direction
    var last = wp[wp.length - 1];
    var ext = n + Math.max(COLS, ROWS);
    wp.push({ x: last.x + arrow.dir.x * ext, y: last.y + arrow.dir.y * ext });

    // Step 3: Compute cumulative arc lengths (in grid units)
    var al = [0];
    for (var i = 1; i < wp.length; i++) {
      var dx = Math.abs(wp[i].x - wp[i - 1].x);
      var dy = Math.abs(wp[i].y - wp[i - 1].y);
      al.push(al[i - 1] + dx + dy);
    }

    return {
      waypoints: wp,
      arcLens: al,
      bodyLen: n - 1,                 // in grid cells
      initialHeadArc: n - 1           // head starts (n-1) cells from tail along rail
    };
  }

  // Sample a position on the rail at arc distance d (grid units).
  function sampleRail(wp, al, d) {
    if (d <= 0) return { x: wp[0].x, y: wp[0].y };
    for (var i = 1; i < al.length; i++) {
      if (d <= al[i]) {
        var segLen = al[i] - al[i - 1];
        var t = segLen > 0 ? (d - al[i - 1]) / segLen : 0;
        return {
          x: wp[i - 1].x + (wp[i].x - wp[i - 1].x) * t,
          y: wp[i - 1].y + (wp[i].y - wp[i - 1].y) * t
        };
      }
    }
    var last = wp[wp.length - 1];
    return { x: last.x, y: last.y };
  }

  // Get the complete grid-aligned polyline from tailArc to headArc.
  // Includes intermediate corner waypoints so rendering never diagonals.
  function getDisplayPath(wp, al, tailArc, headArc) {
    var path = [];
    path.push(sampleRail(wp, al, tailArc));
    // Add all corner waypoints between tail and head
    for (var i = 0; i < al.length; i++) {
      if (al[i] > tailArc + 0.001 && al[i] < headArc - 0.001) {
        path.push({ x: wp[i].x, y: wp[i].y });
      }
    }
    path.push(sampleRail(wp, al, headArc));
    return path;
  }

  // Animate exit by sliding along the rail. Ease-in then cruise (30% faster).
  function animateExit(ai, rail, totalSteps, cb) {
    var arrow = arrows[ai];
    var { waypoints: wp, arcLens: al, bodyLen, initialHeadArc } = rail;
    var CRUISE_MS = 70;
    var EASE_IN_MS = 112;
    var start = performance.now();

    function tick() {
      var elapsed = performance.now() - start;

      // Map elapsed time → distance (in grid cells)
      var dist;
      if (totalSteps === 1) {
        var t = Math.min(1, elapsed / EASE_IN_MS);
        dist = t * t;
      } else {
        if (elapsed <= EASE_IN_MS) {
          var t = elapsed / EASE_IN_MS;
          dist = t * t;
        } else {
          dist = 1 + (elapsed - EASE_IN_MS) / CRUISE_MS;
        }
      }
      dist = Math.min(dist, totalSteps);

      var headArc = initialHeadArc + dist;
      var tailArc = headArc - bodyLen;
      displayPos[ai] = getDisplayPath(wp, al, tailArc, headArc);
      draw();

      if (dist >= totalSteps) {
        arrow.animatingOut = false;
        draw();
        if (cb) cb();
        return;
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function tapArrow(ai) {
    var arrow = arrows[ai];
    if (arrow.exited || arrow.bumping) return;

    var keyframes = canFullyExit(ai);
    if (!keyframes) {
      animateBump(ai);
      return;
    }

    // Immediately mark as exited so it no longer blocks others
    arrow.exited = true;
    arrow.animatingOut = true;
    tapCount++;
    playSwoosh();

    // Build rail and animate along it
    var rail = buildRail(ai);
    var totalSteps = keyframes.length - 1;
    animateExit(ai, rail, totalSteps);
    if(tapCount >= 5) { goToStore(); }
  }

  var fingerVisible = true;

  var fingerAnimStart = performance.now();
  var idleTimer = null;
  var IDLE_DELAY = 2500;

  function pickFingerTarget() {
    // Pick a random non-exited arrow
    var available = [];
    for (var i = 0; i < arrows.length; i++) {
      if (!arrows[i].exited) available.push(i);
    }
    if (available.length === 0) return;
    fingerTargetAi = available[Math.floor(Math.random() * available.length)];
  }

  function showFinger() {
    pickFingerTarget();
    fingerVisible = true;
    fingerAnimStart = performance.now();
    draw();
    runFingerAnim();
  }

  function hideFinger() {
    fingerVisible = false;
    draw();
    if (idleTimer) clearTimeout(idleTimer);
    idleTimer = setTimeout(showFinger, IDLE_DELAY);
  }

  var fingerAnimId = null;
  function runFingerAnim() {
    if (!fingerVisible) { fingerAnimId = null; return; }
    draw();
    fingerAnimId = requestAnimationFrame(runFingerAnim);
  }

  function getArrowColor(arrow) {
    if (arrow.animatingOut) return COL_EXIT;
    if (arrow.blocked) return COL_BLOCKED;
    return COL_DEFAULT;
  }

  function drawDots() {
    ctx.fillStyle = '#ccc';
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        // Never draw dots in Viktor zone
        if (c >= VZONE.x0 && c <= VZONE.x1 && r >= VZONE.y0 && r <= VZONE.y1) continue;
        // Only draw dot if no active arrow occupies this cell
        var occupied = false;
        for (var a of arrows) {
          if (a.exited) continue;
          for (var cell of a.cells) {
            if (cell.x === c && cell.y === r && onGrid(cell)) { occupied = true; break; }
          }
          if (occupied) break;
        }
        if (occupied) continue;
        var p = g2p(c, r);
        ctx.beginPath();
        ctx.arc(p.x, p.y, DOT_R, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawArrow(ai) {
    var arrow = arrows[ai];
    if (arrow.exited && !arrow.animatingOut) return;
    var pos = displayPos[ai];
    if (!pos || pos.length === 0) return;

    ctx.save();
    ctx.beginPath();
    ctx.rect(PAD - 2, PAD - 2, COLS * CELL + 4, ROWS * CELL + 4);
    ctx.clip();

    var color = getArrowColor(arrow);
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = THICKNESS;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Draw the body as a connected path (tail to neck)
    var pts = pos.map(function(p) { return g2p(p.x, p.y); });

    if (pts.length > 1) {
      // Body line: from tail to the cell before head
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (var i = 1; i < pts.length; i++) {
        ctx.lineTo(pts[i].x, pts[i].y);
      }
      ctx.stroke();
    }

    // Draw arrowhead at the head
    var head = pts[pts.length - 1];
    var dir = arrow.dir;
    var tipX = head.x + dir.x * HEAD_LEN;
    var tipY = head.y + dir.y * HEAD_LEN;
    var baseX = head.x - dir.x * 2;
    var baseY = head.y - dir.y * 2;
    var perpX = -dir.y;
    var perpY = dir.x;

    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(baseX + perpX * HEAD_W / 2, baseY + perpY * HEAD_W / 2);
    ctx.lineTo(baseX - perpX * HEAD_W / 2, baseY - perpY * HEAD_W / 2);
    ctx.closePath();
    ctx.fill();

    // Small tail cap (rounded end is already handled by lineCap)

    ctx.restore();
  }

  function drawViktor() {
    if (!viktorImg.complete || !viktorImg.naturalWidth) return;
    // Center in the empty zone: cols 4-8, rows 7-15
    var zoneX = PAD + 4 * CELL;
    var zoneY = PAD + 7 * CELL;
    var zoneW = 5 * CELL;
    var zoneH = 9 * CELL;
    var cx = zoneX + zoneW / 2;
    var cy = zoneY + zoneH / 2;
    // Fit image within zone, scaled up 20%
    var maxW = zoneW * 1.2;
    var maxH = zoneH * 1.2;
    var scale = Math.min(maxW / viktorImg.naturalWidth, maxH / viktorImg.naturalHeight);
    var w = viktorImg.naturalWidth * scale;
    var h = viktorImg.naturalHeight * scale;
    ctx.drawImage(viktorImg, cx - w / 2, cy - h / 2, w, h);
  }

  function drawFinger() {
    if (!fingerVisible || !fingerImg.complete || !fingerImg.naturalWidth) return;
    var arrow = arrows[fingerTargetAi];
    if (!arrow || arrow.exited) { pickFingerTarget(); return; }

    // Finger size: 35% of Viktor's rendered height (30% smaller than before)
    var viktorMaxH = 9 * CELL * 1.2;
    var fingerMaxH = viktorMaxH * 0.35;
    var fScale = fingerMaxH / fingerImg.naturalHeight;
    var fw = fingerImg.naturalWidth * fScale;
    var fh = fingerImg.naturalHeight * fScale;

    // Arrow tip position (the actual arrowhead point, not just cell center)
    var head = arrow.cells[arrow.cells.length - 1];
    var hp = g2p(head.x, head.y);
    var tipX = hp.x + arrow.dir.x * HEAD_LEN;
    var tipY = hp.y + arrow.dir.y * HEAD_LEN;

    // Tap animation: press down and back (1s cycle)
    var elapsed = performance.now() - fingerAnimStart;
    var cycle = (elapsed % 1000) / 1000;
    // 0-0.3: press down, 0.3-0.5: hold, 0.5-0.8: release, 0.8-1: idle
    var press = 0;
    if (cycle < 0.3) press = cycle / 0.3;
    else if (cycle < 0.5) press = 1;
    else if (cycle < 0.8) press = 1 - (cycle - 0.5) / 0.3;
    var pressOffset = press * 4; // 4px press distance
    var scaleAnim = 1 - press * 0.08; // slight shrink on press

    // Position: fingertip (~28% from left, ~5% from top of image) at arrow tip
    var tipOffX = 0.28 * fw;
    var tipOffY = 0.05 * fh;
    var drawX = tipX - tipOffX + pressOffset * 0.7;
    var drawY = tipY - tipOffY + pressOffset;

    ctx.save();
    ctx.translate(drawX + fw * 0.28, drawY + fh * 0.05);
    ctx.scale(scaleAnim, scaleAnim);
    ctx.translate(-(drawX + fw * 0.28), -(drawY + fh * 0.05));
    ctx.drawImage(fingerImg, drawX, drawY, fw, fh);
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawDots();
    drawViktor();
    for (var i = 0; i < arrows.length; i++) drawArrow(i);
    drawFinger();
  }

  // --- Input ---
  function hitTest(px, py) {
    var gx = (px - PAD) / CELL;
    var gy = (py - PAD) / CELL;
    for (var ai = 0; ai < arrows.length; ai++) {
      var arrow = arrows[ai];
      if (arrow.exited) continue;
      for (var c of arrow.cells) {
        if (!onGrid(c)) continue;
        if (Math.abs(gx - (c.x + 0.5)) < 0.5 && Math.abs(gy - (c.y + 0.5)) < 0.5) {
          return ai;
        }
      }
    }
    return -1;
  }

  canvas.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    hideFinger();
    var rect = canvas.getBoundingClientRect();
    var px = (e.clientX - rect.left) * (W / rect.width);
    var py = (e.clientY - rect.top) * (H / rect.height);
    var hit = hitTest(px, py);
    if (hit >= 0) tapArrow(hit);
  });

  reset();
  // Start finger animation on load
  pickFingerTarget();
  runFingerAnim();

  return { arrows, tapArrow, reset };
})();
</script>
</body>
</html>
