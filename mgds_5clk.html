<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="ad.size" content="width=320,height=480">
<title>Ball Sort Puzzle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;min-height:100%;overflow:hidden;background:#0F1923;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
#game-container{width:100%;height:100%;min-height:100%;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;background:#0F1923}
#header{width:100%;display:flex;flex-direction:column;align-items:center;padding-top:7vh;z-index:10}
#logo{width:30%;max-width:140px;height:auto;margin-bottom:1.2vh}
#tagline{font-size:clamp(29px,7.8vw,44px);font-weight:700;color:#fff;letter-spacing:0.3px;text-shadow:0 2px 4px rgba(0,0,0,0.5);margin-bottom:0.5vh}
#board-container{flex:1;display:flex;justify-content:center;align-items:center;width:100%;padding:0 6px}
#board{display:flex;flex-direction:column;gap:clamp(4px,1.2vh,10px);align-items:center}
.row{display:flex;gap:clamp(3px,1vw,8px);justify-content:center}
.jar-wrapper{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform 0.1s ease}
.jar-wrapper:active{transform:scale(0.95)}
.jar-wrapper.selected .tube-outer{box-shadow:0 0 10px 3px rgba(255,255,255,0.6);border-radius:8px}
.lifted-area{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;min-height:1px}
.lifted-ball-container{display:flex;flex-direction:column;align-items:center;animation:bounce 1.2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.tube-outer{position:relative;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,0.25);border-radius:8px;border-top-left-radius:2px;border-top-right-radius:2px}
.tube{border-width:4px;border-style:solid;border-top:none;border-radius:0 0 6px 6px;background:rgba(255,255,255,0.07);overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding-bottom:2px}
.tube.center{border-color:#D5DBE1!important}
.tube.sorted{background:rgba(255,255,255,0.14)}
.tube-shadow{position:absolute;bottom:-4px;width:70%;height:5px;background:rgba(0,0,0,0.35);border-radius:3px;left:15%}
.flying-ball{position:fixed;z-index:150;pointer-events:none;display:flex;align-items:center;justify-content:center;transition:none}
.flying-ball img{width:92%;height:92%;object-fit:contain;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.35))}
.ball{position:relative;display:flex;align-items:center;justify-content:center;margin:-1px 0}
.ball img{width:92%;height:92%;object-fit:contain;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.35))}
#win-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:none;justify-content:center;align-items:center;z-index:200;padding:24px}
#win-overlay.show{display:flex}
#win-card{background:#1B6B3A;border-radius:28px;padding:28px 24px;width:100%;max-width:320px;text-align:center;border:4px solid #FFD700;box-shadow:0 0 20px rgba(255,215,0,0.3);animation:cardIn 0.4s ease-out}
@keyframes cardIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.stars-row{display:flex;justify-content:center;gap:6px;margin-bottom:10px}
.star{color:#FFD700;font-size:28px}
.star.big{font-size:36px;transform:translateY(-4px)}
.trophy-circle{width:90px;height:90px;border-radius:50%;background:rgba(255,215,0,0.18);border:3px solid rgba(255,215,0,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;animation:trophyPulse 3s ease-in-out infinite}
@keyframes trophyPulse{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.1) rotate(3deg)}}
.trophy-icon{font-size:48px}
#win-title{font-size:30px;font-weight:900;color:#FFE566;margin-bottom:4px;text-shadow:0 2px 4px rgba(0,0,0,0.4)}
#win-subtitle{font-size:15px;font-weight:600;color:rgba(255,255,255,0.7);margin-bottom:16px}
.stats-box{background:rgba(0,0,0,0.2);border-radius:14px;padding:10px 28px;display:inline-block;margin-bottom:18px}
#win-moves{font-size:34px;font-weight:900;color:#FFD700;text-shadow:0 1px 3px rgba(0,0,0,0.3)}
.stats-label{font-size:13px;font-weight:700;color:rgba(255,255,255,0.6);margin-top:2px}
.win-buttons{display:flex;gap:10px}
.win-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 10px;border-radius:14px;border:3px solid;font-size:14px;font-weight:800;color:#fff;cursor:pointer;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
.win-btn:active{opacity:0.85;transform:scale(0.96)}
.win-btn.replay{background:#D4442A;border-color:#B8301A}
.win-btn.next{flex:1.5;background:#2E86DE;border-color:#1B6CB5}
.win-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
#hand-tutorial{position:fixed;z-index:50;pointer-events:none;width:90px;height:auto;opacity:0;transition:opacity 0.4s}
#hand-tutorial.show{opacity:1}
</style>
</head>

// ===== GAME CONSTANTS =====
var BALL_COLORS=[
  {id:'yellow',color:'#FFCC00',rim:'#FFCC00',label:'Yellow'},
  {id:'green',color:'#2ECC71',rim:'#2ECC71',label:'Green'},
  {id:'purple',color:'#E84393',rim:'#E84393',label:'Purple'},
  {id:'blue',color:'#3498DB',rim:'#3498DB',label:'Blue'}
];
var BALLS_PER_COLOR=9;
var CONTAINERS_PER_COLOR=3;
var MAX_BALLS_PER_JAR=3;
var TOTAL_JARS=15;
var BUFFER_INDICES=[6,7,8];

// ===== GAME STATE =====
var gameState={jars:[],selectedJarIndex:null,moves:0,isWon:false,level:1};
var successfulMoves=0;
var ctaActive=false;
var ballIdCounter=0;
var tutorialPhase=0; // 0=idle, 1=tapping source jar, 2=tapping target buffer jar, 3=done
var tutorialSourceIdx=-1;
var tutorialTargetIdx=-1;
var tutorialTimeout=null;

// ===== GAME LOGIC =====
function createBall(colorId,color){
  ballIdCounter++;
  return{id:'ball_'+ballIdCounter+'_'+Date.now(),colorId:colorId,color:color,image:DIAMOND_IMAGES[colorId]};
}

function shuffle(arr){
  var a=[].concat(arr);
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}

function getJarColorAssignments(){
  var assignments=[];
  for(var i=0;i<BALL_COLORS.length;i++){
    for(var c=0;c<CONTAINERS_PER_COLOR;c++){
      assignments.push({id:BALL_COLORS[i].id,color:BALL_COLORS[i].color,rim:BALL_COLORS[i].rim});
    }
  }
  return assignments;
}

function isAlreadySolved(jars){
  for(var i=0;i<jars.length;i++){
    var jar=jars[i];
    if(jar.isCenter)continue;
    if(jar.balls.length!==MAX_BALLS_PER_JAR)return false;
    for(var b=0;b<jar.balls.length;b++){
      if(jar.balls[b].colorId!==jar.homeColorId)return false;
    }
  }
  return true;
}

function isTooEasy(jars){
  var solvedCount=0;
  for(var i=0;i<jars.length;i++){
    var jar=jars[i];
    if(jar.isCenter)continue;
    if(jar.balls.length===MAX_BALLS_PER_JAR){
      var allMatch=true;
      for(var b=0;b<jar.balls.length;b++){
        if(jar.balls[b].colorId!==jar.homeColorId){allMatch=false;break;}
      }
      if(allMatch)solvedCount++;
    }
  }
  return solvedCount>=6;
}

function createShuffledLevel(){
  var colorAssignments=shuffle(getJarColorAssignments());
  var allBalls=[];
  for(var i=0;i<BALL_COLORS.length;i++){
    for(var j=0;j<BALLS_PER_COLOR;j++){
      allBalls.push(createBall(BALL_COLORS[i].id,BALL_COLORS[i].color));
    }
  }
  var shuffledBalls=shuffle(allBalls);
  var jars=[];
  var ballIdx=0,colorIdx=0;
  for(var i=0;i<TOTAL_JARS;i++){
    if(BUFFER_INDICES.indexOf(i)!==-1){
      jars.push({index:i,homeColorId:null,rimColor:'#FFFFFF',balls:[],isCenter:true});
    }else{
      var a=colorAssignments[colorIdx];
      colorIdx++;
      var jarBalls=shuffledBalls.slice(ballIdx,ballIdx+MAX_BALLS_PER_JAR);
      ballIdx+=MAX_BALLS_PER_JAR;
      jars.push({index:i,homeColorId:a.id,rimColor:a.rim,balls:jarBalls,isCenter:false});
    }
  }
  return jars;
}

function generateLevel(level){
  var attempts=0;
  while(attempts<100){
    var jars=createShuffledLevel();
    if(!isAlreadySolved(jars)&&!isTooEasy(jars))return jars;
    attempts++;
  }
  return createShuffledLevel();
}

function getTopStack(jar){
  if(jar.balls.length===0)return[];
  var topBall=jar.balls[jar.balls.length-1];
  var stack=[topBall];
  for(var i=jar.balls.length-2;i>=0;i--){
    if(jar.balls[i].colorId===topBall.colorId)stack.unshift(jar.balls[i]);
    else break;
  }
  return stack;
}

function getTopStackCount(jar){
  if(jar.balls.length===0)return 0;
  var topColor=jar.balls[jar.balls.length-1].colorId;
  var count=1;
  for(var i=jar.balls.length-2;i>=0;i--){
    if(jar.balls[i].colorId===topColor)count++;
    else break;
  }
  return count;
}

function canMove(from,to){
  if(from.balls.length===0)return{valid:false,count:0};
  var stack=getTopStack(from);
  var space=MAX_BALLS_PER_JAR-to.balls.length;
  if(space<=0)return{valid:false,count:0};
  if(!to.isCenter&&to.homeColorId!==null&&stack[0].colorId!==to.homeColorId)return{valid:false,count:0};
  if(to.balls.length===0)return{valid:true,count:Math.min(stack.length,space)};
  if(!to.isCenter&&to.homeColorId!==null&&stack[0].colorId===to.homeColorId)return{valid:true,count:Math.min(stack.length,space)};
  var destTop=to.balls[to.balls.length-1];
  if(destTop.colorId!==stack[0].colorId)return{valid:false,count:0};
  return{valid:true,count:Math.min(stack.length,space)};
}

function cloneJars(jars){
  return jars.map(function(jar){
    return{index:jar.index,homeColorId:jar.homeColorId,rimColor:jar.rimColor,balls:jar.balls.map(function(b){return{id:b.id,colorId:b.colorId,color:b.color,image:b.image};}),isCenter:jar.isCenter};
  });
}

function performMove(jars,fromIdx,toIdx){
  var from=jars[fromIdx],to=jars[toIdx];
  var result=canMove(from,to);
  if(!result.valid)return null;
  var newJars=cloneJars(jars);
  var ballsToMove=newJars[fromIdx].balls.splice(newJars[fromIdx].balls.length-result.count,result.count);
  newJars[toIdx].balls.push.apply(newJars[toIdx].balls,ballsToMove);
  return newJars;
}

function checkWin(jars){
  for(var i=0;i<jars.length;i++){
    var jar=jars[i];
    if(jar.isCenter){if(jar.balls.length>0)return false;continue;}
    if(jar.balls.length!==MAX_BALLS_PER_JAR)return false;
    for(var b=0;b<jar.balls.length;b++){
      if(jar.balls[b].colorId!==jar.homeColorId)return false;
    }
  }
  return true;
}

var isAnimating=false;

function haptic(ms){try{if(navigator.vibrate)navigator.vibrate(ms||10);}catch(e){}}

// ===== SOUND EFFECTS (Web Audio API) =====
var audioCtx=null;
function getAudioCtx(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}

function playTone(freq,duration,type,vol,ramp){
  var ctx=getAudioCtx();if(!ctx)return;
  var osc=ctx.createOscillator();
  var gain=ctx.createGain();
  osc.connect(gain);gain.connect(ctx.destination);
  osc.type=type||'sine';
  osc.frequency.setValueAtTime(freq,ctx.currentTime);
  if(ramp)osc.frequency.linearRampToValueAtTime(ramp,ctx.currentTime+duration);
  gain.gain.setValueAtTime(vol||0.2,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+duration);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime+duration);
}

function playNoise(duration,vol){
  var ctx=getAudioCtx();if(!ctx)return;
  var bufSize=ctx.sampleRate*duration;
  var buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
  var data=buf.getChannelData(0);
  for(var i=0;i<bufSize;i++) data[i]=(Math.random()*2-1);
  var src=ctx.createBufferSource();
  src.buffer=buf;
  // Bandpass filter for whoosh character
  var filter=ctx.createBiquadFilter();
  filter.type='bandpass';
  filter.frequency.setValueAtTime(800,ctx.currentTime);
  filter.frequency.linearRampToValueAtTime(2000,ctx.currentTime+duration*0.3);
  filter.frequency.linearRampToValueAtTime(400,ctx.currentTime+duration);
  filter.Q.value=1.5;
  var gain=ctx.createGain();
  gain.gain.setValueAtTime(0.001,ctx.currentTime);
  gain.gain.linearRampToValueAtTime(vol||0.08,ctx.currentTime+duration*0.15);
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+duration);
  src.connect(filter);filter.connect(gain);gain.connect(ctx.destination);
  src.start(ctx.currentTime);
  src.stop(ctx.currentTime+duration);
}

function sfxSelect(){
  playTone(660,0.08,'sine',0.16);
  setTimeout(function(){playTone(880,0.06,'sine',0.1);},40);
}

function sfxWhoosh(){
  var ctx=getAudioCtx();if(!ctx)return;
  var t=ctx.currentTime;
  var dur=0.25;
  // White noise buffer for airy whoosh
  var bufSize=Math.ceil(ctx.sampleRate*dur);
  var buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
  var data=buf.getChannelData(0);
  for(var i=0;i<bufSize;i++) data[i]=Math.random()*2-1;
  var src=ctx.createBufferSource();
  src.buffer=buf;
  // Bandpass sweeps high→low for swoosh feel
  var bp=ctx.createBiquadFilter();
  bp.type='bandpass';
  bp.Q.value=2;
  bp.frequency.setValueAtTime(4000,t);
  bp.frequency.exponentialRampToValueAtTime(400,t+dur);
  // Volume envelope: quick attack, fade out
  var gain=ctx.createGain();
  gain.gain.setValueAtTime(0.001,t);
  gain.gain.linearRampToValueAtTime(0.15,t+0.03);
  gain.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(bp);bp.connect(gain);gain.connect(ctx.destination);
  src.start(t);src.stop(t+dur);
}

function sfxDrop(){
  playTone(520,0.08,'sine',0.13,260);
  playTone(180,0.06,'triangle',0.1);
}

function sfxWin(){
  var notes=[523,659,784,1047];
  for(var i=0;i<notes.length;i++){
    (function(n,d){setTimeout(function(){playTone(n,0.25,'sine',0.16);},d);})(notes[i],i*120);
  }
}

function tryMove(jarIndex){
  if(isAnimating)return;
  // CTA: after 5 successful moves, every click triggers CTA
  if(ctaActive){installCTA();return;}
  haptic(10);
  // Tutorial interaction logic
  if(tutorialPhase===1){
    if(jarIndex===tutorialSourceIdx){startTutorialPhase2();}
    else{dismissTutorial();}
  }else if(tutorialPhase===2){
    dismissTutorial();
  }
  if(tutorialTimeout){clearTimeout(tutorialTimeout);tutorialTimeout=null;}

  if(gameState.isWon)return;
  var s=gameState;
  if(s.selectedJarIndex===null){
    if(s.jars[jarIndex].balls.length===0)return;
    s.selectedJarIndex=jarIndex;
    sfxSelect();
    renderBoard();
    return;
  }
  if(s.selectedJarIndex===jarIndex){
    s.selectedJarIndex=null;
    renderBoard();
    return;
  }

  // Check if move is valid before animating
  var fromJar=s.jars[s.selectedJarIndex];
  var toJar=s.jars[jarIndex];
  var moveResult=canMove(fromJar,toJar);
  if(!moveResult.valid){
    if(s.jars[jarIndex].balls.length>0){s.selectedJarIndex=jarIndex;sfxSelect();}
    else{s.selectedJarIndex=null;}
    renderBoard();
    return;
  }
  // Count successful move and activate CTA after 5
  successfulMoves++;
  if(successfulMoves>=5){ctaActive=true;}

  var fromIdx=s.selectedJarIndex;
  var toIdx=jarIndex;
  var count=moveResult.count;
  var sizes=calcSizes();
  var bs=sizes.bs;

  // 1) Capture start positions from lifted balls
  var fromEl=document.querySelector('[data-index="'+fromIdx+'"]');
  var toEl=document.querySelector('[data-index="'+toIdx+'"]');
  if(!fromEl||!toEl){
    var nj=performMove(s.jars,fromIdx,toIdx);
    if(nj){s.jars=nj;s.selectedJarIndex=null;s.moves++;s.isWon=checkWin(s.jars);}
    renderBoard();if(s.isWon)showWin();return;
  }

  var liftedEls=fromEl.querySelectorAll('.lifted-ball-container .ball');
  var startRects=[];
  for(var i=0;i<liftedEls.length;i++){
    startRects.push(liftedEls[i].getBoundingClientRect());
  }
  if(startRects.length===0){
    var fr=fromEl.getBoundingClientRect();
    for(var i=0;i<count;i++) startRects.push({left:fr.left+fr.width/2-bs/2,top:fr.top,width:bs,height:bs});
  }

  // Get ball image srcs before state changes
  var movingBalls=fromJar.balls.slice(fromJar.balls.length-count);
  var ballImages=[];
  for(var i=0;i<movingBalls.length;i++) ballImages.push(movingBalls[i].image);

  isAnimating=true;

  // 2) Apply final state + render so destination balls exist in DOM
  var newJars=performMove(s.jars,fromIdx,toIdx);
  s.jars=newJars;
  s.selectedJarIndex=null;
  s.moves++;
  s.isWon=checkWin(s.jars);
  renderBoard();

  // 3) Find destination ball positions
  // Balls render reversed (top of stack = first child), moved balls are on top
  var destJarEl=document.querySelector('[data-index="'+toIdx+'"]');
  var allDestBalls=destJarEl.querySelectorAll('.tube .ball');
  // The moved balls are the first `count` elements (they're at top of reversed stack)
  var endRects=[];
  var destHideEls=[];
  for(var i=0;i<count;i++){
    if(allDestBalls[i]){
      endRects.push(allDestBalls[i].getBoundingClientRect());
      destHideEls.push(allDestBalls[i]);
    }
  }

  // If we couldn't find targets, just finish
  if(endRects.length!==count){
    isAnimating=false;
    if(s.isWon)showWin();
    return;
  }

  // 4) Hide destination balls
  for(var i=0;i<destHideEls.length;i++) destHideEls[i].style.visibility='hidden';

  // 5) Create flying balls at start positions
  // startRects[0] = topmost lifted ball, endRects[0] = topmost dest ball
  var flyingEls=[];
  for(var i=0;i<count;i++){
    var imgSrc=ballImages[count-1-i];
    var el=document.createElement('div');
    el.className='flying-ball';
    el.style.width=startRects[i].width+'px';
    el.style.height=startRects[i].height+'px';
    el.style.left=startRects[i].left+'px';
    el.style.top=startRects[i].top+'px';
    el.style.zIndex=String(160+count-i); // topmost ball = highest z
    var img=document.createElement('img');
    img.src=imgSrc;
    img.draggable=false;
    el.appendChild(img);
    document.body.appendChild(el);
    flyingEls.push(el);
  }

  // 6) Get the top-of-tube position (jar mouth) for the drop-in effect
  var destTubeEl=destJarEl.querySelector('.tube');
  var tubeRect=destTubeEl.getBoundingClientRect();
  var jarMouthX=endRects[0].left;
  var jarMouthY=tubeRect.top;

  // 7) Animate: bottom ball drops first, top ball last (preserves stack order)
  var flyDuration=250;
  var dropDuration=180;
  var staggerDelay=55;
  var completed=0;

  // Reverse stagger: last idx (bottommost) goes first so it enters jar first
  for(var i=0;i<count;i++){
    (function(idx){
      var el=flyingEls[idx];
      var sx=startRects[idx].left, sy=startRects[idx].top;
      var bh=startRects[idx].height;
      // Jar mouth offset: topmost (idx=0) highest above jar, bottommost closest to jar mouth
      var mx=jarMouthX, my=jarMouthY-bh*1.2-(count-1-idx)*(bh-2);
      var ex=endRects[idx].left, ey=endRects[idx].top;
      // Bottom ball (higher idx) starts first
      var delay=(count-1-idx)*staggerDelay;

      setTimeout(function(){
        // Phase 1: Fly to jar mouth with scale envelope + ease-out
        var aStart=null;
        function flyStep(ts){
          if(!aStart)aStart=ts;
          var progress=Math.min((ts-aStart)/flyDuration,1);
          // Ease out cubic - decelerates approaching jar
          var ease=1-Math.pow(1-progress,3);
          // Scale envelope: first 10% ramp up 1→1.25, hold until 50%, 50-75% ramp down 1.25→1, rest stays 1
          var scl;
          if(progress<0.1){
            scl=1+0.25*(progress/0.1);
          }else if(progress<0.5){
            scl=1.25;
          }else if(progress<0.75){
            scl=1+0.25*(1-(progress-0.5)/0.25);
          }else{
            scl=1;
          }
          el.style.left=(sx+(mx-sx)*ease)+'px';
          el.style.top=(sy+(my-sy)*ease)+'px';
          el.style.transform='scale('+scl+')';
          if(progress<1){
            requestAnimationFrame(flyStep);
          }else{
            // Phase 2: Drop into jar, scale stays at 1, ease-out deceleration
            sfxDrop();
            var dStart=null;
            function dropStep(ts2){
              if(!dStart)dStart=ts2;
              var dp=Math.min((ts2-dStart)/dropDuration,1);
              var dEase=1-Math.pow(1-dp,2);
              el.style.left=ex+'px';
              el.style.top=(my+(ey-my)*dEase)+'px';
              el.style.transform='scale(1)';
              if(dp<1){
                requestAnimationFrame(dropStep);
              }else{
                el.remove();
                if(destHideEls[idx])destHideEls[idx].style.visibility='visible';
                completed++;
                if(completed===count){
                  isAnimating=false;
                  if(s.isWon)showWin();
                }
              }
            }
            requestAnimationFrame(dropStep);
          }
        }
        sfxWhoosh();
        requestAnimationFrame(flyStep);
      },delay);
    })(i);
  }
}

// ===== RENDERING =====
function calcSizes(){
  var W=window.innerWidth;
  var H=window.innerHeight;
  var headerH=H*0.14;
  var availH=H-headerH-10;
  var availW=Math.min(W-12,480);
  var cols=5,rows=3,gapH=Math.max(3,W*0.01),gapV=Math.max(4,H*0.01);
  var twW=Math.floor((availW-gapH*(cols-1))/cols);
  var maxRowH=Math.floor((availH-gapV*(rows-1))/rows);
  var twH=Math.floor(maxRowH/4.5);
  var tw=Math.min(twW,twH,80);
  var bs=Math.floor(tw*0.78);
  return{tw:tw,bs:bs};
}

function renderBoard(){
  var board=document.getElementById('board');
  board.innerHTML='';
  var sizes=calcSizes();
  var tw=sizes.tw,bs=sizes.bs;
  var tubeH=bs*MAX_BALLS_PER_JAR-6+tw*0.3;
  var liftH=bs+10;
  var rows=[[],[],[]];
  for(var i=0;i<TOTAL_JARS;i++){
    if(i<5)rows[0].push(gameState.jars[i]);
    else if(i<10)rows[1].push(gameState.jars[i]);
    else rows[2].push(gameState.jars[i]);
  }
  for(var r=0;r<3;r++){
    var rowDiv=document.createElement('div');
    rowDiv.className='row';
    for(var j=0;j<rows[r].length;j++){
      var jar=rows[r][j];
      var isSelected=gameState.selectedJarIndex===jar.index;
      var topStackCount=getTopStackCount(jar);
      var isSorted=!jar.isCenter&&jar.balls.length===MAX_BALLS_PER_JAR;
      if(isSorted){
        for(var b=0;b<jar.balls.length;b++){
          if(jar.balls[b].colorId!==jar.homeColorId){isSorted=false;break;}
        }
      }
      var wrapper=document.createElement('div');
      wrapper.className='jar-wrapper'+(isSelected?' selected':'');
      wrapper.style.width=(tw+8)+'px';
      wrapper.setAttribute('data-index',jar.index);
      wrapper.addEventListener('click',(function(idx){return function(){tryMove(idx);};})(jar.index));

      // Lifted area
      var liftArea=document.createElement('div');
      liftArea.className='lifted-area';
      liftArea.style.height=liftH+'px';
      if(isSelected&&jar.balls.length>0){
        var liftContainer=document.createElement('div');
        liftContainer.className='lifted-ball-container';
        var reversed=[].concat(jar.balls).reverse();
        for(var b=0;b<topStackCount;b++){
          liftContainer.appendChild(createBallEl(reversed[b],bs,true));
        }
        liftArea.appendChild(liftContainer);
      }
      wrapper.appendChild(liftArea);

      // Tube outer
      var tubeOuter=document.createElement('div');
      tubeOuter.className='tube-outer';
      tubeOuter.style.width=(tw+4)+'px';
      tubeOuter.style.height=(tubeH+2)+'px';
      tubeOuter.style.borderRadius='2px 2px 8px 8px';

      // Tube
      var tube=document.createElement('div');
      tube.className='tube'+(jar.isCenter?' center':'')+(isSorted?' sorted':'');
      tube.style.width=tw+'px';
      tube.style.height=tubeH+'px';
      tube.style.borderColor=jar.isCenter?'#FFFFFF':jar.rimColor;
      tube.style.padding='0 '+((tw-bs)/2)+'px';
      tube.style.paddingBottom=((tw-bs)/2)+'px';

      var reversed2=[].concat(jar.balls).reverse();
      for(var b=0;b<reversed2.length;b++){
        var isInLifted=isSelected&&b<topStackCount;
        if(!isInLifted){
          tube.appendChild(createBallEl(reversed2[b],bs,false));
        }
      }
      tubeOuter.appendChild(tube);

      // Shadow
      var shadow=document.createElement('div');
      shadow.className='tube-shadow';
      tubeOuter.appendChild(shadow);

      wrapper.appendChild(tubeOuter);
      rowDiv.appendChild(wrapper);
    }
    board.appendChild(rowDiv);
  }
}

function createBallEl(ball,size,isLifted){
  var el=document.createElement('div');
  el.className='ball'+(isLifted?' lifted':'');
  el.style.width=size+'px';
  el.style.height=size+'px';
  var img=document.createElement('img');
  img.src=ball.image;
  img.draggable=false;
  el.appendChild(img);
  return el;
}

// ===== WIN MODAL =====
function showWin(){
  setTimeout(function(){
    haptic(30);sfxWin();
    document.getElementById('win-moves').textContent=gameState.moves;
    document.getElementById('win-subtitle').textContent='Level '+gameState.level+' Complete';
    document.getElementById('win-overlay').classList.add('show');
  },500);
}

function handleNextLevel(){
  document.getElementById('win-overlay').classList.remove('show');
  gameState.level++;
  gameState.jars=generateLevel(gameState.level);
  gameState.selectedJarIndex=null;
  gameState.moves=0;
  gameState.isWon=false;
  renderBoard();
}

function handleReplay(){
  document.getElementById('win-overlay').classList.remove('show');
  gameState.jars=generateLevel(gameState.level);
  gameState.selectedJarIndex=null;
  gameState.moves=0;
  gameState.isWon=false;
  renderBoard();
}

// ===== TUTORIAL HAND =====
var tutorialAnimId=null;

function findTutorialTargets(){
  // Prefer top-middle jar (index 2), then other top row jars, then any filled jar
  var srcIdx=-1;
  var topRow=[2,1,3,0,4];
  for(var t=0;t<topRow.length;t++){
    var j=gameState.jars[topRow[t]];
    if(j&&!j.isCenter&&j.balls.length>0){srcIdx=topRow[t];break;}
  }
  if(srcIdx===-1){
    for(var i=0;i<gameState.jars.length;i++){
      var jar=gameState.jars[i];
      if(!jar.isCenter&&jar.balls.length>0){srcIdx=i;break;}
    }
  }
  // Find first empty buffer jar as target
  var tgtIdx=-1;
  for(var i=0;i<BUFFER_INDICES.length;i++){
    if(gameState.jars[BUFFER_INDICES[i]].balls.length===0){tgtIdx=BUFFER_INDICES[i];break;}
  }
  if(tgtIdx===-1)tgtIdx=BUFFER_INDICES[0];
  return{srcIdx:srcIdx,tgtIdx:tgtIdx};
}

function getJarCenter(idx,yRatio){
  var el=document.querySelector('[data-index="'+idx+'"]');
  if(!el)return null;
  var r=el.getBoundingClientRect();
  // Hand image is 90px wide; fingertip is ~15% from left, ~5% from top
  var handW=90;
  return{x:r.left+r.width/2-handW*0.15, y:r.top+r.height*(yRatio||0.35)-handW*0.05};
}

function animateTapAtPosition(pos){
  var hand=document.getElementById('hand-tutorial');
  // Tap animation: hand moves down slightly then back up, looping
  var tapDown=8;
  var cycleDuration=1000; // 1s per tap cycle
  var startTime=null;

  function step(ts){
    if(tutorialPhase===0||tutorialPhase===3)return;
    if(!hand.classList.contains('show'))return;
    if(!startTime)startTime=ts;
    var elapsed=(ts-startTime)%cycleDuration;
    var progress=elapsed/cycleDuration;

    // Ease: down in first half, up in second half
    var yOffset;
    if(progress<0.35){
      // Move down (press)
      yOffset=tapDown*(progress/0.35);
    }else if(progress<0.5){
      // Hold at bottom
      yOffset=tapDown;
    }else if(progress<0.85){
      // Move up (release)
      yOffset=tapDown*(1-(progress-0.5)/0.35);
    }else{
      // Pause at top
      yOffset=0;
    }

    hand.style.left=pos.x+'px';
    hand.style.top=(pos.y+yOffset)+'px';
    tutorialAnimId=requestAnimationFrame(step);
  }
  if(tutorialAnimId){cancelAnimationFrame(tutorialAnimId);tutorialAnimId=null;}
  tutorialAnimId=requestAnimationFrame(step);
}

function startTutorialPhase1(){
  var targets=findTutorialTargets();
  if(targets.srcIdx===-1)return;
  tutorialSourceIdx=targets.srcIdx;
  tutorialTargetIdx=targets.tgtIdx;
  tutorialPhase=1;

  var hand=document.getElementById('hand-tutorial');
  var pos=getJarCenter(tutorialSourceIdx,0.3);
  if(!pos)return;
  hand.style.left=pos.x+'px';
  hand.style.top=pos.y+'px';
  hand.classList.add('show');
  animateTapAtPosition(pos);
}

function startTutorialPhase2(){
  tutorialPhase=2;
  var hand=document.getElementById('hand-tutorial');
  var srcPos=getJarCenter(tutorialSourceIdx,0.3);
  var tgtPos=getJarCenter(tutorialTargetIdx,0.35);
  if(!srcPos||!tgtPos){dismissTutorial();return;}

  // Animate hand moving from source to target, then tap at target
  var moveDuration=500;
  var sx=srcPos.x,sy=srcPos.y,tx=tgtPos.x,ty=tgtPos.y;
  var moveStart=null;
  if(tutorialAnimId){cancelAnimationFrame(tutorialAnimId);tutorialAnimId=null;}

  function moveStep(ts){
    if(!moveStart)moveStart=ts;
    var elapsed=ts-moveStart;
    var progress=Math.min(elapsed/moveDuration,1);
    var ease=progress<0.5?2*progress*progress:1-Math.pow(-2*progress+2,2)/2;
    hand.style.left=(sx+(tx-sx)*ease)+'px';
    hand.style.top=(sy+(ty-sy)*ease)+'px';
    if(progress<1){
      tutorialAnimId=requestAnimationFrame(moveStep);
    }else{
      // Arrived at target, start tapping
      animateTapAtPosition(tgtPos);
    }
  }
  tutorialAnimId=requestAnimationFrame(moveStep);
}

function dismissTutorial(){
  tutorialPhase=3;
  var hand=document.getElementById('hand-tutorial');
  hand.classList.remove('show');
  if(tutorialAnimId){cancelAnimationFrame(tutorialAnimId);tutorialAnimId=null;}
}

function scheduleTutorial(){
  if(tutorialPhase===3)return;
  if(tutorialTimeout){clearTimeout(tutorialTimeout);tutorialTimeout=null;}
  tutorialTimeout=setTimeout(function(){
    if(tutorialPhase===0)startTutorialPhase1();
  },2000);
}

// ===== INIT =====
function initGame(){
  gameState.jars=generateLevel(1);
  gameState.selectedJarIndex=null;
  gameState.moves=0;
  gameState.isWon=false;
  gameState.level=1;
  renderBoard();
  scheduleTutorial();
}

window.addEventListener('resize',function(){if(!gameState.isWon)renderBoard();});
initGame();
</script>
