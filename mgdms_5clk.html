<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="ad.size" content="width=320,height=480">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#5BC4F5;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}
#overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(44,24,16,0.85);z-index:900;justify-content:center;align-items:center;flex-direction:column}
#overlay.show{display:flex}
.overlay-box{background:#FFF5E0;border-radius:24px;padding:36px 40px;border:4px solid #2C1810;text-align:center;width:85%;max-width:320px;box-shadow:4px 6px 0 rgba(0,0,0,0.25)}
.overlay-box h1{color:#FF4757;font-family:Arial,sans-serif;font-size:30px;font-weight:900;letter-spacing:3px;margin-bottom:8px}
.overlay-box .score-val{color:#2C1810;font-family:Arial,sans-serif;font-size:54px;font-weight:900;margin:8px 0 4px}
.overlay-box .score-lbl{color:#8B6B42;font-family:Arial,sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;margin-bottom:20px}
.overlay-box .play-btn{display:inline-block;background:linear-gradient(180deg,#5BDD3E 0%,#3EAA22 100%);color:#fff;font-family:Arial,sans-serif;font-size:16px;font-weight:900;padding:12px 28px;border-radius:14px;border:3px solid #2C1810;cursor:pointer;margin:6px;box-shadow:2px 3px 0 rgba(0,0,0,0.2);text-shadow:1px 1px 0 rgba(0,0,0,0.3)}
.overlay-box .download-btn{display:inline-block;background:linear-gradient(180deg,#55AAFF 0%,#3388DD 100%);color:#fff;font-family:Arial,sans-serif;font-size:16px;font-weight:900;padding:12px 28px;border-radius:14px;border:3px solid #2C1810;cursor:pointer;margin:6px;box-shadow:2px 3px 0 rgba(0,0,0,0.2);text-shadow:1px 1px 0 rgba(0,0,0,0.3)}
</style>
</head>

<div>

</div>

function generateNextBomb(){
  var level=Math.random()<0.7?1:2;
  // Pick a color that matches a bomb near top of pile for better merge chance
  if(bombs.length>0){
    var topBombs=[];
    for(var i=0;i<bombs.length;i++){
      if(bombs[i].level===level)topBombs.push(bombs[i]);
    }
    topBombs.sort(function(a,b){return a.y-b.y;});
    if(topBombs.length>0){
      var pick=topBombs[Math.floor(Math.random()*Math.min(5,topBombs.length))];
      return {color:pick.color,level:level};
    }
  }
  return {
    color: BOMB_COLORS[Math.floor(Math.random()*BOMB_COLORS.length)],
    level: level
  };
}

function randomMinAngle(){
  var sign = Math.random()<0.5?-1:1;
  return sign*(20+Math.random()*25);
}

function generateDynamicPaddles(){
  return [
    {cx:0.15,cy:0.30,width:85,height:22,baseAngle:randomMinAngle(),velocityX:DYNAMIC_PADDLE_SPEED,direction:1},
    {cx:0.85,cy:0.46,width:85,height:22,baseAngle:randomMinAngle(),velocityX:-DYNAMIC_PADDLE_SPEED,direction:-1}
  ];
}

function updateDynamicPaddles(pads,dt,noRotate){
  for(var i=0;i<pads.length;i++){
    var p=pads[i];
    var speed=p.velocityX||DYNAMIC_PADDLE_SPEED;
    p.cx+=speed*dt;
    var halfWN=(p.width/2)/W;
    var minX=0.05+halfWN, maxX=0.95-halfWN;
    if(p.cx<minX){p.cx=minX;p.velocityX=Math.abs(speed);if(!noRotate)p.baseAngle=randomMinAngle();}
    else if(p.cx>maxX){p.cx=maxX;p.velocityX=-Math.abs(speed);if(!noRotate)p.baseAngle=randomMinAngle();}
  }
}

function getPaddlesPixel(pads){
  var out=[];
  for(var i=0;i<pads.length;i++){
    var p=pads[i];
    out.push({cx:p.cx*W,cy:p.cy*H,width:p.width,height:p.height,baseAngle:p.baseAngle});
  }
  return out;
}

// ============================================================
// PHYSICS
// ============================================================
function applyPhysics(bomb,dt){
  if(!isFinite(dt)||dt<=0)return;
  if(bomb.resting){
    var speed=Math.abs(bomb.vx)+Math.abs(bomb.vy);
    if(speed<1.2){bomb.vx=0;bomb.vy=0;return;}
    bomb.vy+=GRAVITY*dt*0.3;
    bomb.x+=bomb.vx*dt;bomb.y+=bomb.vy*dt;
    bomb.vx*=0.8;bomb.vy*=0.8;
  } else {
    bomb.vy+=GRAVITY*dt;
    bomb.x+=bomb.vx*dt;bomb.y+=bomb.vy*dt;
    bomb.vx*=0.997;
  }
  if(bomb.vx>MAX_VELOCITY)bomb.vx=MAX_VELOCITY;
  if(bomb.vx<-MAX_VELOCITY)bomb.vx=-MAX_VELOCITY;
  if(bomb.vy>MAX_VELOCITY)bomb.vy=MAX_VELOCITY;
  if(bomb.vy<-MAX_VELOCITY)bomb.vy=-MAX_VELOCITY;
  if(Math.abs(bomb.vx)<0.3)bomb.vx=0;
  if(Math.abs(bomb.vy)<0.3&&bomb.resting)bomb.vy=0;
  if(!isFinite(bomb.x)||!isFinite(bomb.y)){bomb.x=W/2;bomb.y=H/2;bomb.vx=0;bomb.vy=0;}
}

function bounceWalls(bomb){
  if(bomb.x-bomb.radius<0){bomb.x=bomb.radius;bomb.vx=Math.abs(bomb.vx)*RESTITUTION;}
  if(bomb.x+bomb.radius>W){bomb.x=W-bomb.radius;bomb.vx=-Math.abs(bomb.vx)*RESTITUTION;}
  if(bomb.y+bomb.radius>floorY){
    bomb.y=floorY-bomb.radius;
    if(Math.abs(bomb.vy)<1.0){bomb.vy=0;bomb.vx*=0.5;bomb.resting=true;}
    else{bomb.vy=-Math.abs(bomb.vy)*RESTITUTION;bomb.resting=false;}
    bomb.vx*=FRICTION;
  } else if(bomb.resting&&bomb.y+bomb.radius<floorY-8){
    if(Math.abs(bomb.vx)+Math.abs(bomb.vy)>0.01)bomb.resting=false;
  }
}

function slidePaddle(bomb,px,py,pw,ph,angleDeg){
  if(!isFinite(angleDeg))return;
  var angle=angleDeg*Math.PI/180;
  var cosA=Math.cos(angle),sinA=Math.sin(angle);
  var dx=bomb.x-px,dy=bomb.y-py;
  if(!isFinite(dx)||!isFinite(dy))return;
  var localX=dx*cosA+dy*sinA;
  var localY=-dx*sinA+dy*cosA;
  var halfW=pw/2,halfH=ph/2;
  if(Math.abs(localX)>halfW+bomb.radius+2||Math.abs(localY)>halfH+bomb.radius+2)return;
  var clampX=Math.max(-halfW,Math.min(halfW,localX));
  var clampY=Math.max(-halfH,Math.min(halfH,localY));
  var distX=localX-clampX,distY=localY-clampY;
  var distSq=distX*distX+distY*distY;
  if(distSq<bomb.radius*bomb.radius){
    var dist=Math.sqrt(distSq);
    if(dist>0.01){
      var nlx=distX/dist,nly=distY/dist;
      var nx=nlx*cosA-nly*sinA,ny=nlx*sinA+nly*cosA;
      if(!isFinite(nx)||!isFinite(ny))return;
      var overlap=bomb.radius-dist;
      var isCorner=Math.abs(clampX)>=halfW-1&&Math.abs(clampY)>=halfH-1;
      var isEdge=Math.abs(localX)>halfW*0.7;
      if(isCorner||isEdge){
        bomb.x+=nx*(overlap+3);bomb.y+=ny*(overlap+3);
        var velDotN=bomb.vx*nx+bomb.vy*ny;
        if(velDotN<0){var br=isCorner?0.5:RESTITUTION;bomb.vx-=2*velDotN*nx*br;bomb.vy-=2*velDotN*ny*br;}
        var spd=Math.sqrt(bomb.vx*bomb.vx+bomb.vy*bomb.vy);
        if(spd<1.5){bomb.vx+=nx*1.5;bomb.vy+=ny*1.5;}
        if(bomb.vy<0.5)bomb.vy=0.5;
        bomb.resting=false;return;
      }
      bomb.x+=nx*(overlap+1);bomb.y+=ny*(overlap+1);
      var axisX=cosA,axisY=sinA;
      var gravDotAxis=GRAVITY*sinA;
      var velDotAxis=bomb.vx*axisX+bomb.vy*axisY;
      var slideVal=velDotAxis*0.98+gravDotAxis*5.5;
      bomb.vx=axisX*slideVal;bomb.vy=axisY*slideVal;
      if(bomb.vy<0.15)bomb.vy=0.15;
    } else {
      bomb.y+=cosA*(bomb.radius+2);bomb.vy=0.5;bomb.vx=0;
    }
  }
}

function collideBombPair(a,b){
  if(!a||!b)return false;
  var dx=b.x-a.x,dy=b.y-a.y;
  if(!isFinite(dx)||!isFinite(dy))return false;
  var distSq=dx*dx+dy*dy;
  var minDist=a.radius+b.radius;
  if(distSq<minDist*minDist&&distSq>0.01){
    var dist=Math.sqrt(distSq);
    var nx=dx/dist,ny=dy/dist;
    if(!isFinite(nx)||!isFinite(ny))return false;
    var overlap=minDist-dist;
    // separate overlapping bombs
    var sep=overlap*0.5+0.2;
    a.x-=nx*sep;a.y-=ny*sep;
    b.x+=nx*sep;b.y+=ny*sep;
    // gravity-driven sliding: if one bomb sits on top of another,
    // it should slide off to the side like a real ball
    // nx is horizontal component of contact normal, ny is vertical
    // if ny is negative, 'a' is above 'b' (or vice versa)
    // the horizontal component nx tells us which side to slide to
    var upper=null,lower=null;
    if(a.y<b.y){upper=a;lower=b;}else{upper=b;lower=a;}
    var absNx=Math.abs(nx);
    var absNy=Math.abs(ny);
    // only apply sliding when contact is angled (not perfectly vertical stack)
    // and the upper bomb is slow enough that gravity should take over
    var upperSpeed=Math.abs(upper.vx)+Math.abs(upper.vy);
    if(absNx>0.1&&absNy>0.3&&upperSpeed<4&&!(a.resting&&b.resting)){
      // slide the upper bomb sideways based on contact angle
      // stronger slide when more off-center (larger nx)
      var slideStrength=GRAVITY*absNx*2.5;
      var slideDir=upper.x>lower.x?1:-1;
      upper.vx+=slideDir*slideStrength;
      upper.resting=false;
    }
    // normal collision response
    var dvx=a.vx-b.vx,dvy=a.vy-b.vy;
    var dvDotN=dvx*nx+dvy*ny;
    if(dvDotN>0){var imp=dvDotN*0.42;a.vx-=imp*nx;a.vy-=imp*ny;b.vx+=imp*nx;b.vy+=imp*ny;a.resting=false;b.resting=false;}
    a.vx*=0.96;a.vy*=0.96;b.vx*=0.96;b.vy*=0.96;
    return true;
  }
  return false;
}

// ============================================================
// INITIAL BOMBS
// ============================================================
function hasAdjacentSameColor(bList,nb){
  for(var i=0;i<bList.length;i++){
    var b=bList[i];
    if(b.color===nb.color&&b.level===nb.level){
      var dx=Math.abs(b.x-nb.x),dy=Math.abs(b.y-nb.y);
      var td=b.radius+nb.radius+4;
      if(dx<td&&dy<td)return true;
    }
  }
  return false;
}

function generateInitialBombs(){
  var bs=[];
  var C=BOMB_COLORS;
  var margin=14;
  var rowH=LEVEL_RADII[2]*2+4;
  var numRows=6;
  // Fixed distribution: 9xL3, 9xL2, 9xL1 = 27 total
  var levelList=[];
  for(var li=0;li<9;li++)levelList.push(3);
  for(var li2=0;li2<9;li2++)levelList.push(2);
  for(var li3=0;li3<9;li3++)levelList.push(1);
  // Shuffle
  for(var si=levelList.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var tmp=levelList[si];levelList[si]=levelList[sj];levelList[sj]=tmp;}
  var count=levelList.length;
  for(var i=0;i<count;i++){
    var attempts=0,placed=false;
    while(!placed&&attempts<1000){
      attempts++;
      var level=levelList[i];
      var radius=LEVEL_RADII[level];
      var x=margin+radius+Math.random()*(W-margin*2-radius*2);
      // Level-based row bias: L3 bottom, L2 middle, L1 upper
      var rowMin,rowMax;
      if(level===3){rowMin=0;rowMax=2;}
      else if(level===2){rowMin=1;rowMax=4;}
      else{rowMin=2;rowMax=numRows-1;}
      var row=rowMin+Math.floor(Math.random()*(rowMax-rowMin+1));
      var y=floorY-radius-row*rowH;
      var cand={id:createBombId(),x:x,y:y,vx:0,vy:0,color:C[0],level:level,radius:radius,passedPaddles:true,mergeCooldown:0,mergeScale:1,resting:false,isInitial:true};
      var overlap=false;
      for(var j=0;j<bs.length;j++){
        var dx=bs[j].x-cand.x,dy=bs[j].y-cand.y;
        var md=bs[j].radius+cand.radius+3;
        if(dx*dx+dy*dy<md*md){overlap=true;break;}
      }
      if(!overlap){bs.push(cand);placed=true;}
    }
  }
  // Settle with full physics (sliding spreads bombs out naturally)
  for(var s=0;s<150;s++){
    for(var si=0;si<bs.length;si++){
      bs[si].vy+=0.4;bs[si].y+=bs[si].vy;
      if(bs[si].y+bs[si].radius>floorY){bs[si].y=floorY-bs[si].radius;bs[si].vy=0;}
      if(bs[si].x-bs[si].radius<0)bs[si].x=bs[si].radius+1;
      if(bs[si].x+bs[si].radius>W)bs[si].x=W-bs[si].radius-1;
    }
    for(var si2=0;si2<bs.length;si2++){
      for(var sj=si2+1;sj<bs.length;sj++){collideBombPair(bs[si2],bs[sj]);}
    }
  }
  // Final relaxation: push apart remaining overlaps
  for(var rp=0;rp<200;rp++){
    var anyOv=false;
    for(var ri=0;ri<bs.length;ri++){
      for(var rj=ri+1;rj<bs.length;rj++){
        var rdx=bs[rj].x-bs[ri].x,rdy=bs[rj].y-bs[ri].y;
        var rdSq=rdx*rdx+rdy*rdy;
        var rmd=bs[ri].radius+bs[rj].radius;
        if(rdSq<rmd*rmd&&rdSq>0.01){
          anyOv=true;
          var rd=Math.sqrt(rdSq);
          var rnx=rdx/rd,rny=rdy/rd;
          var rov=(rmd-rd)*0.52+0.3;
          bs[ri].x-=rnx*rov;bs[ri].y-=rny*rov;
          bs[rj].x+=rnx*rov;bs[rj].y+=rny*rov;
          if(bs[ri].y+bs[ri].radius>floorY)bs[ri].y=floorY-bs[ri].radius;
          if(bs[rj].y+bs[rj].radius>floorY)bs[rj].y=floorY-bs[rj].radius;
          if(bs[ri].x-bs[ri].radius<0)bs[ri].x=bs[ri].radius+1;
          if(bs[ri].x+bs[ri].radius>W)bs[ri].x=W-bs[ri].radius-1;
          if(bs[rj].x-bs[rj].radius<0)bs[rj].x=bs[rj].radius+1;
          if(bs[rj].x+bs[rj].radius>W)bs[rj].x=W-bs[rj].radius-1;
        }
      }
    }
    if(!anyOv)break;
  }
  // Graph coloring: assign colors per level so no adjacent same-color+level
  for(var lv=1;lv<=3;lv++){
    var grp=[];
    for(var gi=0;gi<bs.length;gi++){if(bs[gi].level===lv)grp.push(gi);}
    grp.sort(function(a,b){return bs[a].x===bs[b].x?bs[a].y-bs[b].y:bs[a].x-bs[b].x;});
    for(var gi2=0;gi2<grp.length;gi2++){
      var bi=grp[gi2];
      var used={};
      for(var gj=0;gj<gi2;gj++){
        var bj=grp[gj];
        var gdx=bs[bi].x-bs[bj].x,gdy=bs[bi].y-bs[bj].y;
        var gtd=bs[bi].radius+bs[bj].radius+8;
        if(gdx*gdx+gdy*gdy<gtd*gtd) used[bs[bj].color]=true;
      }
      var startCI=gi2%3;
      for(var ci=0;ci<3;ci++){
        var tryCI=(startCI+ci)%3;
        if(!used[C[tryCI]]){bs[bi].color=C[tryCI];break;}
      }
    }
  }
  for(var vi=0;vi<bs.length;vi++){bs[vi].vx=0;bs[vi].vy=0;bs[vi].resting=true;}
  return bs;
}

// ============================================================
// RENDERING
// ============================================================
function drawGradientRect(x,y,w,h,colors,vertical){
  var grd;
  if(vertical)grd=ctx.createLinearGradient(x,y,x,y+h);
  else grd=ctx.createLinearGradient(x,y,x+w,y);
  for(var i=0;i<colors.length;i++){grd.addColorStop(i/(colors.length-1),colors[i]);}
  ctx.fillStyle=grd;
  ctx.fillRect(x,y,w,h);
}

function drawCircleGradient(cx,cy,r,colors){
  var grd=ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,r*0.1,cx,cy,r);
  grd.addColorStop(0,colors[0]);
  grd.addColorStop(0.5,colors[1]);
  grd.addColorStop(1,colors[2]);
  ctx.fillStyle=grd;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
}

function drawSky(){
  drawGradientRect(0,0,W,H,['#87CEEB','#5BC4F5','#42B4E8','#3AA5D8'],true);
}

function drawClouds(){
  var clouds=[
    {left:W*0.05,top:H*0.08,w:90,h:36,op:0.7},
    {left:W*0.60,top:H*0.05,w:110,h:40,op:0.5},
    {left:W*0.30,top:H*0.15,w:70,h:28,op:0.4},
    {left:W*0.80,top:H*0.18,w:60,h:24,op:0.3}
  ];
  for(var i=0;i<clouds.length;i++){
    var c=clouds[i];
    ctx.globalAlpha=c.op;
    ctx.fillStyle='#FFFFFF';
    // main body
    var r=c.h/2;
    ctx.beginPath();
    ctx.moveTo(c.left+r,c.top);
    ctx.lineTo(c.left+c.w-r,c.top);
    ctx.arc(c.left+c.w-r,c.top+r,r,Math.PI*1.5,Math.PI*0.5);
    ctx.lineTo(c.left+r,c.top+c.h);
    ctx.arc(c.left+r,c.top+r,r,Math.PI*0.5,Math.PI*1.5);
    ctx.fill();
    // bumps
    ctx.beginPath();ctx.arc(c.left+c.w*0.3,c.top-c.h*0.1,c.h*0.35,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(c.left+c.w*0.6,c.top,c.h*0.25,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawFloor(){
  // grass top
  ctx.fillStyle='#7ED957';
  ctx.fillRect(0,floorY,W,6);
  // grass stripe + border
  ctx.fillStyle='#2C1810';
  ctx.fillRect(0,floorY+6,W,3);
  ctx.fillStyle='#5BBD3E';
  ctx.fillRect(0,floorY+9,W,10);
  // dirt
  ctx.fillStyle='#C4915A';
  ctx.fillRect(0,floorY+19,W,H-floorY-19+40);
  ctx.fillStyle='#B07E4A';
  ctx.fillRect(0,floorY+31,W,4);
  ctx.fillStyle='#A07040';
  ctx.fillRect(0,floorY+47,W,3);
  // grass tufts
  var tufts=[0.08,0.25,0.52,0.72,0.90];
  for(var i=0;i<tufts.length;i++){
    var tx=W*tufts[i];
    ctx.fillStyle='#7ED957';
    ctx.beginPath();
    ctx.moveTo(tx,floorY);
    ctx.quadraticCurveTo(tx+7,floorY-10,tx+14,floorY);
    ctx.fill();
    ctx.strokeStyle='#3E9B2A';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(tx,floorY);
    ctx.quadraticCurveTo(tx+7,floorY-10,tx+14,floorY);
    ctx.stroke();
  }
}

function drawPaddle(p){
  ctx.save();
  ctx.translate(p.cx,p.cy);
  ctx.rotate(p.baseAngle*Math.PI/180);
  var hw=p.width/2,hh=p.height/2;
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';
  roundRect(ctx,-hw+2,-hh+3,p.width,p.height,6);ctx.fill();
  // body
  ctx.fillStyle='#C4915A';
  roundRect(ctx,-hw,-hh,p.width,p.height,6);ctx.fill();
  // highlight
  ctx.fillStyle='#E0C08A';
  ctx.fillRect(-hw+3,-hh+3,p.width-6,p.height*0.35);
  // darker bottom
  ctx.fillStyle='#B07E4A';
  ctx.fillRect(-hw+3,-hh+p.height*0.35+3,p.width-6,p.height*0.65-3);
  // outline
  ctx.strokeStyle='#2C1810';ctx.lineWidth=3;
  roundRect(ctx,-hw,-hh,p.width,p.height,6);ctx.stroke();
  // nails
  ctx.fillStyle='#8B8B8B';
  ctx.strokeStyle='#2C1810';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(-hw+14,0,3,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.arc(hw-14,0,3,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.restore();
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

function drawBomb(bomb){
  var r=bomb.radius*(bomb.mergeScale||1);
  var grad=BOMB_GRADIENTS[bomb.color]||[bomb.color,bomb.color,bomb.color];
  // outline
  ctx.strokeStyle='#2C1810';
  ctx.lineWidth=Math.max(3,r*0.12);
  ctx.beginPath();ctx.arc(bomb.x,bomb.y,r,0,Math.PI*2);ctx.stroke();
  // gradient fill
  drawCircleGradient(bomb.x,bomb.y,r,grad);
  // shine
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(bomb.x-r*0.1,bomb.y-r*0.35,r*0.3,r*0.15,0,0,Math.PI*2);
  ctx.fill();
  // small shine dot
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.ellipse(bomb.x-r*0.25,bomb.y,r*0.1,r*0.075,0,0,Math.PI*2);
  ctx.fill();
  // level text
  ctx.fillStyle='#FFFFFF';
  ctx.font='900 '+Math.max(10,r*0.55)+'px Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.35)';ctx.shadowOffsetX=1;ctx.shadowOffsetY=1;ctx.shadowBlur=0;
  ctx.fillText(bomb.level,bomb.x,bomb.y+2);
  ctx.shadowColor='transparent';
}

function drawDeadZone(){
  ctx.globalAlpha=0.8;
  ctx.fillStyle='#FF2233';
  ctx.fillRect(0,deadZoneY,W,3);
  ctx.globalAlpha=1;
}

function drawHUD(){
  // score badge
  ctx.fillStyle='#FFF5E0';
  ctx.strokeStyle='#2C1810';ctx.lineWidth=2.5;
  roundRect(ctx,16,12,80,40,12);ctx.fill();
  roundRect(ctx,16,12,80,40,12);ctx.stroke();
  ctx.fillStyle='#E8923E';ctx.font='900 8px Arial';ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('SCORE',26,18);
  ctx.fillStyle='#2C1810';ctx.font='900 18px Arial';
  ctx.fillText(score,26,30);
  // next badge - larger box to fit all bomb sizes
  var nextW=52,nextH=52;
  var nx2=W-nextW-10;
  ctx.fillStyle='#FFF5E0';
  ctx.strokeStyle='#2C1810';ctx.lineWidth=2;
  roundRect(ctx,nx2,8,nextW,nextH,10);ctx.fill();
  roundRect(ctx,nx2,8,nextW,nextH,10);ctx.stroke();
  ctx.fillStyle='#E8923E';ctx.font='900 8px Arial';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText('NEXT',nx2+nextW/2,12);
  // next bomb preview - clamped to fit inside the badge
  if(previewBomb){
    var maxPr=(nextW-12)/2;
    var pr=Math.min(LEVEL_RADII[previewBomb.level]*0.7,maxPr);
    var grad2=BOMB_GRADIENTS[previewBomb.color]||[previewBomb.color,previewBomb.color,previewBomb.color];
    var pcx=nx2+nextW/2,pcy=8+14+maxPr;
    ctx.strokeStyle='#2C1810';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(pcx,pcy,pr,0,Math.PI*2);ctx.stroke();
    drawCircleGradient(pcx,pcy,pr,grad2);
    ctx.fillStyle='#FFF';ctx.font='900 '+Math.max(8,pr*0.7)+'px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowOffsetX=1;ctx.shadowOffsetY=1;ctx.shadowBlur=0;
    ctx.fillText(previewBomb.level,pcx,pcy);
    ctx.shadowColor='transparent';
  }
  // logo at bottom-left above the floor
  if(logoImg.complete&&logoImg.naturalWidth>0){
    var logoW=110;
    var logoH=logoW*(logoImg.naturalHeight/logoImg.naturalWidth);
    var logoX=8;
    var logoY=floorY+22;
    ctx.globalAlpha=0.9;
    ctx.drawImage(logoImg,logoX,logoY,logoW,logoH);
    ctx.globalAlpha=1;
  }
}

function drawAimLine(){
  if(gameOver)return;
  var currentR=LEVEL_RADII[nextBomb.level];
  var lineTop=spawnY+currentR;
  // compute aim end
  var endY=floorY;
  for(var i=0;i<bombs.length;i++){
    var b=bombs[i];
    var dx=Math.abs(b.x-aimX);
    var cr=b.radius+currentR;
    if(dx<cr){
      var hy=b.y-Math.sqrt(cr*cr-dx*dx);
      if(hy>spawnY+currentR&&hy<endY)endY=hy;
    }
  }
  var pads=getPaddlesPixel(paddles);
  for(var j=0;j<pads.length;j++){
    var p=pads[j];
    var hw2=p.width/2;
    if(aimX>=p.cx-hw2&&aimX<=p.cx+hw2){
      var hy2=p.cy-p.height/2-currentR;
      if(hy2>spawnY+currentR&&hy2<endY)endY=hy2;
    }
  }
  var lineH=Math.max(0,endY-lineTop);
  // draw aim line
  if(lineH>0){
    var grd=ctx.createLinearGradient(aimX,lineTop,aimX,lineTop+lineH);
    grd.addColorStop(0,'rgba(255,255,255,0.85)');
    grd.addColorStop(0.5,'rgba(255,255,255,0.6)');
    grd.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=grd;
    ctx.fillRect(aimX-1.25,lineTop,2.5,lineH);
  }
  // draw spawn bomb
  var grad3=BOMB_GRADIENTS[nextBomb.color]||[nextBomb.color,nextBomb.color,nextBomb.color];
  ctx.strokeStyle='#2C1810';ctx.lineWidth=Math.max(3,currentR*0.12);
  ctx.beginPath();ctx.arc(aimX,spawnY,currentR,0,Math.PI*2);ctx.stroke();
  drawCircleGradient(aimX,spawnY,currentR,grad3);
  // shine
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(aimX-currentR*0.1,spawnY-currentR*0.35,currentR*0.3,currentR*0.15,0,0,Math.PI*2);
  ctx.fill();
  // level
  ctx.fillStyle='#FFF';ctx.font='900 '+Math.max(10,currentR*0.55)+'px Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.35)';ctx.shadowOffsetX=1;ctx.shadowOffsetY=1;ctx.shadowBlur=0;
  ctx.fillText(nextBomb.level,aimX,spawnY+2);
  ctx.shadowColor='transparent';
}

function drawEffects(){
  for(var i=0;i<effects.length;i++){
    var fx=effects[i];
    var progress=fx.timer/fx.maxTimer;
    if(fx.type==='explosion'){
      var scale=0.2+progress*1.5;
      var opacity=1-progress;
      ctx.globalAlpha=opacity;
      ctx.strokeStyle=fx.color;ctx.lineWidth=5;
      ctx.beginPath();ctx.arc(fx.x,fx.y,fx.radius*scale,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle=fx.color+'25';
      ctx.beginPath();ctx.arc(fx.x,fx.y,fx.radius*scale,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    } else if(fx.type==='ring'){
      var scale2=0.3+progress*1.2;
      var opacity2=(1-progress)*0.6;
      ctx.globalAlpha=opacity2;
      ctx.strokeStyle='#FFFFFF';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(fx.x,fx.y,fx.radius*scale2,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=1;
    } else if(fx.type==='sparkle'){
      var sp=progress;
      var sop=sp<0.3?sp/0.3:1-(sp-0.3)/0.7;
      var drift=progress*30;
      ctx.globalAlpha=sop;
      ctx.fillStyle=fx.color;
      ctx.strokeStyle='#2C1810';ctx.lineWidth=2;
      var sr=fx.radius*(1-progress*0.5);
      ctx.beginPath();ctx.arc(fx.x,fx.y-drift*0.8,sr,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.globalAlpha=1;
    } else if(fx.type==='merge'){
      var scale3=0.5+progress*1.0;
      var opacity3=1-progress;
      ctx.globalAlpha=opacity3;
      ctx.strokeStyle=fx.color;ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(fx.x,fx.y,fx.radius*scale3,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle=fx.color+'30';
      ctx.beginPath();ctx.arc(fx.x,fx.y,fx.radius*scale3,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  }
}

function drawTapHint(){
  if(!showTapHint||gameOver)return;
  var alpha=0.4+0.6*Math.abs(Math.sin(tapAnimPhase));
  ctx.globalAlpha=alpha;
  ctx.fillStyle='#FFF5E0';
  ctx.font='900 24px Arial';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowOffsetX=2;ctx.shadowOffsetY=2;ctx.shadowBlur=4;
  ctx.fillText('TAP TO DROP',W/2,H*0.45);
  ctx.shadowColor='transparent';
  ctx.globalAlpha=1;
}


// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(now){
  if(!running&&!gameOver)return;
  var elapsed=lastTime?now-lastTime:16.67;
  lastTime=now;
  var dt=Math.min(elapsed/16.67,3);
  pulsePhase+=0.05;
  tapAnimPhase+=0.04;

  if(!gameOver){
    // update paddles
    if(!waitingForFirstDrop){
      updateDynamicPaddles(paddles,dt,dropCount<=1);
    }
    var padsPixel=getPaddlesPixel(paddles);

    // physics
    for(var i=0;i<bombs.length;i++){
      var b=bombs[i];
      applyPhysics(b,dt);
      bounceWalls(b);
      if(!b.passedPaddles&&b.y>H*0.85)b.passedPaddles=true;
      for(var j=0;j<padsPixel.length;j++){
        var p=padsPixel[j];
        slidePaddle(b,p.cx,p.cy,p.width,p.height,p.baseAngle);
      }
    }
    // merge cooldown
    for(var i2=0;i2<bombs.length;i2++){
      if(bombs[i2].mergeCooldown>0&&!waitingForFirstDrop){
        bombs[i2].mergeCooldown-=1;
        bombs[i2].mergeScale=Math.min(1,bombs[i2].mergeScale+0.05);
      }
    }
    // collision + merge
    for(var iter=0;iter<3;iter++){
      var mergeI=-1,mergeJ=-1;
      for(var i3=0;i3<bombs.length;i3++){
        for(var j3=i3+1;j3<bombs.length;j3++){
          var collided=collideBombPair(bombs[i3],bombs[j3]);
          if(collided&&mergeI===-1&&bombs[i3].color===bombs[j3].color&&bombs[i3].level===bombs[j3].level&&bombs[i3].mergeCooldown<=0&&bombs[j3].mergeCooldown<=0&&!(bombs[i3].isInitial&&bombs[j3].isInitial)){
            // merge found via collision
            mergeI=i3;mergeJ=j3;
          }
        }
      }
      // Proximity merge fallback: slightly larger radius for near-matches
      if(mergeI===-1){
        for(var pm=0;pm<bombs.length;pm++){
          if(bombs[pm].mergeCooldown>0)continue;
          for(var pn=pm+1;pn<bombs.length;pn++){
            if(bombs[pn].mergeCooldown>0)continue;
            if(bombs[pm].color!==bombs[pn].color||bombs[pm].level!==bombs[pn].level)continue;
            if(bombs[pm].isInitial&&bombs[pn].isInitial)continue;
            var pdx=bombs[pn].x-bombs[pm].x,pdy=bombs[pn].y-bombs[pm].y;
            var pmd=bombs[pm].radius+bombs[pn].radius+12;
            if(pdx*pdx+pdy*pdy<pmd*pmd){mergeI=pm;mergeJ=pn;break;}
          }
          if(mergeI>=0)break;
        }
      }
      if(mergeI>=0&&mergeJ>=0){
        var a=bombs[mergeI],b2=bombs[mergeJ];
        var newLvl=a.level+1;
        var midX=(a.x+b2.x)/2,midY=(a.y+b2.y)/2;
        if(!isFinite(midX)||!isFinite(midY))break;
        score+=SCORE_TABLE[a.level]||10;
        var hi=Math.max(mergeI,mergeJ),lo=Math.min(mergeI,mergeJ);
        bombs.splice(hi,1);bombs.splice(lo,1);
        if(newLvl>=4){
          score+=1000;
          for(var k=0;k<bombs.length;k++){
            var ddx=bombs[k].x-midX,ddy=bombs[k].y-midY;
            var dist=Math.sqrt(ddx*ddx+ddy*ddy);
            if(dist<EXPLOSION_RADIUS&&dist>0.1){
              var force=EXPLOSION_FORCE*(1-dist/EXPLOSION_RADIUS);
              bombs[k].vx+=(ddx/dist)*force;bombs[k].vy+=(ddy/dist)*force;
            }
          }
          effects.push({id:createEffectId('exp'),x:midX,y:midY,type:'explosion',timer:0,maxTimer:35,color:a.color,radius:EXPLOSION_RADIUS});
          for(var sp=0;sp<8;sp++){
            var ang=(sp/8)*Math.PI*2;
            effects.push({id:createEffectId('sp'+sp),x:midX+Math.cos(ang)*20,y:midY+Math.sin(ang)*20,type:'sparkle',timer:0,maxTimer:20+Math.random()*10,color:a.color,radius:8+Math.random()*6});
          }
          effects.push({id:createEffectId('ring'),x:midX,y:midY,type:'ring',timer:0,maxTimer:25,color:'#FFFFFF',radius:EXPLOSION_RADIUS*0.8});
        } else {
          // merge impact: push nearby bombs based on merge level
          var impactRadius=60+newLvl*25;
          var impactForce=3+newLvl*2;
          for(var mi=0;mi<bombs.length;mi++){
            var mdx=bombs[mi].x-midX,mdy=bombs[mi].y-midY;
            var mdist=Math.sqrt(mdx*mdx+mdy*mdy);
            if(mdist<impactRadius&&mdist>0.1){
              var mf=impactForce*(1-mdist/impactRadius);
              bombs[mi].vx+=(mdx/mdist)*mf;
              bombs[mi].vy+=(mdy/mdist)*mf;
              bombs[mi].resting=false;
              bombs[mi].isInitial=false;
            }
          }
          bombs.push({id:createBombId(),x:midX,y:midY,vx:(Math.random()-0.5)*1.5,vy:-1.8,color:a.color,level:newLvl,radius:LEVEL_RADII[newLvl],passedPaddles:true,mergeCooldown:18,mergeScale:0.3,resting:false,isInitial:false});
          effects.push({id:createEffectId('merge'),x:midX,y:midY,type:'merge',timer:0,maxTimer:20,color:a.color,radius:LEVEL_RADII[newLvl]*2.5});
          for(var sp2=0;sp2<5;sp2++){
            var ang2=(sp2/5)*Math.PI*2+Math.random()*0.5;
            effects.push({id:createEffectId('msp'+sp2),x:midX+Math.cos(ang2)*15,y:midY+Math.sin(ang2)*15,type:'sparkle',timer:0,maxTimer:14+Math.random()*6,color:'#FFE44D',radius:5+Math.random()*4});
          }
        }
      }
    }
    // effects update
    effects=effects.filter(function(fx){fx.timer+=1;return fx.timer<fx.maxTimer;});
    // dead zone check
    var aboveCount=0;
    for(var i5=0;i5<bombs.length;i5++){
      if(bombs[i5].passedPaddles&&bombs[i5].y-bombs[i5].radius<deadZoneY)aboveCount++;
    }
    if(aboveCount>=DEAD_ZONE_COUNT){
      gameOver=true;
      running=false;
      showGameOver();
    }
  }

  // render
  ctx.clearRect(0,0,W,H);
  drawSky();
  drawClouds();
  drawDeadZone();
  var padsRender=getPaddlesPixel(paddles);
  for(var pi=0;pi<padsRender.length;pi++){drawPaddle(padsRender[pi]);}
  if(!gameOver)drawAimLine();
  drawFloor();
  for(var bi=0;bi<bombs.length;bi++){drawBomb(bombs[bi]);}
  drawEffects();
  drawHUD();
  drawTapHint();

  if(!gameOver){
    requestAnimationFrame(gameLoop);
  }
}

// ============================================================
// GAME OVER
// ============================================================
function showGameOver(){
  var overlay=document.getElementById('overlay');
  document.getElementById('final-score').textContent=score;
  overlay.classList.add('show');
}

function hideGameOver(){
  document.getElementById('overlay').classList.remove('show');
}

// ============================================================
// INPUT
// ============================================================
function onTouchStart(e){
  e.preventDefault();
  if(!userInteracted){userInteracted=true;}
  if(gameOver)return;
  touching=true;
  showTapHint=false;
  var t=e.touches?e.touches[0]:e;
  var rect=canvas.getBoundingClientRect();
  aimX=(t.clientX-rect.left)*(W/rect.width);
}
function onTouchMove(e){
  e.preventDefault();
  if(gameOver||!touching)return;
  var t=e.touches?e.touches[0]:e;
  var rect=canvas.getBoundingClientRect();
  aimX=(t.clientX-rect.left)*(W/rect.width);
}
function onTouchEnd(e){
  e.preventDefault();
  if(gameOver||!touching)return;
  touching=false;
  dropBomb(aimX,spawnY);
  aimX=W/2;
}
function onMouseDown(e){
  if(gameOver)return;
  if(!userInteracted){userInteracted=true;}
  touching=true;
  showTapHint=false;
  var rect=canvas.getBoundingClientRect();
  aimX=(e.clientX-rect.left)*(W/rect.width);
}
function onMouseMove(e){
  if(gameOver||!touching)return;
  var rect=canvas.getBoundingClientRect();
  aimX=(e.clientX-rect.left)*(W/rect.width);
}
function onMouseUp(e){
  if(gameOver||!touching)return;
  touching=false;
  dropBomb(aimX,spawnY);
  aimX=W/2;
}

function dropBomb(x,y){
  if(!running||gameOver)return;
  dropCount++;
  // on 5th drop and every drop after, open the store
  if(dropCount>=CTA_AFTER_DROPS){
    openStore();
    return;
  }
  if(bombs.length>=MAX_BOMBS)return;
  if(waitingForFirstDrop)waitingForFirstDrop=false;
  var info=nextBomb;
  bombs.push({id:createBombId(),x:x,y:y,vx:0,vy:3.5,color:info.color,level:info.level,radius:LEVEL_RADII[info.level],passedPaddles:false,mergeCooldown:0,mergeScale:1,resting:false});
  nextBomb=previewBomb;
  previewBomb=generateNextBomb();
}

// ============================================================
// INIT
// ============================================================
function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;
  H=window.innerHeight;
  canvas.width=W*dpr;
  canvas.height=H*dpr;
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  floorY=H-80;
  var isLandscape=W>H;
  deadZoneY=isLandscape?H*0.38:H*DEAD_ZONE_FRACTION;
  spawnY=isLandscape?40:80;
  aimX=W/2;
}

function startGame(){
  bombIdCounter=0;
  effectIdCounter=0;
  score=0;
  dropCount=0;
  gameOver=false;
  running=true;
  showTapHint=true;
  waitingForFirstDrop=true;
  lastTime=0;
  // First drop = RED L1 (matches left chain), second = BLUE L1 (matches right chain)
  nextBomb=generateNextBomb();
  previewBomb=generateNextBomb();
  paddles=generateDynamicPaddles();
  bombs=generateInitialBombs();
  effects=[];
  hideGameOver();
  requestAnimationFrame(gameLoop);
}

function initGame(){
  canvas=document.getElementById('c');
  ctx=canvas.getContext('2d');
  resize();
  window.addEventListener('resize',function(){
    resize();
    // re-clamp bombs
    for(var i=0;i<bombs.length;i++){
      if(bombs[i].y+bombs[i].radius>floorY)bombs[i].y=floorY-bombs[i].radius;
    }
  });

  // input
  canvas.addEventListener('touchstart',onTouchStart,{passive:false});
  canvas.addEventListener('touchmove',onTouchMove,{passive:false});
  canvas.addEventListener('touchend',onTouchEnd,{passive:false});
  canvas.addEventListener('mousedown',onMouseDown);
  canvas.addEventListener('mousemove',onMouseMove);
  canvas.addEventListener('mouseup',onMouseUp);

  // buttons
  document.getElementById('restart-btn').addEventListener('click',function(e){
    e.stopPropagation();
    startGame();
  });
  document.getElementById('download-btn').addEventListener('click',function(e){
    e.stopPropagation();
    openStore();
  });

  startGame();
}

// ============================================================
// MRAID BOOT
// ============================================================
if(typeof mraid !== 'undefined'){
  if(mraid.getState()==='loading'){
    mraid.addEventListener('ready',function(){mraidReady=true;initGame();});
  } else {
    mraidReady=true;
    initGame();
  }
} else {
  // no MRAID (testing in browser)
  document.addEventListener('DOMContentLoaded',initGame);
}

})();
</script>
