function init(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;
  H=window.innerHeight;
  canvas.width=W*dpr;
  canvas.height=H*dpr;
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);

  // Calculate cell size
  headerH=60;
  var fixedHeight=200;
  var fromHeight=(H-headerH-fixedHeight)/(BOARD_ROWS+CREATION_ROWS+1)-CELL_GAP;
  var fromWidth=(W-32-2*BOARD_PADDING-(BOARD_COLS-1)*CELL_GAP)/BOARD_COLS;
  cellSize=Math.floor(Math.min(fromHeight,fromWidth,46));

  var boardWidth=BOARD_COLS*cellSize+(BOARD_COLS-1)*CELL_GAP+2*BOARD_PADDING;
  var boardHeight=BOARD_ROWS*cellSize+(BOARD_ROWS-1)*CELL_GAP+2*BOARD_PADDING;
  var creationHeight=CREATION_ROWS*cellSize+(CREATION_ROWS-1)*CELL_GAP+2*BOARD_PADDING;

  boardY=headerH+8;
  paletteY=boardY+boardHeight+8;
  creationY=paletteY+46;
  controlsY=creationY+creationHeight+8;

  creationLayoutX=(W-boardWidth)/2;
  creationLayoutY=creationY;

  newGame();
  setupInput();
  requestAnimationFrame(gameLoop);
}

// ---- GAME LOGIC (exact port from utils/game.ts) ----
function isDoubleCell(cell){return cell!==null&&typeof cell==='object'&&cell.outer!==undefined;}
function getCellDisplayColor(cell){if(cell===null)return null;if(typeof cell==='string')return cell;return cell.outer;}
function createEmptyBoard(){var b=[];for(var r=0;r<BOARD_ROWS;r++){b[r]=[];for(var c=0;c<BOARD_COLS;c++)b[r][c]=null;}return b;}
function getRandomColor(){return BLOCK_COLORS[Math.floor(Math.random()*BLOCK_COLORS.length)];}
function getRandomColorExcluding(exclude){var opts=BLOCK_COLORS.filter(function(c){return c!==exclude;});return opts[Math.floor(Math.random()*opts.length)];}
function maybeCreateDoubleCell(color){if(Math.random()<DOUBLE_CELL_CHANCE){return{outer:color,inner:getRandomColorExcluding(color)};}return color;}

function createHalfFullBoard(){
  var halfRows=Math.floor(BOARD_ROWS/2);
  var b=createEmptyBoard();
  for(var r=0;r<halfRows;r++){
    for(var c=0;c<BOARD_COLS;c++){
      var color=getRandomColor();
      var attempts=0;
      while(attempts<20){
        var hCount=1;
        if(c>=1&&getCellDisplayColor(b[r][c-1])===color)hCount++;
        if(c>=2&&getCellDisplayColor(b[r][c-2])===color)hCount++;
        var vCount=1;
        if(r>=1&&getCellDisplayColor(b[r-1][c])===color)vCount++;
        if(r>=2&&getCellDisplayColor(b[r-2][c])===color)vCount++;
        if(hCount<MATCH_MIN&&vCount<MATCH_MIN)break;
        color=getRandomColor();attempts++;
      }
      b[r][c]=maybeCreateDoubleCell(color);
    }
  }
  return b;
}

function generateTurnBudget(){
  var minTotal=3,maxTotal=7;
  var total=minTotal+Math.floor(Math.random()*(maxTotal-minTotal+1));
  var shuffled=BLOCK_COLORS.slice().sort(function(){return Math.random()-0.5;});
  var chosen=[shuffled[0]];
  var counts=[total];
  return chosen.map(function(color,i){return{color:color,count:counts[i]};});
}

function getTotalBudget(budget){return budget.reduce(function(s,b){return s+b.count;},0);}
function isAdjacent(a,b){return Math.abs(a.row-b.row)+Math.abs(a.col-b.col)===1;}
function isConnectedToExisting(pos,painted){if(painted.length===0)return true;return painted.some(function(p){return isAdjacent(p,pos);});}

function findMatches(b){
  var visited=[];
  for(var r=0;r<BOARD_ROWS;r++){visited[r]=[];for(var c=0;c<BOARD_COLS;c++)visited[r][c]=false;}
  var matches=[];
  for(var r=0;r<BOARD_ROWS;r++){
    for(var c=0;c<BOARD_COLS;c++){
      if(visited[r][c]||b[r][c]===null)continue;
      var color=getCellDisplayColor(b[r][c]);
      if(!color)continue;
      var group=[],queue=[{row:r,col:c}];
      visited[r][c]=true;
      while(queue.length>0){
        var cur=queue.shift();group.push(cur);
        var neighbors=[{row:cur.row-1,col:cur.col},{row:cur.row+1,col:cur.col},{row:cur.row,col:cur.col-1},{row:cur.row,col:cur.col+1}];
        for(var n=0;n<neighbors.length;n++){
          var nb=neighbors[n];
          if(nb.row>=0&&nb.row<BOARD_ROWS&&nb.col>=0&&nb.col<BOARD_COLS&&!visited[nb.row][nb.col]&&getCellDisplayColor(b[nb.row][nb.col])===color){
            visited[nb.row][nb.col]=true;queue.push(nb);
          }
        }
      }
      if(group.length>=MATCH_MIN)matches.push(group);
    }
  }
  return matches;
}

function clearMatchesAndApplyGravity(b,matches){
  var nb=b.map(function(row){return row.slice();});
  for(var g=0;g<matches.length;g++){
    for(var p=0;p<matches[g].length;p++){
      var pos=matches[g][p];
      var cell=nb[pos.row][pos.col];
      if(isDoubleCell(cell)){nb[pos.row][pos.col]=cell.inner;}
      else{nb[pos.row][pos.col]=null;}
    }
  }
  for(var c=0;c<BOARD_COLS;c++){
    var nonEmpty=[];
    for(var r=0;r<BOARD_ROWS;r++){if(nb[r][c]!==null)nonEmpty.push(nb[r][c]);}
    for(var r=0;r<BOARD_ROWS;r++){nb[r][c]=r<nonEmpty.length?nonEmpty[r]:null;}
  }
  return nb;
}

function isGameOver(b){return b[BOARD_ROWS-1].some(function(cell){return cell!==null;});}

function calculateMatchScore(matches,comboLevel){
  var total=0;
  for(var g=0;g<matches.length;g++)total+=matches[g].length*10;
  return total*(comboLevel+1);
}

function placeDirectOnBoard(b,painted){
  var nb=b.map(function(row){return row.slice();});
  var colGroups={};
  for(var i=0;i<painted.length;i++){
    var p=painted[i];if(p.col<0||p.col>=BOARD_COLS)return null;
    if(!colGroups[p.col])colGroups[p.col]=[];
    colGroups[p.col].push({order:p.row,color:p.color});
  }
  for(var col in colGroups){
    var sorted=colGroups[col].sort(function(a,b){return a.order-b.order;});
    for(var i=0;i<sorted.length;i++){
      var targetRow=-1;
      for(var r=0;r<BOARD_ROWS;r++){if(nb[r][parseInt(col)]===null){targetRow=r;break;}}
      if(targetRow<0)return null;
      nb[targetRow][parseInt(col)]=sorted[i].color;
    }
  }
  return nb;
}

function getDirectPreviewPositions(b,painted){
  if(painted.length===0)return[];
  var tempBoard=b.map(function(row){return row.slice();});
  var positions=[];
  var colGroups={};
  for(var i=0;i<painted.length;i++){
    var p=painted[i];if(p.col<0||p.col>=BOARD_COLS)return[];
    if(!colGroups[p.col])colGroups[p.col]=[];
    colGroups[p.col].push({order:p.row,color:p.color});
  }
  for(var col in colGroups){
    var sorted=colGroups[col].sort(function(a,b){return a.order-b.order;});
    for(var i=0;i<sorted.length;i++){
      var targetRow=-1;
      for(var r=0;r<BOARD_ROWS;r++){if(tempBoard[r][parseInt(col)]===null){targetRow=r;break;}}
      if(targetRow<0)return[];
      tempBoard[targetRow][parseInt(col)]='preview';
      positions.push({row:targetRow,col:parseInt(col),color:sorted[i].color});
    }
  }
  return positions;
}

function getDropTargets(b,painted){
  if(painted.length===0)return[];
  var tempBoard=b.map(function(row){return row.slice();});
  var targets=[];
  var colGroups={};
  for(var i=0;i<painted.length;i++){
    var p=painted[i];if(p.col<0||p.col>=BOARD_COLS)return[];
    if(!colGroups[p.col])colGroups[p.col]=[];
    colGroups[p.col].push({order:p.row,color:p.color});
  }
  for(var col in colGroups){
    var sorted=colGroups[col].sort(function(a,b){return a.order-b.order;});
    for(var i=0;i<sorted.length;i++){
      var targetRow=-1;
      for(var r=0;r<BOARD_ROWS;r++){if(tempBoard[r][parseInt(col)]===null){targetRow=r;break;}}
      if(targetRow<0)return[];
      tempBoard[targetRow][parseInt(col)]='taken';
      targets.push({col:parseInt(col),targetRow:targetRow,color:sorted[i].color});
    }
  }
  return targets;
}

function shiftBoardDown(b){
  var nb=createEmptyBoard();var overflow=false;
  for(var c=0;c<BOARD_COLS;c++){
    for(var r=0;r<BOARD_ROWS;r++){
      if(b[r][c]!==null){
        var newRow=r+1;
        if(newRow>=BOARD_ROWS){overflow=true;}
        else{nb[newRow][c]=b[r][c];}
      }
    }
  }
  for(var c=0;c<BOARD_COLS;c++){
    if(nb[0][c]===null){
      var color=getRandomColor();var attempts=0;
      while(attempts<20){
        var hCount=1;
        if(c>=1&&getCellDisplayColor(nb[0][c-1])===color)hCount++;
        if(c>=2&&getCellDisplayColor(nb[0][c-2])===color)hCount++;
        var vCount=1;
        if(getCellDisplayColor(nb[1][c])===color)vCount++;
        if(BOARD_ROWS>2&&getCellDisplayColor(nb[2][c])===color)vCount++;
        if(hCount<MATCH_MIN&&vCount<MATCH_MIN)break;
        color=getRandomColor();attempts++;
      }
      nb[0][c]=maybeCreateDoubleCell(color);
    }
  }
  return{newBoard:nb,overflow:overflow};
}

// ---- GAME STATE MANAGEMENT ----
function newGame(){
  board=createHalfFullBoard();
  paintedCells=[];
  colorBudget=generateTurnBudget();
  selectedColorIndex=0;
  score=0;
  try{highScore=parseInt(localStorage.getItem('pb_high')||'0');}catch(e){highScore=0;}
  phase='painting';
  clearingCells=[];
  combo=0;
  droppingCells=[];
  droppingAnimProgress=0;
  totalRemaining=getTotalBudget(colorBudget);
  comboDisplayTimer=0;
  dropCount=0;ctaActive=false;
}

function selectColor(index){
  if(index>=0&&index<colorBudget.length&&colorBudget[index].count>0){selectedColorIndex=index;}
}

function paintCell(pos){
  if(phase!=='painting')return;
  if(pos.row<0||pos.row>=CREATION_ROWS||pos.col<0||pos.col>=CREATION_COLS)return;
  var budgetItem=colorBudget[selectedColorIndex];
  if(!budgetItem||budgetItem.count<=0)return;
  if(paintedCells.some(function(p){return p.row===pos.row&&p.col===pos.col;}))return;
  if(!isConnectedToExisting(pos,paintedCells))return;
  paintedCells.push({row:pos.row,col:pos.col,color:budgetItem.color});
  colorBudget[selectedColorIndex]={color:colorBudget[selectedColorIndex].color,count:colorBudget[selectedColorIndex].count-1};
  if(colorBudget[selectedColorIndex].count<=0){
    var nextAvailable=-1;
    for(var i=0;i<colorBudget.length;i++){if(i!==selectedColorIndex&&colorBudget[i].count>0){nextAvailable=i;break;}}
    if(nextAvailable>=0)selectedColorIndex=nextAvailable;
  }
  totalRemaining=getTotalBudget(colorBudget);
}

function clearPainting(){
  var restored=colorBudget.map(function(b){
    var usedCount=paintedCells.filter(function(p){return p.color===b.color;}).length;
    return{color:b.color,count:b.count+usedCount};
  });
  paintedCells=[];colorBudget=restored;totalRemaining=getTotalBudget(colorBudget);
}

function beginPaintingPhase(){
  colorBudget=generateTurnBudget();selectedColorIndex=0;paintedCells=[];
  phase='painting';combo=0;totalRemaining=getTotalBudget(colorBudget);
}

function processShiftMatches(currentBoard,currentScore,comboLevel){
  var matches=findMatches(currentBoard);
  if(matches.length===0){board=currentBoard;score=currentScore;beginPaintingPhase();return;}
  var allClearing=[];for(var g=0;g<matches.length;g++)for(var p=0;p<matches[g].length;p++)allClearing.push(matches[g][p]);
  board=currentBoard;clearingCells=allClearing;combo=comboLevel;phase='clearing';
  comboDisplayTimer=60;comboDisplayText=comboLevel>0?'COMBO x'+(comboLevel+1)+'!':'MATCH!';
  clearingTimer=setTimeout(function(){
    var nb=clearMatchesAndApplyGravity(currentBoard,matches);
    var matchScore=calculateMatchScore(matches,comboLevel);
    var newScore=currentScore+matchScore;
    board=nb;score=newScore;clearingCells=[];
    processShiftMatches(nb,newScore,comboLevel+1);
  },450);
}

function startNewTurn(currentBoard){
  var result=shiftBoardDown(currentBoard);
  if(result.overflow||isGameOver(result.newBoard)){
    board=result.newBoard;phase='gameOver';
    if(score>highScore){highScore=score;try{localStorage.setItem('pb_high',String(score));}catch(e){}}
    openStore();return;
  }
  processShiftMatches(result.newBoard,score,0);
}

function processMatches(currentBoard,currentScore,comboLevel){
  var matches=findMatches(currentBoard);
  if(matches.length===0){
    if(isGameOver(currentBoard)){
      phase='gameOver';
      if(currentScore>highScore){highScore=currentScore;try{localStorage.setItem('pb_high',String(currentScore));}catch(e){}}
      openStore();
    }else{startNewTurn(currentBoard);}
    return;
  }
  var allClearing=[];for(var g=0;g<matches.length;g++)for(var p=0;p<matches[g].length;p++)allClearing.push(matches[g][p]);
  clearingCells=allClearing;combo=comboLevel;phase='clearing';
  comboDisplayTimer=60;comboDisplayText=comboLevel>0?'COMBO x'+(comboLevel+1)+'!':'MATCH!';
  clearingTimer=setTimeout(function(){
    var nb=clearMatchesAndApplyGravity(currentBoard,matches);
    var matchScore=calculateMatchScore(matches,comboLevel);
    var newScore=currentScore+matchScore;
    board=nb;score=newScore;clearingCells=[];
    processMatches(nb,newScore,comboLevel+1);
  },450);
}

function dropShape(){
  if(paintedCells.length===0)return;
  if(totalRemaining>0)return;
  // After 4 drops, every DROP opens store
  dropCount++;
  if(dropCount>DROP_LIMIT){ctaActive=true;}
  var targets=getDropTargets(board,paintedCells);
  if(targets.length===0)return;
  var nb=placeDirectOnBoard(board,paintedCells);
  if(!nb)return;
  // Build drops with source positions from creation grid
  var drops=[];
  var colGroups={};
  for(var i=0;i<paintedCells.length;i++){
    var p=paintedCells[i];
    if(!colGroups[p.col])colGroups[p.col]=[];
    colGroups[p.col].push({order:p.row,color:p.color,sourceRow:p.row,sourceCol:p.col});
  }
  var tempBoard=board.map(function(row){return row.slice();});
  for(var col in colGroups){
    var sorted=colGroups[col].sort(function(a,b){return a.order-b.order;});
    for(var i=0;i<sorted.length;i++){
      var targetRow=-1;
      for(var r=0;r<BOARD_ROWS;r++){if(tempBoard[r][parseInt(col)]===null){targetRow=r;break;}}
      if(targetRow<0)break;
      tempBoard[targetRow][parseInt(col)]='taken';
      drops.push({col:parseInt(col),targetRow:targetRow,color:sorted[i].color,sourceRow:sorted[i].sourceRow,sourceCol:sorted[i].sourceCol});
    }
  }
  droppingCells=drops;droppingAnimProgress=0;phase='dropping';
  paintedCells=[]; // Clear so they disappear from creation grid
  // Animate
  var dropDuration=70;
  function animateDrop(){
    droppingAnimProgress+=1/dropDuration;
    if(droppingAnimProgress>=1){
      droppingAnimProgress=1;board=nb;droppingCells=[];
      setTimeout(function(){processMatches(nb,score,0);},100);
      return;
    }
    requestAnimationFrame(animateDrop);
  }
  requestAnimationFrame(animateDrop);
}

window.restartGame=function(){
  newGame();
};

// ---- INPUT HANDLING ----
function setupInput(){
  canvas.addEventListener('touchstart',onTouchStart,{passive:false});
  canvas.addEventListener('touchmove',onTouchMove,{passive:false});
  canvas.addEventListener('touchend',onTouchEnd,{passive:false});
  canvas.addEventListener('mousedown',onMouseDown);
  canvas.addEventListener('mousemove',onMouseMove);
  canvas.addEventListener('mouseup',onMouseUp);
}

function getCanvasPos(e){
  var rect=canvas.getBoundingClientRect();
  var x,y;
  if(e.touches){x=e.touches[0].clientX-rect.left;y=e.touches[0].clientY-rect.top;}
  else{x=e.clientX-rect.left;y=e.clientY-rect.top;}
  return{x:x,y:y};
}

function hitTest(x,y){
  var boardWidth=BOARD_COLS*cellSize+(BOARD_COLS-1)*CELL_GAP+2*BOARD_PADDING;
  var boardX=(W-boardWidth)/2;

  // Check palette buttons
  if(y>=paletteY&&y<paletteY+40){
    var paletteWidth=colorBudget.length*50-10;
    var paletteStartX=(W-paletteWidth)/2;
    for(var i=0;i<colorBudget.length;i++){
      var chipX=paletteStartX+i*50;
      if(x>=chipX&&x<chipX+40){return{type:'palette',index:i};}
    }
  }

  // Check creation grid
  if(y>=creationY&&y<creationY+CREATION_ROWS*cellSize+(CREATION_ROWS-1)*CELL_GAP+2*BOARD_PADDING){
    var relX=x-boardX-BOARD_PADDING;
    var relY=y-creationY-BOARD_PADDING;
    var colStep=cellSize+CELL_GAP;
    var rowStep=cellSize+CELL_GAP;
    var col=Math.floor(relX/colStep);
    var row=Math.floor(relY/rowStep);
    if(col>=0&&col<CREATION_COLS&&row>=0&&row<CREATION_ROWS){
      var cellStartX=col*colStep;var cellStartY=row*rowStep;
      if(relX-cellStartX<=cellSize&&relY-cellStartY<=cellSize){
        return{type:'creation',row:row,col:col};
      }
    }
  }

  // Check Clear button
  if(phase==='painting'&&y>=controlsY&&y<controlsY+46){
    var clearBtnX=(W/2)-120;
    if(x>=clearBtnX&&x<clearBtnX+80&&paintedCells.length>0){return{type:'clear'};}
  }

  // Check Drop button
  if(phase==='painting'&&y>=controlsY&&y<controlsY+46){
    var dropBtnX=(W/2)-20;
    if(x>=dropBtnX&&x<dropBtnX+160&&paintedCells.length>0){return{type:'drop'};}
  }


  return null;
}

function onTouchStart(e){
  e.preventDefault();
  if(tutorialActive){tutorialActive=false;}
  if(ctaActive){openStore();return;}
  var pos=getCanvasPos(e);
  var hit=hitTest(pos.x,pos.y);
  if(!hit)return;
  if(hit.type==='palette'){selectColor(hit.index);return;}
  if(hit.type==='clear'){clearPainting();return;}
  if(hit.type==='drop'){dropShape();return;}
  if(hit.type==='creation'){
    touchActive=true;lastPaintedKey=null;
    var key=hit.row+'-'+hit.col;
    if(lastPaintedKey!==key){lastPaintedKey=key;paintCell({row:hit.row,col:hit.col});}
  }
}

function onTouchMove(e){
  e.preventDefault();
  if(!touchActive)return;
  var pos=getCanvasPos(e);
  var hit=hitTest(pos.x,pos.y);
  if(hit&&hit.type==='creation'){
    var key=hit.row+'-'+hit.col;
    if(lastPaintedKey!==key){lastPaintedKey=key;paintCell({row:hit.row,col:hit.col});}
  }
}

function onTouchEnd(e){
  e.preventDefault();
  if(touchActive&&totalRemaining>0&&paintedCells.length>0){clearPainting();}
  touchActive=false;lastPaintedKey=null;
}

function onMouseDown(e){
  if(tutorialActive){tutorialActive=false;}
  if(ctaActive){openStore();return;}
  var pos=getCanvasPos(e);
  var hit=hitTest(pos.x,pos.y);
  if(!hit)return;
  if(hit.type==='palette'){selectColor(hit.index);return;}
  if(hit.type==='clear'){clearPainting();return;}
  if(hit.type==='drop'){dropShape();return;}
  if(hit.type==='creation'){
    touchActive=true;lastPaintedKey=null;
    var key=hit.row+'-'+hit.col;
    if(lastPaintedKey!==key){lastPaintedKey=key;paintCell({row:hit.row,col:hit.col});}
  }
}
function onMouseMove(e){
  if(!touchActive)return;
  var pos=getCanvasPos(e);
  var hit=hitTest(pos.x,pos.y);
  if(hit&&hit.type==='creation'){
    var key=hit.row+'-'+hit.col;
    if(lastPaintedKey!==key){lastPaintedKey=key;paintCell({row:hit.row,col:hit.col});}
  }
}
function onMouseUp(e){
  if(touchActive&&totalRemaining>0&&paintedCells.length>0){clearPainting();}
  touchActive=false;lastPaintedKey=null;
}

// ---- RENDERING ----
function drawRoundedRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawGradientRect(x,y,w,h,r,c1,c2){
  var grad=ctx.createLinearGradient(x,y,x+w,y+h);
  grad.addColorStop(0,c1);grad.addColorStop(1,c2);
  drawRoundedRect(x,y,w,h,r);ctx.fillStyle=grad;ctx.fill();
}

function hexToRgba(hex,alpha){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return'rgba('+r+','+g+','+b+','+alpha+')';
}

function darkenColor(hex,amt){
  var r=Math.max(0,parseInt(hex.slice(1,3),16)-amt);
  var g=Math.max(0,parseInt(hex.slice(3,5),16)-amt);
  var b=Math.max(0,parseInt(hex.slice(5,7),16)-amt);
  return'rgb('+r+','+g+','+b+')';
}
function lightenColor(hex,amt){
  var r=Math.min(255,parseInt(hex.slice(1,3),16)+amt);
  var g=Math.min(255,parseInt(hex.slice(3,5),16)+amt);
  var b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);
  return'rgb('+r+','+g+','+b+')';
}
function drawCell(x,y,size,color,radius){
  // Toon dark outline (drawn slightly bigger behind)
  drawRoundedRect(x-1,y-1,size+2,size+2,radius+1);
  ctx.fillStyle=darkenColor(color,70);ctx.fill();
  // Main fill
  drawRoundedRect(x,y,size,size,radius);
  ctx.fillStyle=color;ctx.fill();
  // Top cartoon highlight (big white shine)
  ctx.save();
  drawRoundedRect(x,y,size,size,radius);ctx.clip();
  var hlGrad=ctx.createLinearGradient(x,y,x,y+size*0.55);
  hlGrad.addColorStop(0,'rgba(255,255,255,0.45)');hlGrad.addColorStop(0.6,'rgba(255,255,255,0.1)');hlGrad.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hlGrad;ctx.fillRect(x,y,size,size*0.55);
  // Bottom darkening
  var btGrad=ctx.createLinearGradient(x,y+size*0.6,x,y+size);
  btGrad.addColorStop(0,'rgba(0,0,0,0)');btGrad.addColorStop(1,'rgba(0,0,0,0.12)');
  ctx.fillStyle=btGrad;ctx.fillRect(x,y+size*0.6,size,size*0.4);
  ctx.restore();
  // Thick cartoon outline
  drawRoundedRect(x,y,size,size,radius);
  ctx.strokeStyle=darkenColor(color,55);ctx.lineWidth=1.8;ctx.stroke();
}

function render(){
  ctx.clearRect(0,0,W,H);

  // Background gradient
  var bgGrad=ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#FFF8F0');bgGrad.addColorStop(1,'#F0E4D2');
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);

  // Header - toon style with thick bottom border
  drawGradientRect(0,0,W,headerH,0,THEME.headerGradientStart,THEME.headerGradientEnd);
  // Header highlight
  ctx.save();ctx.globalAlpha=0.18;ctx.fillStyle='#fff';
  ctx.fillRect(0,0,W,headerH*0.45);ctx.globalAlpha=1;ctx.restore();
  // Thick bottom edge
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,headerH-3,W,3);

  // Logo
  if(logoLoaded){
    var logoH=34;
    var logoW=Math.round(logoH*(333/139));
    ctx.drawImage(logoImg,22,headerH/2-logoH/2+4,logoW,logoH);
  }

  // Score - toon text with outline
  ctx.save();
  ctx.font='900 24px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=3;
  ctx.strokeText(score,W-32,headerH/2-2);
  ctx.fillStyle=THEME.textLight;ctx.fillText(score,W-32,headerH/2-2);
  ctx.font='700 12px sans-serif';
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=2;
  ctx.strokeText('Best: '+highScore,W-32,headerH/2+16);
  ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fillText('Best: '+highScore,W-32,headerH/2+16);
  ctx.restore();

  // Board
  var boardWidth=BOARD_COLS*cellSize+(BOARD_COLS-1)*CELL_GAP+2*BOARD_PADDING;
  var boardX=(W-boardWidth)/2;
  var boardHeight=BOARD_ROWS*cellSize+(BOARD_ROWS-1)*CELL_GAP+2*BOARD_PADDING;

  // Board container - toon style with thick outline
  drawRoundedRect(boardX-1,boardY-1,boardWidth+2,boardHeight+2,17);
  ctx.fillStyle='#C8BFB0';ctx.fill();
  drawRoundedRect(boardX,boardY,boardWidth,boardHeight,16);
  ctx.fillStyle=THEME.boardBg;ctx.fill();
  drawRoundedRect(boardX,boardY,boardWidth,boardHeight,16);
  ctx.strokeStyle='#B8AFA0';ctx.lineWidth=2;ctx.stroke();

  // Clearing set
  var clearingSet={};
  for(var i=0;i<clearingCells.length;i++)clearingSet[clearingCells[i].row+'-'+clearingCells[i].col]=true;

  // Preview
  var previewPositions=phase==='painting'&&paintedCells.length>0?getDirectPreviewPositions(board,paintedCells):[];
  var previewMap={};
  for(var i=0;i<previewPositions.length;i++)previewMap[previewPositions[i].row+'-'+previewPositions[i].col]=previewPositions[i].color;

  var cellR=Math.max(6,cellSize*0.14);

  // Board cells
  for(var r=0;r<BOARD_ROWS;r++){
    for(var c=0;c<BOARD_COLS;c++){
      var cx=boardX+BOARD_PADDING+c*(cellSize+CELL_GAP);
      var cy=boardY+BOARD_PADDING+r*(cellSize+CELL_GAP);
      var key=r+'-'+c;
      var cell=board[r][c];
      var clearing=clearingSet[key];
      var previewColor=previewMap[key];
      var double=isDoubleCell(cell);
      var displayColor=getCellDisplayColor(cell);

      if(displayColor){
        ctx.save();
        ctx.globalAlpha=clearing?0.35:1;
        drawCell(cx,cy,cellSize,displayColor,cellR);
        // Inner square for double cells - toon style
        if(double&&cell.inner){
          var innerSize=Math.max(Math.floor(cellSize*0.46),8);
          var innerRad=Math.max(3,innerSize*0.22);
          var ix=cx+(cellSize-innerSize)/2;
          var iy=cy+(cellSize-innerSize)/2;
          drawCell(ix,iy,innerSize,cell.inner,innerRad);
        }
        ctx.globalAlpha=1;ctx.restore();
      }else if(previewColor){
        // Preview ghost - toon dashed
        ctx.save();
        drawRoundedRect(cx,cy,cellSize,cellSize,cellR);
        ctx.fillStyle=hexToRgba(previewColor,0.18);ctx.fill();
        ctx.setLineDash([4,3]);ctx.strokeStyle=hexToRgba(previewColor,0.55);ctx.lineWidth=2;ctx.stroke();
        ctx.setLineDash([]);ctx.restore();
      }else{
        // Empty cell - toon inset
        drawRoundedRect(cx,cy,cellSize,cellSize,cellR);
        ctx.fillStyle=THEME.emptyCellBg;ctx.fill();
        ctx.strokeStyle='#D8D2C8';ctx.lineWidth=1;ctx.stroke();
      }
    }
  }

  // Drop animation
  if(phase==='dropping'&&droppingCells.length>0){
    for(var i=0;i<droppingCells.length;i++){
      var dc=droppingCells[i];
      var srcX=boardX+BOARD_PADDING+dc.sourceCol*(cellSize+CELL_GAP);
      var srcY=creationY+BOARD_PADDING+dc.sourceRow*(cellSize+CELL_GAP);
      var tgtX=boardX+BOARD_PADDING+dc.col*(cellSize+CELL_GAP);
      var tgtY=boardY+BOARD_PADDING+dc.targetRow*(cellSize+CELL_GAP);
      var eased=easeOutCubic(Math.min(droppingAnimProgress*1.3,1));
      eased=Math.max(0,Math.min(eased,1));
      var currentX=srcX+(tgtX-srcX)*eased;
      var currentY=srcY+(tgtY-srcY)*eased;
      drawCell(currentX,currentY,cellSize,dc.color,cellR);
    }
  }

  // Color palette
  var chipSize=44;
  var chipGap=12;
  var paletteWidth=colorBudget.length*(chipSize+chipGap)-chipGap;
  var paletteStartX=(W-paletteWidth)/2;
  for(var i=0;i<colorBudget.length;i++){
    var item=colorBudget[i];
    var isSelected=i===selectedColorIndex;
    var isEmpty=item.count<=0;
    var chipX=paletteStartX+i*(chipSize+chipGap);
    var chipY=paletteY;

    ctx.save();
    ctx.globalAlpha=isEmpty?0.3:1;
    // Selected indicator - toon thick white border
    if(isSelected&&!isEmpty){
      drawRoundedRect(chipX-3,chipY-3,chipSize+6,chipSize+6,16);
      ctx.fillStyle=darkenColor(item.color,60);ctx.fill();
      drawRoundedRect(chipX-3,chipY-3,chipSize+6,chipSize+6,16);
      ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke();
    }
    drawCell(chipX,chipY,chipSize,item.color,13);

    ctx.font='900 20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    if(isEmpty){
      ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(chipX+13,chipY+22);ctx.lineTo(chipX+20,chipY+29);ctx.lineTo(chipX+31,chipY+16);ctx.stroke();
    }else{
      ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=3;
      ctx.strokeText(item.count,chipX+chipSize/2,chipY+chipSize/2+1);
      ctx.fillStyle=THEME.textLight;ctx.fillText(item.count,chipX+chipSize/2,chipY+chipSize/2+1);
    }
    ctx.globalAlpha=1;ctx.restore();
  }

  // Creation grid - toon style
  var creationHeight=CREATION_ROWS*cellSize+(CREATION_ROWS-1)*CELL_GAP+2*BOARD_PADDING;
  drawRoundedRect(boardX-1,creationY-1,boardWidth+2,creationHeight+2,17);
  ctx.fillStyle='#C8BFB0';ctx.fill();
  drawRoundedRect(boardX,creationY,boardWidth,creationHeight,16);
  ctx.fillStyle=THEME.creationBg;ctx.fill();
  drawRoundedRect(boardX,creationY,boardWidth,creationHeight,16);
  ctx.strokeStyle='#B8AFA0';ctx.lineWidth=2;ctx.stroke();

  var paintedMap={};
  for(var i=0;i<paintedCells.length;i++)paintedMap[paintedCells[i].row+'-'+paintedCells[i].col]=paintedCells[i].color;
  var selectedColor=colorBudget[selectedColorIndex]?colorBudget[selectedColorIndex].color:'#CCC';

  for(var r=0;r<CREATION_ROWS;r++){
    for(var c=0;c<CREATION_COLS;c++){
      var cx=boardX+BOARD_PADDING+c*(cellSize+CELL_GAP);
      var cy=creationY+BOARD_PADDING+r*(cellSize+CELL_GAP);
      var cellColor=paintedMap[r+'-'+c];

      if(cellColor){
        drawCell(cx,cy,cellSize,cellColor,cellR);
      }else{
        drawRoundedRect(cx,cy,cellSize,cellSize,cellR);
        ctx.fillStyle=THEME.creationEmptyCell;ctx.fill();
        if(phase==='painting'){
          ctx.strokeStyle=hexToRgba(selectedColor,0.3);ctx.lineWidth=1.5;ctx.stroke();
        }else{
          ctx.strokeStyle='#D8D2C8';ctx.lineWidth=1;ctx.stroke();
        }
      }
    }
  }

  // Controls
  if(phase==='painting'){
    // Clear button - toon
    var btnH=48;
    var clearBtnX=(W/2)-125;var clearW=88;
    // Dark outline behind
    drawRoundedRect(clearBtnX-1,controlsY+2,clearW+2,btnH,15);
    ctx.fillStyle='#B8AFA0';ctx.fill();
    drawRoundedRect(clearBtnX,controlsY,clearW,btnH,14);
    ctx.fillStyle='#E8E2D8';ctx.fill();
    // Highlight
    ctx.save();drawRoundedRect(clearBtnX,controlsY,clearW,btnH,14);ctx.clip();
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(clearBtnX,controlsY,clearW,btnH*0.45);
    ctx.restore();
    drawRoundedRect(clearBtnX,controlsY,clearW,btnH,14);
    ctx.strokeStyle='#B8AFA0';ctx.lineWidth=2;ctx.stroke();
    // Text with outline
    ctx.font='700 16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=2;
    ctx.strokeText('Clear',clearBtnX+clearW/2,controlsY+btnH/2);
    ctx.fillStyle=THEME.textPrimary;ctx.fillText('Clear',clearBtnX+clearW/2,controlsY+btnH/2);

    // Drop button - toon with gradient
    var dropBtnX=(W/2)-18;var dropW=170;
    var dropEnabled=paintedCells.length>0&&totalRemaining===0;
    var dropColor=dropEnabled?THEME.headerGradientStart:'#CCC';
    var dropColorDark=dropEnabled?'#CC6A1A':'#999';
    // Dark outline behind
    drawRoundedRect(dropBtnX-1,controlsY+2,dropW+2,btnH,15);
    ctx.fillStyle=dropColorDark;ctx.fill();
    drawRoundedRect(dropBtnX,controlsY,dropW,btnH,14);
    if(dropEnabled){
      var dGrad=ctx.createLinearGradient(dropBtnX,controlsY,dropBtnX+dropW,controlsY+btnH);
      dGrad.addColorStop(0,THEME.headerGradientStart);dGrad.addColorStop(1,THEME.headerGradientEnd);
      ctx.fillStyle=dGrad;
    }else{ctx.fillStyle='#CCC';}
    ctx.fill();
    // Highlight
    ctx.save();drawRoundedRect(dropBtnX,controlsY,dropW,btnH,14);ctx.clip();
    ctx.fillStyle='rgba(255,255,255,0.22)';ctx.fillRect(dropBtnX,controlsY,dropW,btnH*0.45);
    ctx.restore();
    drawRoundedRect(dropBtnX,controlsY,dropW,btnH,14);
    ctx.strokeStyle=dropColorDark;ctx.lineWidth=2;ctx.stroke();
    // Arrow icon
    var arrowX=dropBtnX+dropW/2-22,arrowY=controlsY+btnH/2;
    ctx.fillStyle=THEME.textLight;
    ctx.beginPath();ctx.moveTo(arrowX,arrowY-8);ctx.lineTo(arrowX-6,arrowY+1);ctx.lineTo(arrowX+6,arrowY+1);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(arrowX,arrowY-2);ctx.lineTo(arrowX,arrowY+8);ctx.strokeStyle=THEME.textLight;ctx.lineWidth=2.5;ctx.stroke();
    // Text with outline
    ctx.font='900 18px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=3;
    ctx.strokeText('DROP',arrowX+14,arrowY+1);
    ctx.fillStyle=THEME.textLight;ctx.fillText('DROP',arrowX+14,arrowY+1);
  }

  if(phase==='dropping'){
    ctx.fillStyle=THEME.textSecondary;ctx.font='600 15px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Dropping...',W/2,controlsY+23);
  }

  // Combo display (original style)
  if(comboDisplayTimer>0){
    comboDisplayTimer--;
    ctx.save();
    ctx.globalAlpha=Math.min(comboDisplayTimer/20,1);
    ctx.fillStyle=THEME.headerGradientEnd;
    ctx.font='bold 32px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.15)';ctx.shadowBlur=4;ctx.shadowOffsetY=2;
    ctx.fillText(comboDisplayText,W/2,H*0.4);
    ctx.restore();
  }

  // Tutorial overlay
  if(tutorialActive&&handLoaded){
    tutorialTime+=0.012;
    var boardWidth2=BOARD_COLS*cellSize+(BOARD_COLS-1)*CELL_GAP+2*BOARD_PADDING;
    var boardX2=(W-boardWidth2)/2;
    var creationHeight2=CREATION_ROWS*cellSize+(CREATION_ROWS-1)*CELL_GAP+2*BOARD_PADDING;

    // Dark overlay with cutout for creation grid
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath();
    ctx.rect(0,0,W,H);
    // Cutout matching creation grid container exactly
    var cutX=boardX2,cutY=creationY,cutW=boardWidth2,cutH=creationHeight2,cutR=16;
    // Draw cutout (counter-clockwise rounded rect hole)
    ctx.moveTo(cutX+cutR,cutY);
    ctx.lineTo(cutX+cutR,cutY);ctx.arcTo(cutX,cutY,cutX,cutY+cutR,cutR);
    ctx.lineTo(cutX,cutY+cutH-cutR);ctx.arcTo(cutX,cutY+cutH,cutX+cutR,cutY+cutH,cutR);
    ctx.lineTo(cutX+cutW-cutR,cutY+cutH);ctx.arcTo(cutX+cutW,cutY+cutH,cutX+cutW,cutY+cutH-cutR,cutR);
    ctx.lineTo(cutX+cutW,cutY+cutR);ctx.arcTo(cutX+cutW,cutY,cutX+cutW-cutR,cutY,cutR);
    ctx.closePath();
    try{ctx.fill('evenodd');}catch(e){ctx.fill();}
    ctx.restore();

    // Animate hand along tutorial path
    var totalSegments=tutorialPath.length;
    var cycleDuration=totalSegments*0.8+0.6;// seconds per cycle
    var t=(tutorialTime%cycleDuration)/cycleDuration;
    var pathProgress=t*totalSegments;
    var segIdx=Math.min(Math.floor(pathProgress),totalSegments-1);
    var segFrac=pathProgress-segIdx;
    segFrac=Math.min(segFrac,1);

    var curPt=tutorialPath[segIdx];
    var nextPt=segIdx<totalSegments-1?tutorialPath[segIdx+1]:curPt;

    // Cell center positions in creation grid
    var cx1=boardX2+BOARD_PADDING+curPt.c*(cellSize+CELL_GAP)+cellSize/2;
    var cy1=creationY+BOARD_PADDING+curPt.r*(cellSize+CELL_GAP)+cellSize/2;
    var cx2=boardX2+BOARD_PADDING+nextPt.c*(cellSize+CELL_GAP)+cellSize/2;
    var cy2=creationY+BOARD_PADDING+nextPt.r*(cellSize+CELL_GAP)+cellSize/2;

    var eased=easeOutCubic(segFrac);
    var handX=cx1+(cx2-cx1)*eased;
    var handY=cy1+(cy2-cy1)*eased;

    // Draw hand - fingertip tip is at top-left area of image
    var handW=60;var handH=70;
    // Fingertip offset: tip of index finger within the scaled image
    var tipOffX=handW*0.20;
    var tipOffY=handH*0.30;
    ctx.save();
    ctx.drawImage(handImg,handX-tipOffX,handY-tipOffY,handW,handH);
    ctx.restore();

  }
}

function easeOutCubic(t){return 1-Math.pow(1-t,3);}

function gameLoop(){
  render();
  requestAnimationFrame(gameLoop);
}

// Handle resize
window.addEventListener('resize',function(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);

  var fixedHeight=200;
  var fromHeight=(H-headerH-fixedHeight)/(BOARD_ROWS+CREATION_ROWS+1)-CELL_GAP;
  var fromWidth=(W-32-2*BOARD_PADDING-(BOARD_COLS-1)*CELL_GAP)/BOARD_COLS;
  cellSize=Math.floor(Math.min(fromHeight,fromWidth,46));

  var boardWidth=BOARD_COLS*cellSize+(BOARD_COLS-1)*CELL_GAP+2*BOARD_PADDING;
  var boardHeight=BOARD_ROWS*cellSize+(BOARD_ROWS-1)*CELL_GAP+2*BOARD_PADDING;
  var creationHeight=CREATION_ROWS*cellSize+(CREATION_ROWS-1)*CELL_GAP+2*BOARD_PADDING;

  boardY=headerH+8;paletteY=boardY+boardHeight+8;creationY=paletteY+46;controlsY=creationY+creationHeight+8;
  creationLayoutX=(W-boardWidth)/2;creationLayoutY=creationY;
});

// Set logo in CTA overlay

// Start game safely
function startGame(){
  if(window._gameStarted)return;
  window._gameStarted=true;
  try{init();}catch(e){}
}

// MRAID-aware launch (no script tag - AppLovin injects mraid itself)
function launchWithMraid(){
  try{
    if(window.mraid.isViewable()){
      startGame();
    }else{
      window.mraid.addEventListener('viewableChange',function(v){if(v)startGame();});
      // Safety: if viewableChange never fires, start after 2s
      setTimeout(startGame,2000);
    }
  }catch(e){startGame();}
}

function checkMraid(){
  if(window.mraid){
    try{
      var st=window.mraid.getState();
      if(st==='loading'){
        window.mraid.addEventListener('ready',launchWithMraid);
      }else{
        launchWithMraid();
      }
    }catch(e){startGame();}
  }else{
    startGame();
  }
}

// Wait for DOM then check mraid
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',checkMraid);
}else{
  checkMraid();
}
// Absolute fallback: force start after 3s no matter what
setTimeout(startGame,3000);
})();
</script>
