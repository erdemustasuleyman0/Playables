<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Color Merge Drop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F5E6D0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    touch-action: none;
  }
  #gameWrapper {
    position: relative;
    width: 100%;
    max-width: 420px;
    height: 100vh;
    margin: 0 auto;
    overflow: hidden;
    background: #F5E6D0;
  }
  #uiCanvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 5;
  }
  #gameCanvas {
    position: absolute;
    top: 0; left: 0;
    z-index: 1;
  }
  #vfxCanvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 10;
  }
  #touchLayer {
    position: absolute;
    z-index: 20;
    cursor: crosshair;
  }
  #overlay {
    position: absolute;
    z-index: 50;
    display: flex;
    justify-content: center;
    align-items: center;
    display: none;
  }
  .card {
    background: #FFF8F0;
    border-radius: 24px;
    padding: 32px 36px;
    text-align: center;
    border: 3px solid #D4C4B0;
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
  }
  .card h1 {
    font-size: 32px;
    font-weight: 900;
    color: #5D4E37;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .card .scoreText {
    font-size: 20px;
    font-weight: 700;
    color: #8B7355;
    margin-bottom: 24px;
  }
  .card button {
    background: #43A047;
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 14px 28px;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 auto;
    transition: opacity 0.15s, transform 0.15s;
  }
  .card button:active { opacity: 0.8; transform: scale(0.96); }
  #gameLogo {
    position: absolute;
    z-index: 100;
    height: 42px;
    opacity: 0.85;
    pointer-events: none;
  }
  #levelUpOverlay {
    position: absolute;
    z-index: 60;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    background: rgba(0,0,0,0.35);
    display: none;
  }
  #levelUpCard {
    background: #FFF8F0;
    border-radius: 28px;
    padding: 28px 40px;
    text-align: center;
    border: 3px solid #E8A035;
    box-shadow: 0 6px 24px rgba(232,160,53,0.35);
    transform: scale(0.3);
    opacity: 0;
    transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.2s;
  }
  #levelUpCard.show {
    transform: scale(1);
    opacity: 1;
  }
  #levelUpCard .lvlTitle {
    font-size: 28px;
    font-weight: 900;
    color: #E8A035;
    letter-spacing: 3px;
    margin-bottom: 12px;
  }
  #levelUpCard .lvlBadge {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: #E8A035;
    border: 3px solid #C4872A;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 10px;
    box-shadow: 0 3px 10px rgba(196,135,42,0.4);
  }
  #levelUpCard .lvlBadge span {
    font-size: 26px; font-weight: 900; color: #fff;
  }
  #levelUpCard .lvlSubtitle {
    font-size: 16px; font-weight: 700;
    color: #8B7355; letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>

        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
        Play Again

</div>

<script>
// ─── STORE REDIRECT (5-click playable) ───────────────────────────────────────
const STORE_IOS = 'https://apps.apple.com/tr/app/match-villains/id6479752688';
const STORE_ANDROID = 'https://play.google.com/store/apps/details?id=com.goodjobgames.matchvillains&hl=en';
const MAX_CLICKS = 7;
let clickCount = 0;

function getStoreURL() {
  const ua = navigator.userAgent || '';
  if (/iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
    return STORE_IOS;
  }
  return STORE_ANDROID;
}

function goToStore() {
  const url = getStoreURL();
  try {
    if (typeof mraid !== 'undefined' && mraid.open) {
      mraid.open(url);
    } else {
      window.open(url, '_blank');
    }
  } catch (e) {
    window.open(url, '_blank');
  }
}

function trackClick() {
  clickCount++;
  if (clickCount >= MAX_CLICKS) {
    goToStore();
    return true; // blocked
  }
  return false; // allowed
}

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const ITEM_COLORS = [
  { name:'red',    main:'#FF5252', dark:'#C62828', light:'#FF8A80', face:'#7F1D1D' },
  { name:'green',  main:'#43A047', dark:'#2E7D32', light:'#A5D6A7', face:'#1B5E20' },
  { name:'yellow', main:'#FFD54F', dark:'#F9A825', light:'#FFF9C4', face:'#7C6200' },
  { name:'blue',   main:'#42A5F5', dark:'#1565C0', light:'#90CAF9', face:'#0D47A1' },
  { name:'purple', main:'#AB47BC', dark:'#7B1FA2', light:'#CE93D8', face:'#4A148C' },
];
const GREY_COLOR = { name:'grey', main:'#9E9E9E', dark:'#616161', light:'#BDBDBD', face:'#424242' };
const LEVEL_CONFIG = [
  { radius: 20, points: 10 },
  { radius: 31, points: 30 },
  { radius: 43, points: 60 },
];
const PHYSICS = {
  GRAVITY: 0.38, DAMPING: 0.35, FRICTION: 0.986,
  MERGE_THRESHOLD: 5, CLEAR_RADIUS: 130,
  SOLVER_ITERATIONS: 8, DROP_COOLDOWN: 500, SETTLE_VELOCITY: 0.15,
};
const GAME_LEVELS = [
  { level:1, targetScore:75,    label:'Rookie'  },
  { level:2, targetScore:225,   label:'Hustler' },
  { level:3, targetScore:500,   label:'Dealer'  },
  { level:4, targetScore:875,   label:'Banker'  },
  { level:5, targetScore:1375,  label:'Tycoon'  },
  { level:6, targetScore:2000,  label:'Mogul'   },
  { level:7, targetScore:2750,  label:'Baron'   },
  { level:8, targetScore:3750,  label:'King'    },
  { level:9, targetScore:5000,  label:'Emperor' },
  { level:10,targetScore:6875,  label:'Legend'  },
];
const GAME_THEME = {
  background:'#F5E6D0', backgroundStripe:'#EFE0CA',
  boxFill:'#FFF8F0', boxBorder:'#8B7355', boxBorderWidth:4,
  dangerLine:'#FF5252', trajectoryColor:'rgba(139,115,85,0.25)',
  scoreBackground:'#FFF8F0', scoreBorder:'#D4C4B0',
  textPrimary:'#5D4E37', textSecondary:'#8B7355',
};
const VFX_MESSAGES = ['BOOM!','MEGA!','EPIC!','WOW!','SMASH!','BLAST!','KABOOM!'];

// ─── LAYOUT ──────────────────────────────────────────────────────────────────
const wrapper   = document.getElementById('gameWrapper');
const gameCanvas = document.getElementById('gameCanvas');
const vfxCanvas  = document.getElementById('vfxCanvas');
const uiCanvas   = document.getElementById('uiCanvas');
const touchLayer = document.getElementById('touchLayer');
const overlay    = document.getElementById('overlay');
const finalScoreEl = document.getElementById('finalScore');
const levelUpOverlay = document.getElementById('levelUpOverlay');
const levelUpCard    = document.getElementById('levelUpCard');
const lvlNumEl       = document.getElementById('lvlNum');
const lvlLabelEl     = document.getElementById('lvlLabel');

const gCtx = gameCanvas.getContext('2d');
const vCtx = vfxCanvas.getContext('2d');
const uCtx = uiCanvas.getContext('2d');

let W, H, BOX_WIDTH, BOX_LEFT, BOX_RIGHT, BOX_TOP, BOX_BOTTOM, BOX_HEIGHT;
let DANGER_Y, DROP_ZONE_Y, TOP_BAR_HEIGHT;
const SIDE_PADDING = 16;
const SAFE_TOP = 44;

function computeLayout() {
  W = wrapper.offsetWidth;
  H = wrapper.offsetHeight;
  gameCanvas.width = vfxCanvas.width = uiCanvas.width = W;
  gameCanvas.height = vfxCanvas.height = uiCanvas.height = H;
  TOP_BAR_HEIGHT = 80 + SAFE_TOP;
  DROP_ZONE_Y    = TOP_BAR_HEIGHT + 44;
  BOX_TOP        = DROP_ZONE_Y + 55;
  BOX_HEIGHT     = Math.min(H - BOX_TOP - 70, 500);
  BOX_BOTTOM     = BOX_TOP + BOX_HEIGHT;
  BOX_WIDTH      = W - SIDE_PADDING * 2;
  BOX_LEFT       = SIDE_PADDING;
  BOX_RIGHT      = BOX_LEFT + BOX_WIDTH;
  DANGER_Y       = BOX_TOP + 30;

  touchLayer.style.left   = BOX_LEFT + 'px';
  touchLayer.style.top    = (BOX_TOP - 60) + 'px';
  touchLayer.style.width  = BOX_WIDTH + 'px';
  touchLayer.style.height = (BOX_HEIGHT + 60) + 'px';

  overlay.style.left   = BOX_LEFT + 'px';
  overlay.style.top    = BOX_TOP + 'px';
  overlay.style.width  = BOX_WIDTH + 'px';
  overlay.style.height = BOX_HEIGHT + 'px';

  levelUpOverlay.style.left   = BOX_LEFT + 'px';
  levelUpOverlay.style.top    = BOX_TOP + 'px';
  levelUpOverlay.style.width  = BOX_WIDTH + 'px';
  levelUpOverlay.style.height = BOX_HEIGHT + 'px';

  const logoEl = document.getElementById('gameLogo');
  logoEl.style.left = (SIDE_PADDING + 4) + 'px';
  logoEl.style.top  = (BOX_BOTTOM + 14) + 'px';
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let idCounter = 0;
function nextId() { return 'b' + (++idCounter) + '_' + Date.now(); }
function randomColor() { return Math.floor(Math.random() * 5); }
function generatePiece() {
  const r = Math.random();
  const level = r < 0.8 ? 0 : r < 0.95 ? 1 : 2;
  return { colorIndex: randomColor(), level };
}

let balls = [];
let score = 0;
let gameOver = false;
let currentPiece = generatePiece();
let nextPiece    = generatePiece();
let dropX        = 0;
let canDrop      = true;
let gameLevel    = 0;
let moveCount    = 0;
let mergeCount   = 0;
let animId       = null;

// VFX
let vfxList = []; // { id, x, y, colorIndex, score, t, msg }
let mergePopList = []; // { x, y, colorIndex, t, radius } - small merge pops

// Progress bar animation
let progressBarTarget = 0;
let progressBarCurrent = 0;

// Screen flash
let screenFlash = 0; // 0–1

// Level-up animation
let levelUpActive = false;
let levelUpTimeout = null;
let levelUpConfetti = []; // { x, y, vx, vy, size, color, rot, rotSpeed, shape }

// ─── BALL GENERATION ─────────────────────────────────────────────────────────
function generateInitialBalls() {
  const result = [];
  // Fixed board: 9 L0 (small) + 8 L1 (medium) + 4 L2 (large) = 21 balls, mixed per row
  // Same-color same-level duplicates spaced far apart to prevent auto-merges
  // Each ball: [relX, level, colorIndex]
  const rows = [
    // Row 0 (floor) - mixed sizes
    { balls: [
      [0.22, 1, 1], [0.40, 2, 2], [0.58, 0, 3], [0.76, 1, 4], [0.92, 2, 0]
    ]},
    // Row 1 - mixed sizes
    { balls: [
      [0.24, 2, 3], [0.44, 1, 2], [0.62, 0, 4], [0.80, 1, 1]
    ]},
    // Row 2 - mixed sizes
    { balls: [
      [0.10, 1, 3], [0.32, 2, 1], [0.55, 0, 0], [0.76, 1, 2], [0.94, 0, 1]
    ]},
    // Row 3 - mixed sizes
    { balls: [
      [0.25, 0, 2], [0.50, 1, 4], [0.78, 1, 0]
    ]},
    // Row 4 - top, small balls
    { balls: [
      [0.15, 0, 4], [0.38, 0, 1], [0.62, 0, 3], [0.85, 0, 0]
    ]},
  ];

  let currentY = BOX_BOTTOM;
  for (const row of rows) {
    // Use max radius in this row for row spacing
    const maxR = Math.max(...row.balls.map(b => LEVEL_CONFIG[b[1]].radius));
    currentY -= maxR;
    for (const [rx, level, ci] of row.balls) {
      const radius = LEVEL_CONFIG[level].radius;
      const x = BOX_LEFT + rx * BOX_WIDTH;
      result.push({
        id: nextId(),
        x: Math.max(BOX_LEFT + radius, Math.min(BOX_RIGHT - radius, x)),
        y: Math.min(BOX_BOTTOM - radius, currentY),
        vx: 0, vy: 0, radius,
        colorIndex: ci, level,
        justCreated: false, isGrey: false,
      });
    }
    currentY -= maxR;
  }
  return result;
}

function generateGreyRisingRow() {
  const result = [];
  const count = 3 + Math.floor(Math.random() * 2);
  const usableW = BOX_RIGHT - BOX_LEFT;
  const spacing = usableW / (count + 1);
  for (let i = 0; i < count; i++) {
    const lr = Math.random();
    const level = lr < 0.6 ? 0 : lr < 0.9 ? 1 : 2;
    const radius = LEVEL_CONFIG[level].radius;
    const x = BOX_LEFT + spacing * (i + 1) + (Math.random() - 0.5) * 10;
    result.push({
      id: nextId(),
      x: Math.max(BOX_LEFT + radius, Math.min(BOX_RIGHT - radius, x)),
      y: BOX_BOTTOM - radius,
      vx: 0, vy: -3.5, radius,
      colorIndex: 0, level,
      justCreated: true, isGrey: true,
    });
  }
  return result;
}

function hasBallAbove(ball, allBalls) {
  const checkW = ball.radius * 2.2;
  for (const other of allBalls) {
    if (other.id === ball.id || other.isGrey) continue;
    if (Math.abs(other.x - ball.x) < checkW && other.y < ball.y - ball.radius * 0.5) return true;
  }
  return false;
}

function dist(ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  return Math.sqrt(dx * dx + dy * dy);
}

// ─── PHYSICS ─────────────────────────────────────────────────────────────────
function updatePhysics() {
  if (gameOver) return;
  const { GRAVITY, DAMPING, FRICTION, SOLVER_ITERATIONS, MERGE_THRESHOLD, CLEAR_RADIUS } = PHYSICS;

  for (let i = 0; i < balls.length; i++) {
    const b = balls[i];
    b.vy += GRAVITY;
    b.vx *= FRICTION;
    b.x += b.vx;
    b.y += b.vy;

    if (b.x - b.radius < BOX_LEFT)  { b.x = BOX_LEFT + b.radius;  b.vx =  Math.abs(b.vx) * DAMPING; }
    if (b.x + b.radius > BOX_RIGHT) { b.x = BOX_RIGHT - b.radius; b.vx = -Math.abs(b.vx) * DAMPING; }
    if (b.y + b.radius > BOX_BOTTOM) {
      b.y = BOX_BOTTOM - b.radius;
      b.vy = -Math.abs(b.vy) * DAMPING;
      if (Math.abs(b.vy) < 0.5) b.vy = 0;
    }
  }

  for (let iter = 0; iter < SOLVER_ITERATIONS; iter++) {
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        const minD = a.radius + b.radius;
        if (d < minD && d > 0.01) {
          const overlap = minD - d;
          const nx = dx / d, ny = dy / d;
          const push = overlap * 0.5;
          a.x -= nx * push; a.y -= ny * push;
          b.x += nx * push; b.y += ny * push;
          const relVx = a.vx - b.vx, relVy = a.vy - b.vy;
          const dot = relVx * nx + relVy * ny;
          if (dot > 0) {
            const imp = dot * (1 - DAMPING);
            a.vx -= imp * nx * 0.5; a.vy -= imp * ny * 0.5;
            b.vx += imp * nx * 0.5; b.vy += imp * ny * 0.5;
          }
        }
      }
    }
    for (let i = 0; i < balls.length; i++) {
      const b = balls[i];
      if (b.x - b.radius < BOX_LEFT)   b.x = BOX_LEFT + b.radius;
      if (b.x + b.radius > BOX_RIGHT)  b.x = BOX_RIGHT - b.radius;
      if (b.y + b.radius > BOX_BOTTOM) b.y = BOX_BOTTOM - b.radius;
    }
  }

  // Merge detection
  let merged = false;
  for (let i = 0; i < balls.length && !merged; i++) {
    if (balls[i].justCreated || balls[i].isGrey) continue;
    for (let j = i + 1; j < balls.length && !merged; j++) {
      if (balls[j].justCreated || balls[j].isGrey) continue;
      const a = balls[i], b = balls[j];
      if (a.colorIndex === b.colorIndex && a.level === b.level) {
        const d = dist(a.x, a.y, b.x, b.y);
        if (d < a.radius + b.radius + MERGE_THRESHOLD) {
          const midX = (a.x + b.x) / 2, midY = (a.y + b.y) / 2;
          if (a.level >= 2) {
            // Clear explosion
            const clearedIds = new Set();
            for (const ball of balls) {
              if (ball.id !== a.id && ball.id !== b.id) {
                if (dist(midX, midY, ball.x, ball.y) < CLEAR_RADIUS) clearedIds.add(ball.id);
              }
            }
            balls = balls.filter(ball => ball.id !== a.id && ball.id !== b.id && !clearedIds.has(ball.id));
            const bonus = clearedIds.size * 15;
            const totalScore = LEVEL_CONFIG[a.level].points + bonus;
            score += totalScore;
            triggerScreenFlash(1);
            spawnVFX(midX, midY, a.colorIndex, totalScore);
          } else {
            const newLevel = a.level + 1;
            const newRadius = LEVEL_CONFIG[newLevel].radius;
            const newBall = {
              id: nextId(),
              x: midX, y: midY,
              vx: (a.vx + b.vx) * 0.15,
              vy: (a.vy + b.vy) * 0.15 - 1.5,
              radius: newRadius,
              colorIndex: a.colorIndex, level: newLevel,
              justCreated: true, isGrey: false,
            };
            balls = balls.filter(ball => ball.id !== a.id && ball.id !== b.id);
            balls.push(newBall);
            score += LEVEL_CONFIG[newLevel].points;
            spawnMergePop(midX, midY, a.colorIndex, newRadius);
            triggerScreenFlash(0.4);
          }
          mergeCount++;
          merged = true;
        }
      }
    }
  }

  for (const b of balls) b.justCreated = false;

  // Grey bag color conversion
  for (const b of balls) {
    if (b.isGrey && !hasBallAbove(b, balls)) {
      b.isGrey = false;
      b.colorIndex = randomColor();
    }
  }

  // Settle check & game over
  let settled = true;
  for (const b of balls) {
    if (Math.abs(b.vy) > PHYSICS.SETTLE_VELOCITY || Math.abs(b.vx) > PHYSICS.SETTLE_VELOCITY) {
      settled = false; break;
    }
  }
  if (settled && !canDrop && balls.length > 0) {
    for (const b of balls) {
      if (b.isGrey) continue;
      if (b.y - b.radius < DANGER_Y) {
        triggerGameOver(); return;
      }
    }
  }

  // Level progression
  checkLevelUp();
  updateProgressBar();
}

function checkLevelUp() {
  if (gameLevel >= GAME_LEVELS.length) return;
  const cfg = GAME_LEVELS[gameLevel];
  if (score >= cfg.targetScore) {
    gameLevel++;
    triggerLevelUp(gameLevel);
  }
}

function updateProgressBar() {
  const isMax = gameLevel >= GAME_LEVELS.length;
  if (isMax) { progressBarTarget = 1; return; }
  const cfg = GAME_LEVELS[gameLevel];
  const prevTarget = gameLevel > 0 ? GAME_LEVELS[gameLevel - 1].targetScore : 0;
  const range = cfg.targetScore - prevTarget;
  const progress = Math.min(1, Math.max(0, (score - prevTarget) / range));
  progressBarTarget = progress;
}

// ─── SCREEN FLASH ────────────────────────────────────────────────────────────
let flashTimeout = null;
function triggerScreenFlash(intensity) {
  screenFlash = intensity;
  if (flashTimeout) clearTimeout(flashTimeout);
  flashTimeout = setTimeout(() => { screenFlash = 0; }, 300);
}

// ─── GAME OVER ────────────────────────────────────────────────────────────────
function triggerGameOver() {
  gameOver = true;
  overlay.style.display = 'flex';
  finalScoreEl.textContent = 'Score: ' + score;
}

// ─── LEVEL UP ────────────────────────────────────────────────────────────────
function spawnLevelUpConfetti() {
  const colors = ['#FF5252','#43A047','#FFD54F','#42A5F5','#AB47BC','#FFD700','#E8A035','#FF8A80','#fff'];
  levelUpConfetti = [];
  for (let i = 0; i < 80; i++) {
    const side = Math.random() < 0.5;
    levelUpConfetti.push({
      x: BOX_LEFT + (side ? 0 : BOX_WIDTH) + (Math.random()-0.5) * BOX_WIDTH * 0.3,
      y: BOX_TOP + BOX_HEIGHT * 0.15 + Math.random() * BOX_HEIGHT * 0.35,
      vx: (side ? 1 : -1) * (2 + Math.random() * 5),
      vy: -4 - Math.random() * 8,
      size: 4 + Math.random() * 10,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      shape: Math.floor(Math.random() * 3), // 0=rect, 1=circle, 2=star
      life: 1,
    });
  }
}

function updateLevelUpConfetti(dt) {
  for (const c of levelUpConfetti) {
    c.x += c.vx;
    c.vy += 0.1;
    c.y += c.vy;
    c.rot += c.rotSpeed;
    c.life -= dt * 0.25;
    c.vx *= 0.99;
  }
  levelUpConfetti = levelUpConfetti.filter(c => c.life > 0 && c.y < BOX_BOTTOM + 50);
}

function drawLevelUpConfetti(ctx) {
  for (const c of levelUpConfetti) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, c.life);
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    if (c.shape === 0) {
      ctx.fillRect(-c.size/2, -c.size/4, c.size, c.size/2);
    } else if (c.shape === 1) {
      ctx.beginPath();
      ctx.arc(0, 0, c.size/2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // star
      ctx.beginPath();
      for (let s = 0; s < 5; s++) {
        const a = (s * 4 * Math.PI) / 5 - Math.PI / 2;
        const r = s === 0 ? c.size/2 : c.size/2;
        const method = s === 0 ? 'moveTo' : 'lineTo';
        ctx[method](Math.cos((s*4*Math.PI)/5 - Math.PI/2) * c.size/2,
                     Math.sin((s*4*Math.PI)/5 - Math.PI/2) * c.size/2);
      }
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
}

function triggerLevelUp(level) {
  if (levelUpActive) return;
  levelUpActive = true;
  const cfg = GAME_LEVELS[Math.min(level - 1, GAME_LEVELS.length - 1)];
  lvlNumEl.textContent = level;
  lvlLabelEl.textContent = cfg ? cfg.label : 'MAX';
  levelUpOverlay.style.display = 'flex';
  // Reset inline styles so CSS class can take effect
  levelUpCard.style.transform = '';
  levelUpCard.style.opacity = '';
  levelUpCard.classList.remove('show');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      levelUpCard.classList.add('show');
    });
  });
  triggerScreenFlash(0.6);
  spawnLevelUpConfetti();
  if (levelUpTimeout) clearTimeout(levelUpTimeout);
  levelUpTimeout = setTimeout(() => {
    levelUpCard.classList.remove('show');
    setTimeout(() => {
      levelUpOverlay.style.display = 'none';
      levelUpActive = false;
    }, 400);
  }, 1200);
}

// ─── VFX ─────────────────────────────────────────────────────────────────────
function spawnVFX(x, y, colorIndex, scoreVal) {
  const msg = VFX_MESSAGES[Math.floor(Math.random() * VFX_MESSAGES.length)];
  const particles = Array.from({ length: 16 }, (_, i) => ({
    angle: Math.random() * Math.PI * 2,
    speed: 40 + Math.random() * 100,
    size: 4 + Math.random() * 8,
    isSquare: i % 3 === 0,
    isStar: i % 5 === 0,
  }));
  vfxList.push({ id: 'vfx_' + Date.now() + Math.random(), x, y, colorIndex, score: scoreVal, t: 0, msg, particles });
}

function spawnMergePop(x, y, colorIndex, radius) {
  mergePopList.push({ x, y, colorIndex, t: 0, radius });
}

function updateMergePops(dt) {
  for (const p of mergePopList) p.t += dt * 2.5;
  mergePopList = mergePopList.filter(p => p.t < 1);
}

function drawMergePops(ctx) {
  for (const p of mergePopList) {
    const color = ITEM_COLORS[p.colorIndex];
    const t = p.t;
    // Expanding ring
    const ringR = p.radius * (1 + t * 1.5);
    const ringAlpha = Math.max(0, 1 - t);
    ctx.beginPath();
    ctx.arc(p.x, p.y, ringR, 0, Math.PI * 2);
    ctx.strokeStyle = color.main;
    ctx.lineWidth = 2.5 * (1 - t);
    ctx.globalAlpha = ringAlpha * 0.7;
    ctx.stroke();
    ctx.globalAlpha = 1;
    // Small particles (6)
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2;
      const dist = p.radius * (0.5 + t * 2);
      const px = p.x + Math.cos(angle) * dist;
      const py = p.y + Math.sin(angle) * dist;
      const size = (3 + Math.random()) * (1 - t);
      ctx.beginPath();
      ctx.arc(px, py, size, 0, Math.PI * 2);
      ctx.fillStyle = i % 2 === 0 ? color.light : '#FFD700';
      ctx.globalAlpha = Math.max(0, 1 - t * 1.2);
      ctx.fill();
    }
    // Score text
    const scoreText = '+' + LEVEL_CONFIG[Math.min(2, Math.round(p.radius / 15))].points;
    ctx.globalAlpha = Math.max(0, 1 - t * 1.3);
    ctx.font = '800 14px -apple-system, sans-serif';
    ctx.fillStyle = color.dark;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(scoreText, p.x, p.y - p.radius - 8 - t * 20);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    ctx.globalAlpha = 1;
  }
}

function updateVFX(dt) {
  vfxList = vfxList.filter(v => v.t < 1.0);
  for (const v of vfxList) v.t += dt * 1.2;
}

function drawAimingBall(ctx) {
  if (gameOver || !canDrop) return;
  const r = LEVEL_CONFIG[currentPiece.level].radius;
  const color = ITEM_COLORS[currentPiece.colorIndex];
  const size = r * 2;
  // Tie
  const tieW = size * 0.3, tieH = size * 0.18;
  ctx.fillStyle = color.dark;
  ctx.beginPath();
  ctx.roundRect(dropX - tieW/2, DROP_ZONE_Y - r - tieH * 0.55, tieW, tieH, tieH/2);
  ctx.fill();
  // Body
  ctx.beginPath();
  ctx.arc(dropX, DROP_ZONE_Y, r, 0, Math.PI * 2);
  ctx.fillStyle = color.main;
  ctx.fill();
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = color.dark;
  ctx.stroke();
  // Highlight
  ctx.beginPath();
  ctx.ellipse(dropX - r*0.2, DROP_ZONE_Y - r*0.3, r*0.15, r*0.075, -0.3, 0, Math.PI*2);
  ctx.fillStyle = color.light;
  ctx.globalAlpha = 0.6;
  ctx.fill();
  ctx.globalAlpha = 1;
  // Eyes
  const eyeSize = Math.max(4, r * 0.18);
  const pupilSize = eyeSize * 0.55;
  const eyeSpacingX = r * 0.28;
  const eyeY = DROP_ZONE_Y - r * 0.1;
  for (const ex of [dropX - eyeSpacingX, dropX + eyeSpacingX]) {
    ctx.beginPath(); ctx.arc(ex, eyeY, eyeSize, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(ex + eyeSize*0.1, eyeY + eyeSize*0.1, pupilSize, 0, Math.PI*2);
    ctx.fillStyle = '#2D2D2D'; ctx.fill();
  }
  // Level badge
  const lvlFontSize = Math.max(8, r * 0.28);
  const lvlText = 'Lv.' + (currentPiece.level + 1);
  ctx.font = `900 ${lvlFontSize}px -apple-system, sans-serif`;
  const tw = ctx.measureText(lvlText).width;
  const padX = r * 0.15, padY = r * 0.04;
  const bw = tw + padX * 2, bh = lvlFontSize + padY * 2;
  const bx2 = dropX - bw/2, by2 = DROP_ZONE_Y + r * 0.2;
  ctx.fillStyle = color.dark;
  ctx.beginPath(); ctx.roundRect(bx2, by2, bw, bh, r * 0.18); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(lvlText, dropX, by2 + bh/2);
  ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
}

function drawVFX() {
  vCtx.clearRect(0, 0, W, H);
  // Draw aiming ball on vfx canvas (topmost layer, above UI bar only in aim zone)
  drawAimingBall(vCtx);
  for (const v of vfxList) {
    const color = ITEM_COLORS[v.colorIndex];
    const t = Math.min(v.t, 1);
    const fade = t < 0.7 ? 1 : 1 - (t - 0.7) / 0.3;
    vCtx.save();
    vCtx.globalAlpha = fade;
    // Flash circle
    const flashAlpha = Math.max(0, 1 - t * 2.5);
    if (flashAlpha > 0) {
      vCtx.beginPath();
      vCtx.arc(v.x, v.y, 40 * (1 + t * 2), 0, Math.PI * 2);
      vCtx.fillStyle = color.light;
      vCtx.globalAlpha = fade * flashAlpha * 0.5;
      vCtx.fill();
      vCtx.globalAlpha = fade;
    }
    // Expanding rings
    for (let ri = 0; ri < 2; ri++) {
      const ringT = Math.max(0, Math.min(1, t - ri * 0.15));
      const ringAlpha = Math.max(0, 0.8 - ringT * 0.8);
      const ringScale = ri === 0 ? 3.5 : 2.5;
      if (ringAlpha > 0) {
        vCtx.beginPath();
        vCtx.arc(v.x, v.y, 30 * ringT * ringScale, 0, Math.PI * 2);
        vCtx.strokeStyle = ri === 0 ? color.main : color.light;
        vCtx.lineWidth = 3;
        vCtx.globalAlpha = fade * ringAlpha;
        vCtx.stroke();
        vCtx.globalAlpha = fade;
      }
    }
    // Particles
    for (const p of v.particles) {
      const pt = Math.min(1, t * 1.5);
      const px = v.x + Math.cos(p.angle) * p.speed * pt;
      const py = v.y + Math.sin(p.angle) * p.speed * pt;
      const pAlpha = pt < 0.3 ? 1 : Math.max(0, 1 - (pt - 0.3) / 0.7);
      const pScale = pt < 0.5 ? 1 + pt * 0.4 : Math.max(0.2, 1.2 - (pt - 0.5) * 2);
      vCtx.globalAlpha = fade * pAlpha;
      vCtx.fillStyle = p.isStar ? '#FFD700' : (p.size % 2 === 0 ? color.main : color.light);
      vCtx.save();
      vCtx.translate(px, py);
      if (p.isSquare) vCtx.rotate(Math.PI / 4);
      const s = p.size * pScale;
      if (p.isSquare) {
        vCtx.beginPath();
        vCtx.roundRect(-s/2, -s/2, s, s, 2);
        vCtx.fill();
      } else {
        vCtx.beginPath();
        vCtx.arc(0, 0, s/2, 0, Math.PI * 2);
        vCtx.fill();
      }
      vCtx.restore();
      vCtx.globalAlpha = fade;
    }
    // Golden star rays
    vCtx.save();
    vCtx.translate(v.x, v.y);
    vCtx.globalAlpha = fade * Math.max(0, 1 - t * 1.5);
    for (const deg of [0, 60, 120, 180, 240, 300]) {
      const rad = deg * Math.PI / 180;
      vCtx.save();
      vCtx.rotate(rad);
      vCtx.fillStyle = '#FFD700';
      vCtx.beginPath();
      vCtx.roundRect(-1.5, -25, 3, 14, 1.5);
      vCtx.fill();
      vCtx.restore();
    }
    vCtx.restore();
    vCtx.globalAlpha = fade;
    // Score popup text
    const textY = v.y - t * 60;
    const textAlpha = t < 0.2 ? t / 0.2 : Math.max(0, 1 - (t - 0.4) / 0.6);
    const textScale = t < 0.2 ? 0.3 + 0.7 * (t / 0.2) : 1;
    vCtx.save();
    vCtx.globalAlpha = fade * textAlpha;
    vCtx.translate(v.x, textY);
    vCtx.scale(textScale, textScale);
    vCtx.textAlign = 'center';
    vCtx.font = '900 28px -apple-system, sans-serif';
    vCtx.fillStyle = color.dark;
    vCtx.shadowColor = 'rgba(255,255,255,0.8)';
    vCtx.shadowBlur = 4;
    vCtx.fillText(v.msg, 0, 0);
    vCtx.shadowBlur = 0;
    // Score bubble
    const bubbleText = '+' + v.score;
    vCtx.font = '800 18px -apple-system, sans-serif';
    const tw = vCtx.measureText(bubbleText).width;
    const bw = tw + 24, bh = 26;
    vCtx.fillStyle = color.dark;
    vCtx.beginPath();
    vCtx.roundRect(-bw/2, 8, bw, bh, 12);
    vCtx.fill();
    vCtx.fillStyle = '#fff';
    vCtx.fillText(bubbleText, 0, 8 + bh/2 + 6);
    vCtx.restore();
    vCtx.restore();
  }
}

// ─── DRAWING ─────────────────────────────────────────────────────────────────
function drawBall(ctx, ball) {
  const color = ball.isGrey ? GREY_COLOR : ITEM_COLORS[ball.colorIndex];
  // Round positions to prevent sub-pixel jitter
  const x = Math.round(ball.x);
  const y = Math.round(ball.y);
  const radius = ball.radius;
  const size = radius * 2;

  // Bag tie
  const tieW = size * 0.3, tieH = size * 0.18;
  ctx.fillStyle = color.dark;
  ctx.beginPath();
  ctx.roundRect(x - tieW/2, y - radius - tieH * 0.55, tieW, tieH, tieH/2);
  ctx.fill();

  // Body circle
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fillStyle = color.main;
  ctx.fill();
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = color.dark;
  ctx.stroke();

  // Highlight
  ctx.beginPath();
  ctx.ellipse(x - radius*0.2, y - radius*0.3, radius*0.15, radius*0.075, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = color.light;
  ctx.globalAlpha = 0.6;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Face
  if (ball.isGrey) {
    const fontSize = Math.max(8, radius * 0.28);
    ctx.font = `900 ${fontSize * 1.8}px -apple-system, sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('?', x, y);
    ctx.textBaseline = 'alphabetic';
  } else {
    // Eyes
    const eyeSize = Math.max(4, radius * 0.18);
    const pupilSize = eyeSize * 0.55;
    const eyeSpacingX = radius * 0.28;
    const eyeY = y - radius * 0.1;
    for (const ex of [x - eyeSpacingX, x + eyeSpacingX]) {
      ctx.beginPath();
      ctx.arc(ex, eyeY, eyeSize, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + eyeSize * 0.1, eyeY + eyeSize * 0.1, pupilSize, 0, Math.PI * 2);
      ctx.fillStyle = '#2D2D2D';
      ctx.fill();
    }
    // Level badge
    const lvlFontSize = Math.max(8, radius * 0.28);
    const lvlText = 'Lv.' + (ball.level + 1);
    ctx.font = `900 ${lvlFontSize}px -apple-system, sans-serif`;
    const tw = ctx.measureText(lvlText).width;
    const padX = radius * 0.15, padY = radius * 0.04;
    const bw = tw + padX * 2, bh = lvlFontSize + padY * 2;
    const bx = x - bw/2, by = y + radius * 0.2;
    ctx.fillStyle = color.dark;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, radius * 0.18);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(lvlText, x, by + bh/2);
    ctx.textBaseline = 'alphabetic';
  }
  ctx.textAlign = 'left';
}

function drawGame() {
  gCtx.clearRect(0, 0, W, H);

  // Background stripes
  const stripeW = BOX_WIDTH / 12;
  for (let i = 0; i < 12; i++) {
    gCtx.fillStyle = i % 2 === 0 ? GAME_THEME.boxFill : '#FFF5E8';
    gCtx.fillRect(BOX_LEFT + i * stripeW, BOX_TOP, stripeW, BOX_HEIGHT);
  }

  // Danger line
  gCtx.beginPath();
  gCtx.moveTo(BOX_LEFT + 8, DANGER_Y);
  gCtx.lineTo(BOX_RIGHT - 8, DANGER_Y);
  gCtx.strokeStyle = 'rgba(255,82,82,0.2)';
  gCtx.lineWidth = 1.5;
  gCtx.stroke();

  // Trajectory dots
  if (!gameOver && canDrop) {
    const startY = DROP_ZONE_Y + LEVEL_CONFIG[currentPiece.level].radius + 5;
    const step = 14;
    gCtx.fillStyle = GAME_THEME.trajectoryColor;
    for (let y = startY; y < BOX_BOTTOM; y += step) {
      gCtx.beginPath();
      gCtx.roundRect(dropX - 1.5, y, 3, 8, 1.5);
      gCtx.fill();
    }
  }

  // Balls (sorted by y)
  const sorted = [...balls].sort((a, b) => a.y - b.y);
  for (const b of sorted) drawBall(gCtx, b);

  // (Aiming ball drawn in drawVFX for proper z-order)

  // Box borders
  const bw4 = GAME_THEME.boxBorderWidth;
  gCtx.fillStyle = GAME_THEME.boxBorder;
  // Left
  gCtx.beginPath(); gCtx.roundRect(BOX_LEFT - bw4, BOX_TOP, bw4, BOX_HEIGHT + bw4, [4,0,0,4]); gCtx.fill();
  // Right
  gCtx.beginPath(); gCtx.roundRect(BOX_RIGHT, BOX_TOP, bw4, BOX_HEIGHT + bw4, [0,4,4,0]); gCtx.fill();
  // Bottom
  gCtx.beginPath(); gCtx.roundRect(BOX_LEFT - bw4, BOX_BOTTOM, BOX_WIDTH + bw4*2, bw4, [0,0,4,4]); gCtx.fill();

  // Screen flash
  if (screenFlash > 0) {
    gCtx.fillStyle = '#FFFDE7';
    gCtx.globalAlpha = screenFlash * 0.5;
    gCtx.fillRect(BOX_LEFT, BOX_TOP, BOX_WIDTH, BOX_HEIGHT);
    gCtx.globalAlpha = 1;
    screenFlash = Math.max(0, screenFlash - 0.06);
  }
}

function drawUI() {
  uCtx.clearRect(0, 0, W, H);

  // Top bar background (only fill the actual top bar, not the aiming zone)
  uCtx.fillStyle = GAME_THEME.background;
  uCtx.fillRect(0, 0, W, TOP_BAR_HEIGHT + 8);

  // Level badge
  const lbX = SIDE_PADDING + 4, lbY = 12 + SAFE_TOP, lbSize = 40;
  uCtx.fillStyle = '#E8A035';
  uCtx.beginPath();
  uCtx.roundRect(lbX, lbY, lbSize, lbSize, 12);
  uCtx.fill();
  uCtx.strokeStyle = '#C4872A';
  uCtx.lineWidth = 2.5;
  uCtx.stroke();
  const isMax = gameLevel >= GAME_LEVELS.length;
  uCtx.font = '900 18px -apple-system, sans-serif';
  uCtx.fillStyle = '#fff';
  uCtx.textAlign = 'center';
  uCtx.textBaseline = 'middle';
  uCtx.fillText(isMax ? 'M' : String(gameLevel + 1), lbX + lbSize/2, lbY + lbSize/2);
  uCtx.textBaseline = 'alphabetic';

  // Level label
  const lvlCfg = GAME_LEVELS[Math.min(gameLevel, GAME_LEVELS.length - 1)];
  uCtx.font = '700 11px -apple-system, sans-serif';
  uCtx.fillStyle = GAME_THEME.textSecondary;
  uCtx.textAlign = 'left';
  uCtx.fillText((isMax ? 'LEGEND' : lvlCfg.label.toUpperCase()), lbX + lbSize + 10, lbY + 14);

  // Score
  uCtx.font = '900 22px -apple-system, sans-serif';
  uCtx.fillStyle = GAME_THEME.textPrimary;
  uCtx.fillText(String(score), lbX + lbSize + 10, lbY + 36);

  // NEXT piece
  const nextBoxW = 70, nextBoxH = 56;
  const nbrX = W - SIDE_PADDING - 4 - nextBoxW, nbrY = 10 + SAFE_TOP;
  uCtx.fillStyle = GAME_THEME.scoreBackground;
  uCtx.beginPath();
  uCtx.roundRect(nbrX, nbrY, nextBoxW, nextBoxH, 16);
  uCtx.fill();
  uCtx.strokeStyle = GAME_THEME.scoreBorder;
  uCtx.lineWidth = 2;
  uCtx.stroke();
  uCtx.font = '700 11px -apple-system, sans-serif';
  uCtx.fillStyle = GAME_THEME.textSecondary;
  uCtx.textAlign = 'center';
  uCtx.fillText('NEXT', nbrX + nextBoxW/2, nbrY + 16);
  const nextColor = ITEM_COLORS[nextPiece.colorIndex];
  const nextR = Math.min(LEVEL_CONFIG[nextPiece.level].radius * 0.7, 16);
  const ncx = nbrX + nextBoxW/2, ncy = nbrY + 37;
  // Tie
  const ntW = nextR*2*0.3, ntH = nextR*2*0.18;
  uCtx.fillStyle = nextColor.dark;
  uCtx.beginPath();
  uCtx.roundRect(ncx - ntW/2, ncy - nextR - ntH*0.55, ntW, ntH, ntH/2);
  uCtx.fill();
  // Body
  uCtx.beginPath();
  uCtx.arc(ncx, ncy, nextR, 0, Math.PI * 2);
  uCtx.fillStyle = nextColor.main;
  uCtx.fill();
  uCtx.strokeStyle = nextColor.dark;
  uCtx.lineWidth = 2;
  uCtx.stroke();
  // Highlight
  uCtx.beginPath();
  uCtx.ellipse(ncx - nextR*0.2, ncy - nextR*0.3, nextR*0.15, nextR*0.075, -0.3, 0, Math.PI*2);
  uCtx.fillStyle = nextColor.light;
  uCtx.globalAlpha = 0.6;
  uCtx.fill();
  uCtx.globalAlpha = 1;
  // Eyes
  const neSize = Math.max(3, nextR * 0.18);
  const npSize = neSize * 0.55;
  const neSpX = nextR * 0.28;
  const neY = ncy - nextR * 0.1;
  for (const ex of [ncx - neSpX, ncx + neSpX]) {
    uCtx.beginPath(); uCtx.arc(ex, neY, neSize, 0, Math.PI*2);
    uCtx.fillStyle = '#fff'; uCtx.fill();
    uCtx.beginPath(); uCtx.arc(ex + neSize*0.1, neY + neSize*0.1, npSize, 0, Math.PI*2);
    uCtx.fillStyle = '#2D2D2D'; uCtx.fill();
  }
  // Level badge
  const nlFs = Math.max(7, nextR * 0.28);
  const nlTxt = 'Lv.' + (nextPiece.level + 1);
  uCtx.font = `900 ${nlFs}px -apple-system, sans-serif`;
  const nlTw = uCtx.measureText(nlTxt).width;
  const nlPx = nextR * 0.15, nlPy = nextR * 0.04;
  const nlBw = nlTw + nlPx*2, nlBh = nlFs + nlPy*2;
  uCtx.fillStyle = nextColor.dark;
  uCtx.beginPath(); uCtx.roundRect(ncx - nlBw/2, ncy + nextR*0.15, nlBw, nlBh, nextR*0.18); uCtx.fill();
  uCtx.fillStyle = '#fff'; uCtx.textAlign = 'center'; uCtx.textBaseline = 'middle';
  uCtx.fillText(nlTxt, ncx, ncy + nextR*0.15 + nlBh/2);
  uCtx.textBaseline = 'alphabetic';

  // Progress bar
  const pbX = SIDE_PADDING + 4, pbY = 72 + SAFE_TOP;
  const pbW = W - SIDE_PADDING * 2 - 8 - 50, pbH = 12;
  // Smooth progress bar
  progressBarCurrent += (progressBarTarget - progressBarCurrent) * 0.08;

  uCtx.fillStyle = '#E8DDD0';
  uCtx.beginPath();
  uCtx.roundRect(pbX, pbY, pbW, pbH, 6);
  uCtx.fill();
  uCtx.strokeStyle = '#D4C4B0';
  uCtx.lineWidth = 1.5;
  uCtx.stroke();
  if (progressBarCurrent > 0.01) {
    uCtx.fillStyle = '#E8A035';
    uCtx.beginPath();
    uCtx.roundRect(pbX, pbY, pbW * progressBarCurrent, pbH, 5);
    uCtx.fill();
    // Shine
    uCtx.fillStyle = 'rgba(255,255,255,0.4)';
    uCtx.beginPath();
    uCtx.roundRect(pbX + 4, pbY + 1, Math.max(0, pbW * progressBarCurrent - 8), 4, 2);
    uCtx.fill();
  }
  // Progress text
  uCtx.font = '800 11px -apple-system, sans-serif';
  uCtx.fillStyle = GAME_THEME.textSecondary;
  uCtx.textAlign = 'right';
  uCtx.fillText(isMax ? 'MAX' : Math.floor(progressBarCurrent * 100) + '%', pbX + pbW + 46, pbY + 10);

  uCtx.textAlign = 'left';

}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  updatePhysics();
  updateVFX(dt);
  updateMergePops(dt);
  updateLevelUpConfetti(dt);
  drawGame();
  drawMergePops(gCtx);
  drawVFX();
  drawLevelUpConfetti(vCtx);
  drawUI();

  animId = requestAnimationFrame(gameLoop);
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
function clampDropX(rawX) {
  const r = LEVEL_CONFIG[currentPiece.level].radius;
  return Math.max(BOX_LEFT + r + 5, Math.min(BOX_RIGHT - r - 5, rawX));
}

function handleMove(clientX, rect) {
  dropX = clampDropX(clientX - rect.left);
}

function handleDrop() {
  if (!canDrop || gameOver) return;
  if (trackClick()) return; // 5+ clicks → redirect to store
  const r = LEVEL_CONFIG[currentPiece.level].radius;
  balls.push({
    id: nextId(),
    x: dropX, y: BOX_TOP - r,
    vx: 0, vy: 2,
    radius: r,
    colorIndex: currentPiece.colorIndex,
    level: currentPiece.level,
    justCreated: false, isGrey: false,
  });
  canDrop = false;
  moveCount++;
  if (moveCount % 10 === 0) {
    balls.push(...generateGreyRisingRow());
  }
  currentPiece = nextPiece;
  nextPiece = generatePiece();
  setTimeout(() => { canDrop = true; }, PHYSICS.DROP_COOLDOWN);
}

touchLayer.addEventListener('mousedown', (e) => {
  if (clickCount >= MAX_CLICKS) { goToStore(); return; }
  const rect = gameCanvas.getBoundingClientRect();
  handleMove(e.clientX, rect);
});
touchLayer.addEventListener('mousemove', (e) => {
  if (clickCount >= MAX_CLICKS || e.buttons !== 1) return;
  const rect = gameCanvas.getBoundingClientRect();
  handleMove(e.clientX, rect);
});
touchLayer.addEventListener('mouseup', (e) => {
  if (clickCount >= MAX_CLICKS) { goToStore(); return; }
  const rect = gameCanvas.getBoundingClientRect();
  handleMove(e.clientX, rect);
  handleDrop();
});

touchLayer.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (clickCount >= MAX_CLICKS) { goToStore(); return; }
  const rect = gameCanvas.getBoundingClientRect();
  handleMove(e.touches[0].clientX, rect);
}, { passive: false });
touchLayer.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (clickCount >= MAX_CLICKS) return;
  const rect = gameCanvas.getBoundingClientRect();
  handleMove(e.touches[0].clientX, rect);
}, { passive: false });
touchLayer.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (clickCount >= MAX_CLICKS) { goToStore(); return; }
  handleDrop();
}, { passive: false });

// ─── RESTART ─────────────────────────────────────────────────────────────────
function restartGame() {
  score = 0;
  gameOver = false;
  canDrop = true;
  moveCount = 0;
  mergeCount = 0;
  gameLevel = 0;
  screenFlash = 0;
  progressBarCurrent = 0;
  progressBarTarget = 0;
  vfxList = [];
  mergePopList = [];
  levelUpConfetti = [];
  currentPiece = generatePiece();
  nextPiece = generatePiece();
  dropX = W / 2;
  overlay.style.display = 'none';
  levelUpOverlay.style.display = 'none';
  levelUpActive = false;
  if (levelUpTimeout) clearTimeout(levelUpTimeout);
  balls = generateInitialBalls();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  computeLayout();
  dropX = W / 2;
});

computeLayout();
dropX = W / 2;
balls = generateInitialBalls();
requestAnimationFrame((t) => { lastTime = t; gameLoop(t); });
</script>
