<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="ad.size" content="width=320,height=480">
<script src="mraid.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg, #A0A29C 0%, #A0A29C 35%, #D4B88E 50%, #D4B88E 100%);font-family:Arial,sans-serif;}

#game{
  position:relative;
  width:100vw;height:100vh;
  overflow:hidden;
  touch-action:none;
  -webkit-user-select:none;
  user-select:none;
}

#bg{
  position:absolute;
  width:100%;height:100%;
  object-fit:fill;
  z-index:0;
}

/* INSTRUCTION TEXT */
#game-logo{
  position:absolute;
  top:calc(3% + 40px);
  left:50%;
  transform:translateX(-50%);
  width:40%;
  max-width:192px;
  z-index:15;
  pointer-events:none;
}

/* CHARACTER */
#character{
  position:absolute;
  z-index:20;
  transition: transform 2s ease-in-out, bottom 0.3s ease;
  transform-origin: bottom center;
  will-change: transform;
}
#character .char-idle{ display:none; }
#character .char-run{
  display:none;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  background-repeat:no-repeat;
  background-size:1200% 100%;
}
#character .char-wave{
  display:block;
  width:100%;
  height:100%;
  background-repeat:no-repeat;
  background-size:1200% 100%;
}
#character.running .char-wave{ display:none; }
#character.running .char-run{ display:block; }

/* DIAMOND */
#diamond{
  position:absolute;
  z-index:10;
  pointer-events:none;
}
#diamond.sparkle{
  animation: diamondSparkle 0.6s ease-in-out 3;
}
@keyframes diamondSparkle{
  0%  {transform:scale(1);   opacity:1;}
  50% {transform:scale(1.2); opacity:0.7;}
  100%{transform:scale(1);   opacity:1;}
}

/* GRID OVERLAY */
#grid-container{
  position:absolute;
  z-index:5;
}
.grid-cell{
  position:absolute;
  border:1px solid transparent;
  background:transparent;
  border-radius:2px;
}
.grid-cell.highlight{
  background:rgba(100,200,100,0.3);
  border-color:rgba(50,150,50,0.4);
  border-width:2px;
}
.grid-cell.invalid{
  background:rgba(255,80,80,0.3);
  border-color:rgba(200,50,50,0.4);
  border-width:2px;
}

/* PIECES */
.piece{
  position:absolute;
  z-index:20;
  cursor:grab;
  touch-action:none;
  -webkit-touch-callout:none;
}
.piece.dragging{
  z-index:100;
  opacity:0.85;
}
.piece.returning{
  transition: left 0.3s ease, top 0.3s ease, transform 0.3s ease;
}

.block-cell{
  position:absolute;
  border:none;
  background:none;
  overflow:visible;
}
.block-cell::before{
  content:'';
  position:absolute;
  bottom:-8%;
  left:-1%;
  width:103%;
  height:116%;
  background-image:url(data:image/webp;base64,UklGRmoCAABXRUJQVlA4WAoAAAAQAAAAbQAAdQAAQUxQSDwAAAABP0AQQFIK+4tNscEcERH4aAc2sW01IvZoiA7okZANZAf471+/G9H/CSCoqnbEQOM9iE8krxGH/P33+QFWUDggCAIAABASAJ0BKm4AdgA+bTSVR6QooiEsEkgBEA2JZW3E/7qbd50COi25YS0QCzAPXVyACyoAKkeFfoQXOhC7+Jh0cU6jc+a1JeoMdwZzfRRSxNHKZKjpsnZKi447sXVeDU9bmvqNiweUpsAUWGHl2Aa6TdqD7zH+fQZ8DZSmjsVbdKTB1lO4drW6CaMDa3Cr6JmDUtVz7AGkNCCqGAD+/Ju3w1Qvk3o8RweQHTRDiCuSnFEtCDP80ONrDW4d+e+xW451KYHN7/XAsHPerK09Yg2ZYz9PaZ75cxoVXxsSa8aes0XZI60acoK7Y7ZNHt7Z2dH6749rkruBZCEwdVT+ZrLvEo7uQUM6BXgsfekKqXAbbuc/cmDV1scc4u1kNJifxkfxkJFNceY+LvI7G4pWBVTymNawgnEr1kzwYjRyFmsX8PDUUSCyknc26TFSQ/R9KYuYqiMICvAaQt2wDv9Thjg10irE2GVGolB0DMMZeDqAgwBCiirHg8smfTFKsMJSsu3AismNXec4dtvWeSPAugoqcqIV3FuSjWtDf6G6bQ35hkpUQIGZxhFBMhgvjVcWzZIbk+aD0bPDs0RirN3n28iX/suPfscPlkmg/308Ptrh3MBtBBxwNZf1gf8/O9YCYB76o6LfAEhgik3C4nh57XUXZTX75QSOiYW7x012K+T8zIidZZJQk/kAAAA=);

  pointer-events:none;
}

/* Edge block expansion — blocks adjacent to pit walls expand to cover them */
.block-cell.edge-left::before{  left:-12%;  width:114%; }
.block-cell.edge-right::before{ width:114%; }
.block-cell.edge-bottom::before{ bottom:-18%; height:122%; }

/* TUTORIAL HAND */
#hand{
  position:absolute;
  z-index:50;
  pointer-events:none;
  opacity:0;
  transition: opacity 0.5s ease;
}
#hand.show{
  opacity:1;
}
#hand img{
  width:100%;
  height:100%;
}

/* FAIL X MARK */
.fail-mark{
  position:absolute;
  z-index:150;
  font-size:60px;
  color:#FF3333;
  font-weight:bold;
  pointer-events:none;
  animation: failAnim 0.8s ease forwards;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
@keyframes failAnim{
  0%{transform:scale(0.3) rotate(-20deg);opacity:0;}
  30%{transform:scale(1.3) rotate(5deg);opacity:1;}
  60%{transform:scale(1) rotate(0deg);opacity:1;}
  100%{transform:scale(1) rotate(0deg);opacity:0;}
}

/* WIN PARTICLES */
.particle{
  position:absolute;
  width:8px;height:8px;
  border-radius:50%;
  z-index:90;
  pointer-events:none;
  animation: particleFly 1.2s ease-out forwards;
}
@keyframes particleFly{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}
}

/* END CARD */
#endcard{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.75);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:200;
  opacity:0;
  transition:opacity 0.5s ease;
}
#endcard.show{
  display:flex;
}
#logo{
  width:55%;
  max-width:280px;
  margin-bottom:25px;
  animation: logoIn 0.6s ease backwards 0.2s;
}
@keyframes logoIn{
  0%{transform:scale(0.5) translateY(-30px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}
#playnow{
  width:45%;
  max-width:240px;
  cursor:pointer;
  animation: btnPulse 1s ease-in-out infinite 0.8s, btnIn 0.6s ease backwards 0.5s;
}
@keyframes btnPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.1);}
}
@keyframes btnIn{
  0%{transform:scale(0) translateY(30px);opacity:0;}
  100%{transform:scale(1) translateY(0);opacity:1;}
}


/* PIECE TRAY AREA */
#tray-bg{
  position:absolute;
  z-index:2;
  background: transparent;
  border:none;
}
</style>

<script>
(function(){
  'use strict';

  // ============ CONFIGURATION ============
  var GRID_COLS = 4;
  var GRID_ROWS = 3;

  // Grid position relative to background (percentage of game container)
  // Based on background.jpg layout (928x1152)
  var GRID_LEFT = 0.223;
  var GRID_TOP = 0.525;
  var GRID_RIGHT = 0.742;
  var GRID_BOTTOM = 0.697;

  // Character config
  var CHAR_START_LEFT = 0.01;
  var CHAR_END_LEFT = 0.65;
  var CHAR_BOTTOM = 0.425;
  var CHAR_SIZE = 0.39; // width as fraction of bg display width (30% bigger)

  // Diamond config (positioned on the stand/pedestal in background)
  var DIAMOND_SIZE = 0.12;      // width as fraction of bg display width
  var DIAMOND_CX   = 0.878;    // center X as fraction of bg
  var DIAMOND_BOTTOM_Y = 0.393; // diamond bottom edge Y = stand TOP surface (y=362/921)

  // Piece definitions: each piece is a 2D array (rows × cols), 1=filled, 0=empty
  // Total cells: 3+3+2+2+2 = 12 (fills 4×3 grid exactly)
  var PIECE_DEFS = [
    { shape:[[1,1],[1,0]], name:'L' },       // L-shape (3 cells)
    { shape:[[1,1],[0,1]], name:'RevL' },     // Reverse-L (3 cells)
    { shape:[[1,1]], name:'H2' },             // Horizontal 2-bar
    { shape:[[1],[1]], name:'V2' },           // Vertical 2-bar
    { shape:[[1,1]], name:'H2b' },            // Horizontal 2-bar
  ];

  // Valid solution:
  // P0@(0,0) P1@(1,1) P2@(0,2) P3@(1,3) P4@(2,0)
  // Row0: [P0, P0, P2, P2]
  // Row1: [P0, P1, P1, P3]
  // Row2: [P4, P4, P1, P3]

  // ============ STATE ============
  var grid = [];
  var pieces = [];
  var dragging = null;
  var dragOffsetX = 0, dragOffsetY = 0;
  var gameState = 'playing'; // 'playing','win','endcard'
  var touchCount = 0;
  var CTA_AFTER = 7; // redirect to store after this many touches
  var usingTouch = false; // true once touch detected, prevents mouse double-fire
  var gameW = 0, gameH = 0;
  var gridPixel = {}; // {x, y, w, h, cellW, cellH}
  var bgMap = {ox:0, oy:0, w:0, h:0}; // background display mapping for object-fit:cover
  var firstPiecePlaced = false;
  var tutorialPhase = 0; // 0=point to piece, 1=point to grid, 2=done
  var handAnimFrame = null;

  // ============ SPRITE ANIMATION ============
  var RUN_FRAMES = 12;       // total frames in strip
  var RUN_INTRO = 2;         // frames 0-1: startup (play once)
  var RUN_LOOP_START = 2;    // frames 2-11: running loop
  var RUN_FPS = 10;          // original GIF 0.1s delay = 10 FPS
  var runInterval = null;
  var runFrame = 0;
  var charRunDiv = null;
  var charWaveDiv = null;

  // Idle animation config
  var WAVE_FRAMES = 12;
  var WAVE_FPS = 9;
  var WAVE_MIN = 6000;        // wave randomly every 6-7 seconds
  var WAVE_MAX = 7000;
  var waveTimer = null;
  var idleAnimInterval = null;
  var idleAnimPlaying = false;

  function startRunning() {
    charEl.classList.add('running');
    runFrame = 0;
    charRunDiv.style.backgroundPosition = '0px 0px';
    var frameW = charRunDiv.offsetWidth;
    runInterval = setInterval(function(){
      runFrame++;
      // After intro frames, loop only the running cycle
      if (runFrame >= RUN_FRAMES) {
        runFrame = RUN_LOOP_START;
      }
      charRunDiv.style.backgroundPosition = '-' + (runFrame * frameW) + 'px 0px';
    }, 1000 / RUN_FPS);
  }

  function stopRunning() {
    if (runInterval) { clearInterval(runInterval); runInterval = null; }
    charEl.classList.remove('running');
  }

  // ============ IDLE ANIMATION (wave) ============
  function scheduleIdleAnim() {
    if (waveTimer) clearTimeout(waveTimer);
    var delay = WAVE_MIN + Math.random() * (WAVE_MAX - WAVE_MIN);
    waveTimer = setTimeout(playWaveAnim, delay);
  }

  function playWaveAnim() {
    if (gameState !== 'playing' || idleAnimPlaying || dragging) {
      scheduleIdleAnim();
      return;
    }
    idleAnimPlaying = true;
    // Wave div is always visible showing frame 0 — just animate it
    var frame = 0;
    var frameW = charWaveDiv.offsetWidth;

    idleAnimInterval = setInterval(function() {
      frame++;
      if (frame >= WAVE_FRAMES) {
        clearInterval(idleAnimInterval);
        idleAnimInterval = null;
        // Return to frame 0 (idle pose)
        charWaveDiv.style.backgroundPosition = '0px 0px';
        idleAnimPlaying = false;
        scheduleIdleAnim();
        return;
      }
      charWaveDiv.style.backgroundPosition = '-' + (frame * frameW) + 'px 0px';
    }, 1000 / WAVE_FPS);
  }

  function stopIdleAnim() {
    if (waveTimer) { clearTimeout(waveTimer); waveTimer = null; }
    if (idleAnimInterval) { clearInterval(idleAnimInterval); idleAnimInterval = null; }
    // Always return wave to frame 0
    charWaveDiv.style.backgroundPosition = '0px 0px';
    idleAnimPlaying = false;
  }

  // ============ DOM REFS ============
  var gameEl, bgEl, charEl, diamondEl, gridEl, handEl, endcardEl;

  // ============ INIT ============
  function init() {
    gameEl = document.getElementById('game');
    bgEl = document.getElementById('bg');
    charEl = document.getElementById('character');
    diamondEl = document.getElementById('diamond');
    gridEl = document.getElementById('grid-container');
    handEl = document.getElementById('hand');
    endcardEl = document.getElementById('endcard');
    charRunDiv = charEl.querySelector('.char-run');
    charWaveDiv = charEl.querySelector('.char-wave');

    // Init grid state
    for (var r = 0; r < GRID_ROWS; r++) {
      grid[r] = [];
      for (var c = 0; c < GRID_COLS; c++) {
        grid[r][c] = -1; // -1 = empty
      }
    }

    // Calculate initial sizes (without updating children yet)
    gameW = gameEl.offsetWidth;
    gameH = gameEl.offsetHeight;
    updateBgMap();
    gridPixel.x = bgMap.ox + GRID_LEFT * bgMap.w;
    gridPixel.y = bgMap.oy + GRID_TOP * bgMap.h;
    gridPixel.w = (GRID_RIGHT - GRID_LEFT) * bgMap.w;
    gridPixel.h = (GRID_BOTTOM - GRID_TOP) * bgMap.h;
    gridPixel.cellW = gridPixel.w / GRID_COLS;
    gridPixel.cellH = gridPixel.h / GRID_ROWS;

    // Create grid cells and pieces first
    createGridCells();
    createPieces();

    // Now do full resize to position everything
    resize();
    window.addEventListener('resize', resize);

    // Setup events — use flag to prevent touch+mouse double-firing
    // CTA count is embedded here so it fires from a non-passive user gesture
    gameEl.addEventListener('touchstart', function(e){
      usingTouch = true;
      touchCount++;
      if (touchCount >= CTA_AFTER) { handleCTA(); return; }
      onPointerDown(e);
    }, {passive:false});
    gameEl.addEventListener('touchmove', onPointerMove, {passive:false});
    gameEl.addEventListener('touchend', onPointerUp, {passive:false});
    gameEl.addEventListener('mousedown', function(e){
      if (usingTouch) return;
      touchCount++;
      if (touchCount >= CTA_AFTER) { handleCTA(); return; }
      onPointerDown(e);
    });
    gameEl.addEventListener('mousemove', function(e){ if (!usingTouch) onPointerMove(e); });
    gameEl.addEventListener('mouseup', function(e){ if (!usingTouch) onPointerUp(e); });

    // CTA — playnow button (touchstart for fastest response on mobile)
    var playnowEl = document.getElementById('playnow');
    playnowEl.addEventListener('touchstart', function(e){
      e.preventDefault();
      e.stopPropagation();
      handleCTA();
    }, {passive:false});
    playnowEl.addEventListener('click', function(e){
      e.stopPropagation();
      handleCTA();
    });

    // Start tutorial after a short delay
    setTimeout(startTutorial, 600);

    // Start idle animation timer
    scheduleIdleAnim();
  }

  function updateBgMap() {
    // Image ratio closely matches phone screens, so fill maps 1:1
    // For exact alignment, calculate contain mapping as fallback
    var imgW = 430, imgH = 921;
    var imgRatio = imgW / imgH;
    var viewRatio = gameW / gameH;

    // Use fill: direct 1:1 mapping (image stretches to fill viewport)
    // Stretching is negligible since ratios nearly match (~0.467 vs ~0.462)
    bgMap.w = gameW;
    bgMap.h = gameH;
    bgMap.ox = 0;
    bgMap.oy = 0;
  }

  function resize() {
    gameW = gameEl.offsetWidth;
    gameH = gameEl.offsetHeight;

    // Calculate background mapping for object-fit:cover
    updateBgMap();

    // Calculate grid pixel bounds relative to displayed background
    gridPixel.x = bgMap.ox + GRID_LEFT * bgMap.w;
    gridPixel.y = bgMap.oy + GRID_TOP * bgMap.h;
    gridPixel.w = (GRID_RIGHT - GRID_LEFT) * bgMap.w;
    gridPixel.h = (GRID_BOTTOM - GRID_TOP) * bgMap.h;
    gridPixel.cellW = gridPixel.w / GRID_COLS;
    gridPixel.cellH = gridPixel.h / GRID_ROWS;

    // Position grid container
    gridEl.style.left = gridPixel.x + 'px';
    gridEl.style.top = gridPixel.y + 'px';
    gridEl.style.width = gridPixel.w + 'px';
    gridEl.style.height = gridPixel.h + 'px';

    // Position character relative to grid (so it stays visible regardless of crop)
    var charW = CHAR_SIZE * bgMap.w;
    charEl.style.width = charW + 'px';
    charEl.style.height = charW + 'px';
    // Character sits just to the left of the grid, on the ground level
    var charStartX = Math.max(-33, gridPixel.x - charW * 0.7 - 35);
    charEl.style.left = charStartX + 'px';
    // Character bottom aligns with top of grid (standing on the ledge)
    // Offset to position character feet on the ledge
    charEl.style.top = '';
    charEl.style.bottom = (gameH - gridPixel.y - charW * 0.01) + 'px';

    // Run sprite: tightly cropped 118x150 frames, height matches idle
    var charRunH = charW;
    var charRunW = Math.round(charW * (95 / 120));
    charRunDiv.style.width = charRunW + 'px';
    charRunDiv.style.height = charRunH + 'px';
    charRunDiv.style.bottom = '0px';

    // Wave sprite: square (same as idle charW x charW)
    charWaveDiv.style.width = charW + 'px';
    charWaveDiv.style.height = charW + 'px';

    // Position diamond on the stand (bottom of diamond = top of stand)
    var diamondW = DIAMOND_SIZE * bgMap.w;
    var diamondH = diamondW; // square image
    diamondEl.style.width = diamondW + 'px';
    diamondEl.style.height = 'auto';
    diamondEl.style.left = (bgMap.ox + DIAMOND_CX * bgMap.w - diamondW / 2) + 'px';
    diamondEl.style.top = (bgMap.oy + DIAMOND_BOTTOM_Y * bgMap.h - diamondH) + 'px';

    // Update grid cell positions
    updateGridCells();

    // Update piece positions
    updatePiecePositions();

    // Position tray area
    var trayBgEl = document.getElementById('tray-bg');
    var trayTop = gridPixel.y + gridPixel.h + 8 - 65;
    if (trayBgEl) {
      trayBgEl.style.left = '4px';
      trayBgEl.style.right = '4px';
      trayBgEl.style.top = trayTop + 'px';
      trayBgEl.style.bottom = '0';
    }

    // Hand size
    handEl.style.width = (0.22 * bgMap.w) + 'px';
    handEl.style.height = (0.22 * bgMap.w) + 'px';
  }

  // ============ GRID ============
  var gridCells = [];

  function createGridCells() {
    for (var r = 0; r < GRID_ROWS; r++) {
      gridCells[r] = [];
      for (var c = 0; c < GRID_COLS; c++) {
        var cell = document.createElement('div');
        cell.className = 'grid-cell';
        cell.setAttribute('data-row', r);
        cell.setAttribute('data-col', c);
        gridEl.appendChild(cell);
        gridCells[r][c] = cell;
      }
    }
  }

  function updateGridCells() {
    if (!gridCells.length || !gridCells[0]) return;
    for (var r = 0; r < GRID_ROWS; r++) {
      for (var c = 0; c < GRID_COLS; c++) {
        var cell = gridCells[r][c];
        cell.style.left = (c * gridPixel.cellW) + 'px';
        cell.style.top = (r * gridPixel.cellH) + 'px';
        cell.style.width = gridPixel.cellW + 'px';
        cell.style.height = gridPixel.cellH + 'px';
      }
    }
  }

  function clearHighlights() {
    for (var r = 0; r < GRID_ROWS; r++) {
      for (var c = 0; c < GRID_COLS; c++) {
        gridCells[r][c].classList.remove('highlight', 'invalid');
      }
    }
  }

  // ============ PIECES ============
  function createPieces() {
    var trayTop = gridPixel.y + gridPixel.h + (gameH * 0.02) - 65;
    var trayH = gameH - trayTop - (gameH * 0.01);
    var trayW = gameW * 0.94;
    var trayLeft = (gameW - trayW) / 2;

    // Calculate uniform cell size
    var pieceCellSize = Math.min(
      (trayW / PIECE_DEFS.length * 0.935) / 2,
      (trayH * 0.605) / 2,
      46
    );

    // Calculate total width of all pieces and equal gaps
    var totalPieceW = 0;
    for (var i = 0; i < PIECE_DEFS.length; i++) {
      totalPieceW += PIECE_DEFS[i].shape[0].length * pieceCellSize;
    }
    var gap = (trayW - totalPieceW) / (PIECE_DEFS.length + 1);
    var curX = trayLeft + gap;

    for (var i = 0; i < PIECE_DEFS.length; i++) {
      var def = PIECE_DEFS[i];
      var piece = {
        id: i,
        shape: def.shape,
        name: def.name,
        placed: false,
        gridRow: -1,
        gridCol: -1,
        el: null,
        cells: [],
        trayX: 0,
        trayY: 0,
      };

      // Create DOM element
      var el = document.createElement('div');
      el.className = 'piece piece-color-' + i;
      el.setAttribute('data-piece', i);

      var rows = def.shape.length;
      var cols = def.shape[0].length;

      var pieceW = cols * pieceCellSize;
      var pieceH = rows * pieceCellSize;

      el.style.width = pieceW + 'px';
      el.style.height = pieceH + 'px';

      // Create block cells
      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          if (def.shape[r][c] === 1) {
            var block = document.createElement('div');
            block.className = 'block-cell';
            block.style.left = (c * pieceCellSize) + 'px';
            block.style.top = (r * pieceCellSize) + 'px';
            block.style.width = pieceCellSize + 'px';
            block.style.height = pieceCellSize + 'px';
            block.style.zIndex = (10 - r) * 10 + c;
            el.appendChild(block);
          }
        }
      }

      // Tray position (equal visual gaps)
      piece.trayX = curX;
      piece.trayY = trayTop + (trayH - pieceH) / 2;
      curX += pieceW + gap;

      el.style.left = piece.trayX + 'px';
      el.style.top = piece.trayY + 'px';

      piece.el = el;
      piece.trayCellSize = pieceCellSize;
      pieces.push(piece);
      gameEl.appendChild(el);
    }
  }

  function updatePiecePositions() {
    if (!pieces.length) return;
    var trayTop = gridPixel.y + gridPixel.h + (gameH * 0.02) - 65;
    var trayH = gameH - trayTop - (gameH * 0.01);
    var trayW = gameW * 0.94;
    var trayLeft = (gameW - trayW) / 2;

    // Calculate uniform cell size
    var pieceCellSize = Math.min(
      (trayW / PIECE_DEFS.length * 0.935) / 2,
      (trayH * 0.605) / 2,
      46
    );

    // Calculate total width and equal gaps
    var totalPieceW = 0;
    for (var j = 0; j < PIECE_DEFS.length; j++) {
      totalPieceW += PIECE_DEFS[j].shape[0].length * pieceCellSize;
    }
    var gap = (trayW - totalPieceW) / (PIECE_DEFS.length + 1);
    var curX = trayLeft + gap;

    for (var i = 0; i < pieces.length; i++) {
      var piece = pieces[i];
      var def = PIECE_DEFS[i];
      var rows = def.shape.length;
      var cols = def.shape[0].length;

      var pieceW = cols * pieceCellSize;
      var pieceH = rows * pieceCellSize;

      if (piece.placed) {
        positionPieceOnGrid(piece);
      } else {
        piece.trayX = curX;
        piece.trayY = trayTop + (trayH - pieceH) / 2;

        rebuildPieceCells(piece, pieceCellSize);

        piece.el.style.left = piece.trayX + 'px';
        piece.el.style.top = piece.trayY + 'px';
      }
      curX += pieceW + gap;
    }
  }

  function rebuildPieceCells(piece, cellSize) {
    var el = piece.el;
    var shape = piece.shape;
    var rows = shape.length;
    var cols = shape[0].length;

    el.innerHTML = '';
    el.style.width = (cols * cellSize) + 'px';
    el.style.height = (rows * cellSize) + 'px';

    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        if (shape[r][c] === 1) {
          var block = document.createElement('div');
          block.className = 'block-cell';
          block.style.left = (c * cellSize) + 'px';
          block.style.top = (r * cellSize) + 'px';
          block.style.width = cellSize + 'px';
          block.style.height = cellSize + 'px';
          // Upper rows on top in tray view
          block.style.zIndex = (10 - r) * 10 + c;
          el.appendChild(block);
        }
      }
    }
    piece.currentCellSize = cellSize;
    piece.currentCellW = cellSize;
    piece.currentCellH = cellSize;
  }

  function positionPieceOnGrid(piece) {
    var csW = gridPixel.cellW;
    var csH = gridPixel.cellH;
    var pad = 0;

    rebuildPieceCellsRect(piece, csW, csH, pad);

    // Add edge classes so blocks adjacent to pit walls expand to cover them
    var shape = piece.shape;
    var cells = piece.el.querySelectorAll('.block-cell');
    var cellIdx = 0;
    for (var r = 0; r < shape.length; r++) {
      for (var c = 0; c < shape[0].length; c++) {
        if (shape[r][c] === 1) {
          var absRow = piece.gridRow + r;
          var absCol = piece.gridCol + c;
          var cell = cells[cellIdx];
          if (absCol === 0) cell.classList.add('edge-left');
          if (absCol === GRID_COLS - 1) cell.classList.add('edge-right');
          if (absRow === GRID_ROWS - 1) cell.classList.add('edge-bottom');
          cellIdx++;
        }
      }
    }

    piece.el.style.left = (gridPixel.x + piece.gridCol * gridPixel.cellW) + 'px';
    piece.el.style.top = (gridPixel.y + piece.gridRow * gridPixel.cellH) + 'px';
  }

  function rebuildPieceCellsRect(piece, cellW, cellH, pad) {
    var el = piece.el;
    var shape = piece.shape;
    var rows = shape.length;
    var cols = shape[0].length;

    el.innerHTML = '';
    el.style.width = (cols * cellW) + 'px';
    el.style.height = (rows * cellH) + 'px';

    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        if (shape[r][c] === 1) {
          var block = document.createElement('div');
          block.className = 'block-cell';
          block.style.left = (c * cellW) + 'px';
          block.style.top = (r * cellH) + 'px';
          block.style.width = cellW + 'px';
          block.style.height = cellH + 'px';
          // Upper rows in front (on top layer)
          block.style.zIndex = (10 - r) * 10 + c;
          el.appendChild(block);
        }
      }
    }
    piece.currentCellSize = Math.min(cellW, cellH);
    piece.currentCellW = cellW;
    piece.currentCellH = cellH;
  }

  // ============ DRAG & DROP ============
  function getPointerPos(e) {
    var t = e.touches ? e.touches[0] : e;
    if (!t && e.changedTouches) t = e.changedTouches[0];
    if (!t) t = e;
    return {x: t.clientX, y: t.clientY};
  }

  function findPieceAtPos(x, y) {
    for (var i = pieces.length - 1; i >= 0; i--) {
      var p = pieces[i];
      var rect = p.el.getBoundingClientRect();
      if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
        // Check if we hit an actual block cell (supports rectangular cells)
        var shape = p.shape;
        var cw = p.currentCellW || p.currentCellSize || p.trayCellSize;
        var ch = p.currentCellH || p.currentCellSize || p.trayCellSize;
        var localX = x - rect.left;
        var localY = y - rect.top;
        var col = Math.floor(localX / cw);
        var row = Math.floor(localY / ch);
        if (row >= 0 && row < shape.length && col >= 0 && col < shape[0].length && shape[row][col] === 1) {
          return p;
        }
      }
    }
    return null;
  }

  function onPointerDown(e) {
    if (gameState !== 'playing') return;
    e.preventDefault();
    // Reject multi-touch and prevent picking new piece while dragging
    if (dragging) return;
    if (e.touches && e.touches.length > 1) return;

    var pos = getPointerPos(e);
    var piece = findPieceAtPos(pos.x, pos.y);
    if (!piece) return;

    // If piece is placed, remove from grid first
    if (piece.placed) {
      removePieceFromGrid(piece);
    }

    dragging = piece;
    stopIdleAnim();

    // Cancel any ongoing return animation
    piece.el.style.transition = 'none';
    piece.el.classList.add('dragging');
    piece.el.classList.remove('returning');

    // Record offset: finger to piece top-left, plus lift piece above finger
    var rect = piece.el.getBoundingClientRect();
    dragOffsetX = pos.x - rect.left;
    dragOffsetY = pos.y - rect.top + rect.height * 0.6;

    // Immediately move piece to offset position
    piece.el.style.left = (pos.x - dragOffsetX) + 'px';
    piece.el.style.top = (pos.y - dragOffsetY) + 'px';

    // Hide tutorial
    if (!firstPiecePlaced) {
      handEl.classList.remove('show');
    }
  }

  var _hlRAF = 0;
  function onPointerMove(e) {
    if (!dragging || gameState !== 'playing') return;
    e.preventDefault();
    var pos = getPointerPos(e);
    var newL = pos.x - dragOffsetX;
    var newT = pos.y - dragOffsetY;
    dragging.el.style.left = newL + 'px';
    dragging.el.style.top = newT + 'px';
    // Throttled highlight update (every other frame)
    if (!_hlRAF) {
      _hlRAF = requestAnimationFrame(function() {
        _hlRAF = 0;
        if (!dragging) return;
        clearHighlights();
        var rect = dragging.el.getBoundingClientRect();
        var cx = rect.left + rect.width / 2;
        var cy = rect.top + rect.height / 2;
        var gp = getGridPosition(cx, cy, dragging);
        if (gp) highlightCells(dragging, gp.row, gp.col);
      });
    }
  }

  function onPointerUp(e) {
    if (!dragging || gameState !== 'playing') return;
    // NOTE: do NOT call e.preventDefault() here — keep user gesture valid for CTA

    // Cancel pending highlight RAF
    if (_hlRAF) { cancelAnimationFrame(_hlRAF); _hlRAF = 0; }

    var piece = dragging;
    dragging = null;

    piece.el.style.opacity = '';
    piece.el.style.transition = '';
    piece.el.classList.remove('dragging');
    clearHighlights();
    scheduleIdleAnim();

    // Use piece visual center for grid snapping
    var rect = piece.el.getBoundingClientRect();
    var centerX = rect.left + rect.width / 2;
    var centerY = rect.top + rect.height / 2;

    var gridPos = getGridPosition(centerX, centerY, piece);

    if (gridPos) {
      placePieceOnGrid(piece, gridPos.row, gridPos.col);

      if (!firstPiecePlaced) {
        firstPiecePlaced = true;
      }

      if (checkWin()) {
        gameState = 'win';
        setTimeout(playWinAnimation, 300);
      }
    } else {
      returnToTray(piece);
    }
  }

  function getGridPosition(dropX, dropY, piece) {
    // Check if drop point is near the grid
    var margin = gridPixel.cellW * 1.5;
    if (dropX < gridPixel.x - margin || dropX > gridPixel.x + gridPixel.w + margin ||
        dropY < gridPixel.y - margin || dropY > gridPixel.y + gridPixel.h + margin) {
      return null;
    }

    // Find the nearest VALID grid position (where piece can actually be placed)
    var shapeCols = piece.shape[0].length;
    var shapeRows = piece.shape.length;
    var bestCol = -1, bestRow = -1, bestDist = Infinity;

    for (var r = 0; r <= GRID_ROWS - shapeRows; r++) {
      for (var c = 0; c <= GRID_COLS - shapeCols; c++) {
        // Skip positions where piece can't be placed
        if (!canPlace(piece, r, c)) continue;
        // Center of this placement
        var cx = gridPixel.x + (c + shapeCols / 2) * gridPixel.cellW;
        var cy = gridPixel.y + (r + shapeRows / 2) * gridPixel.cellH;
        var dist = (dropX - cx) * (dropX - cx) + (dropY - cy) * (dropY - cy);
        if (dist < bestDist) {
          bestDist = dist;
          bestCol = c;
          bestRow = r;
        }
      }
    }

    // Only snap if within reasonable distance (2 cells)
    var maxDist = Math.pow(gridPixel.cellW * 2.5, 2) + Math.pow(gridPixel.cellH * 2.5, 2);
    if (bestCol < 0 || bestDist > maxDist) return null;
    return {row: bestRow, col: bestCol};
  }

  function canPlace(piece, row, col) {
    var shape = piece.shape;
    for (var r = 0; r < shape.length; r++) {
      for (var c = 0; c < shape[0].length; c++) {
        if (shape[r][c] === 1) {
          var gr = row + r;
          var gc = col + c;
          if (gr < 0 || gr >= GRID_ROWS || gc < 0 || gc >= GRID_COLS) return false;
          if (grid[gr][gc] !== -1) return false;
        }
      }
    }
    return true;
  }

  function placePieceOnGrid(piece, row, col) {
    var shape = piece.shape;
    for (var r = 0; r < shape.length; r++) {
      for (var c = 0; c < shape[0].length; c++) {
        if (shape[r][c] === 1) {
          grid[row + r][col + c] = piece.id;
        }
      }
    }
    piece.placed = true;
    piece.gridRow = row;
    piece.gridCol = col;
    piece.el.classList.add('placed');

    // Z-index: upper rows on top layer
    // Base of 20 to ensure placed pieces are above tray pieces
    piece.el.style.zIndex = 20 + (GRID_ROWS - row) * (GRID_COLS + 1) + col;

    // Snap to grid position
    positionPieceOnGrid(piece);

    // Nice placement sound effect (visual feedback)
    piece.el.style.transform = 'scale(1.05)';
    setTimeout(function(){ piece.el.style.transform = 'scale(1)'; }, 150);
  }

  function removePieceFromGrid(piece) {
    if (!piece.placed) return;
    var shape = piece.shape;
    for (var r = 0; r < shape.length; r++) {
      for (var c = 0; c < shape[0].length; c++) {
        if (shape[r][c] === 1) {
          grid[piece.gridRow + r][piece.gridCol + c] = -1;
        }
      }
    }
    piece.placed = false;
    piece.gridRow = -1;
    piece.gridCol = -1;
    piece.el.classList.remove('placed');
  }

  function returnToTray(piece) {
    // Calculate tray position first
    var def = PIECE_DEFS[piece.id];
    var rows = def.shape.length;
    var cols = def.shape[0].length;
    var trayTop = gridPixel.y + gridPixel.h + (gameH * 0.02) - 65;
    var trayH = gameH - trayTop - (gameH * 0.01);
    var trayW = gameW * 0.94;
    var trayLeft = (gameW - trayW) / 2;
    var pieceCellSize = Math.min(
      (trayW / PIECE_DEFS.length * 0.935) / 2,
      (trayH * 0.605) / 2,
      46
    );

    var totalPieceW = 0;
    for (var j = 0; j < PIECE_DEFS.length; j++) {
      totalPieceW += PIECE_DEFS[j].shape[0].length * pieceCellSize;
    }
    var gap = (trayW - totalPieceW) / (PIECE_DEFS.length + 1);
    var curX = trayLeft + gap;
    for (var j = 0; j < piece.id; j++) {
      curX += PIECE_DEFS[j].shape[0].length * pieceCellSize + gap;
    }

    var pieceH = rows * pieceCellSize;
    piece.trayX = curX;
    piece.trayY = trayTop + (trayH - pieceH) / 2;

    // Rebuild cells BEFORE enabling transition (instant resize)
    rebuildPieceCells(piece, pieceCellSize);

    // Force layout so resize is applied before transition starts
    piece.el.offsetHeight;

    // Now enable transition and animate to tray position
    piece.el.classList.add('returning');
    piece.el.style.left = piece.trayX + 'px';
    piece.el.style.top = piece.trayY + 'px';

    setTimeout(function(){ piece.el.classList.remove('returning'); }, 350);
  }

  function highlightCells(piece, row, col) {
    var shape = piece.shape;
    var valid = canPlace(piece, row, col);
    for (var r = 0; r < shape.length; r++) {
      for (var c = 0; c < shape[0].length; c++) {
        if (shape[r][c] === 1) {
          var gr = row + r;
          var gc = col + c;
          if (gr >= 0 && gr < GRID_ROWS && gc >= 0 && gc < GRID_COLS) {
            gridCells[gr][gc].classList.add(valid ? 'highlight' : 'invalid');
          }
        }
      }
    }
  }

  function showFailMark(x, y) {
    var mark = document.createElement('div');
    mark.className = 'fail-mark';
    mark.textContent = '✕';
    mark.style.left = (x - 30) + 'px';
    mark.style.top = (y - 30) + 'px';
    gameEl.appendChild(mark);
    setTimeout(function(){ mark.remove(); }, 900);
  }

  // ============ WIN CHECK ============
  function checkWin() {
    for (var r = 0; r < GRID_ROWS; r++) {
      for (var c = 0; c < GRID_COLS; c++) {
        if (grid[r][c] === -1) return false;
      }
    }
    return true;
  }

  // ============ WIN ANIMATION ============
  function playWinAnimation() {
    stopIdleAnim(); // Stop idle animations on win
    // Particles from grid center
    var cx = gridPixel.x + gridPixel.w / 2;
    var cy = gridPixel.y + gridPixel.h / 2;
    spawnParticles(cx, cy, 20);

    // Start running animation and movement together
    setTimeout(function(){
      startRunning();
      var charStartX = parseFloat(charEl.style.left) || 0;
      var charEndX = Math.min(gridPixel.x + gridPixel.w + 5, gameW - charEl.offsetWidth - 2);
      var moveX = charEndX - charStartX;
      charEl.style.transform = 'translateX(' + moveX + 'px)';

      // Stop running exactly when movement ends
      function onArrival(e) {
        if (e.propertyName !== 'transform') return;
        charEl.removeEventListener('transitionend', onArrival);
        stopRunning();
        spawnParticles(gridPixel.x + gridPixel.w + 40, gridPixel.y - 20, 15);
      }
      charEl.addEventListener('transitionend', onArrival);
    }, 100);

    // Diamond sparkle effect
    setTimeout(function(){
      diamondEl.classList.add('sparkle');
      var dx = bgMap.ox + DIAMOND_CX * bgMap.w;
      var dy = bgMap.oy + DIAMOND_BOTTOM_Y * bgMap.h - (DIAMOND_SIZE * bgMap.w) / 2;
      spawnParticles(dx, dy, 12);
    }, 1500);

    // Show end card
    setTimeout(showEndCard, 3000);
  }

  function spawnParticles(cx, cy, count) {
    var colors = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#FF8C00'];
    for (var i = 0; i < count; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5);
      var dist = 60 + Math.random() * 100;
      var tx = Math.cos(angle) * dist;
      var ty = Math.sin(angle) * dist - 40;
      p.style.setProperty('--tx', tx + 'px');
      p.style.setProperty('--ty', ty + 'px');
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      p.style.background = colors[i % colors.length];
      p.style.width = (6 + Math.random() * 8) + 'px';
      p.style.height = p.style.width;
      p.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
      gameEl.appendChild(p);
      (function(el){ setTimeout(function(){ el.remove(); }, 1500); })(p);
    }
  }

  // ============ END CARD ============
  function showEndCard() {
    gameState = 'endcard';
    endcardEl.classList.add('show');
    // Force reflow for animation
    endcardEl.offsetHeight;
    endcardEl.style.opacity = '1';
  }

  var ctaFired = false;
  function handleCTA() {
    if (ctaFired) return;
    ctaFired = true;
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    var url = isIOS
      ? 'https://apps.apple.com/tr/app/match-villains/id6479752688'
      : 'https://play.google.com/store/apps/details?id=com.goodjobgames.matchvillains&hl=en';
    try {
      if (typeof mraid !== 'undefined' && mraid.open) {
        mraid.open(url);
      } else {
        window.location.href = url;
      }
    } catch(e) {
      window.location.href = url;
    }
    // Allow CTA to fire again after short delay (in case window.open was blocked)
    setTimeout(function(){ ctaFired = false; }, 1500);
  }

  // ============ TUTORIAL ============
  function startTutorial() {
    if (firstPiecePlaced) return;

    handEl.classList.add('show');
    animateTutorialHand();
  }

  function animateTutorialHand() {
    if (firstPiecePlaced || gameState !== 'playing') {
      handEl.classList.remove('show');
      return;
    }

    // Find first unplaced piece
    var targetPiece = null;
    for (var i = 0; i < pieces.length; i++) {
      if (!pieces[i].placed) { targetPiece = pieces[i]; break; }
    }
    if (!targetPiece) return;

    var startX = targetPiece.trayX + targetPiece.el.offsetWidth / 2 - handEl.offsetWidth * 0.2;
    var startY = targetPiece.trayY + targetPiece.el.offsetHeight / 2 - 35;
    var endX = gridPixel.x + gridPixel.w * 0.3;
    var endY = gridPixel.y + gridPixel.h * 0.3;

    // Animate: start position -> grid
    var duration = 1800;
    var startTime = null;

    function step(timestamp) {
      if (firstPiecePlaced || gameState !== 'playing') {
        handEl.classList.remove('show');
        return;
      }

      if (!startTime) startTime = timestamp;
      var elapsed = timestamp - startTime;
      var progress = Math.min(elapsed / duration, 1);

      // Ease in-out
      var t = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;

      // Pause at start and end
      var phase;
      if (progress < 0.2) {
        // Pause at piece
        phase = 0;
        t = 0;
      } else if (progress < 0.7) {
        // Move to grid
        t = (progress - 0.2) / 0.5;
        t = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      } else {
        // Pause at grid
        t = 1;
      }

      var x = startX + (endX - startX) * t;
      var y = startY + (endY - startY) * t;

      handEl.style.left = x + 'px';
      handEl.style.top = y + 'px';

      if (progress >= 1) {
        // Restart animation
        startTime = null;
      }

      handAnimFrame = requestAnimationFrame(step);
    }

    handAnimFrame = requestAnimationFrame(step);
  }

  // Debug API removed for production

  // ============ START (MRAID lifecycle) ============
  function onDomReady() {
    // Wait for MRAID to be ready before starting
    if (typeof mraid !== 'undefined' && mraid.getState) {
      if (mraid.getState() === 'ready') {
        onMraidReady();
      } else {
        mraid.addEventListener('ready', onMraidReady);
      }
    } else {
      // No mraid (local testing) — start immediately
      init();
    }
  }

  function onMraidReady() {
    if (typeof mraid !== 'undefined' && mraid.removeEventListener) {
      mraid.removeEventListener('ready', onMraidReady);
    }
    // Check if ad is already viewable
    if (typeof mraid !== 'undefined' && mraid.isViewable && mraid.isViewable()) {
      init();
    } else if (typeof mraid !== 'undefined' && mraid.addEventListener) {
      mraid.addEventListener('viewableChange', function onViewable(viewable) {
        if (viewable) {
          mraid.removeEventListener('viewableChange', onViewable);
          init();
        }
      });
    } else {
      init();
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', onDomReady);
  } else {
    onDomReady();
  }

})();
</script>
