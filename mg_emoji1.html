<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Match Villains</title>
<script src="mraid.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,'SF Pro Rounded','Segoe UI',system-ui,sans-serif;background:#eeeef3;color:#2d2d3a;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
#app{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden}
.bg{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(170deg,#f2f2f8 0%,#eaeaf2 50%,#e4e4ee 100%);z-index:0}

/* Logo */
.logo-wrap{position:relative;z-index:4;width:100%;display:flex;justify-content:center;padding:max(env(safe-area-inset-top),44px) 16px 4px;flex-shrink:0}
.logo-img{max-width:220px;height:auto;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.15))}

/* Subtitle */
.subtitle{position:relative;z-index:4;text-align:center;padding:2px 0 0;flex-shrink:0}
.subtitle-text{font-size:15px;font-weight:700;color:#8b8ba0;letter-spacing:1px}

/* Board layout */
.board-wrap{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;width:100%;max-width:360px;padding:8px 10px;background-repeat:no-repeat;background-position:center;background-size:100% 100%}
.board{display:flex;justify-content:space-between;align-items:center;width:100%;height:100%;position:relative}
.col{display:flex;flex-direction:column;gap:18px;justify-content:center;align-items:center;flex:0 0 auto;position:relative}
.col-left{align-items:flex-start}
.col-right{align-items:flex-end}
.col-gap{flex:0;width:16px}

/* Hidden canvas for rendering lines */
#linesCanvas{display:none}

/* Cards */
.card{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;width:clamp(75px,21vw,100px);height:clamp(75px,21vw,100px);border-radius:20px;font-size:clamp(36px,10vw,52px);cursor:pointer;background:#fff;border:3px solid #dcdce4;box-shadow:0 2px 8px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);transition:transform 0.15s,border-color 0.25s,background 0.25s,box-shadow 0.25s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(0.93)}
.card.selected{border-color:#7cc350;background:#f0fae8;box-shadow:0 0 0 4px rgba(124,195,80,0.25),0 2px 8px rgba(0,0,0,0.06);transform:scale(1.06)}
.card.matched{border-color:#7cc350;background:#f0fae8;box-shadow:0 0 0 3px rgba(124,195,80,0.15);pointer-events:none;transform:scale(1)}
.card.wrong{animation:shake 0.4s ease;border-color:#e85d5d;background:#fef0f0}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes matchPop{0%{transform:scale(1)}25%{transform:scale(1.15)}50%{transform:scale(0.95)}100%{transform:scale(1)}}
.card.match-anim{animation:matchPop 0.45s cubic-bezier(0.4,0,0.2,1) forwards}

/* (level-done removed — single level) */

/* (modal removed — redirect on win) */

/* Confetti */
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;z-index:15;pointer-events:none}

/* Tutorial hand */
#tutorialHand{position:fixed;width:38px;height:auto;pointer-events:none;z-index:10;opacity:0;transition:opacity 0.3s;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.2))}
@keyframes handHint{0%{opacity:1}10%{transform:scale(0.85)}20%{transform:scale(1)}50%{opacity:1}100%{opacity:0.7}}

/* Sparkle */
.sparkle{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:5}
@keyframes sparkleAnim{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
</style>
</head>

<script>
/* ====== LEVEL DATA ====== */
const LEVEL = {
  pairs: [["🥷","💎"],["👮","🚓"],["🔑","🔐"]]
};

/* ====== STATE ====== */
let state = {
  selected: null,
  matched: new Set(),
  matchedPairs: [],
  leftOrder: [],
  rightOrder: [],
  moves: 0,
  isProcessing: false
};
let _selLine = null;

/* ====== AUDIO HOOKS ====== */
function playSound(type) {
  // Placeholder — hook up real sounds here
  // types: 'tap', 'match', 'wrong', 'win', 'levelup'
}

/* ====== UTILS ====== */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getCardEl(side, idx) {
  const col = document.getElementById(side === 'left' ? 'colLeft' : 'colRight');
  return col ? col.children[idx] : null;
}

/* Get the edge point of a card for drawing lines */
function getCardEdge(side, idx) {
  const el = getCardEl(side, idx);
  if (!el) return null;
  const wrap = document.getElementById('boardWrap');
  const wr = wrap.getBoundingClientRect();
  const r = el.getBoundingClientRect();
  const cy = r.top - wr.top + r.height / 2;
  if (side === 'left') {
    return { x: r.right - wr.left + 2, y: cy };
  } else {
    return { x: r.left - wr.left - 2, y: cy };
  }
}

/* ====== LINE DRAWING (as background-image, always behind cards) ====== */
function drawCurve(ctx, a, b, color, width, dash) {
  const mx = (a.x + b.x) / 2;
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.bezierCurveTo(mx, a.y, mx, b.y, b.x, b.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.setLineDash(dash || []);
  ctx.stroke();
}

function drawLines() {
  const wrap = document.getElementById('boardWrap');
  const c = document.getElementById('linesCanvas');
  const dpr = window.devicePixelRatio || 1;
  const w = wrap.offsetWidth, h = wrap.offsetHeight;
  c.width = w * dpr;
  c.height = h * dpr;
  const ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  /* Draw matched pair lines */
  state.matchedPairs.forEach(mp => {
    const a = getCardEdge('left', mp.leftIdx);
    const b = getCardEdge('right', mp.rightIdx);
    if (!a || !b) return;
    drawCurve(ctx, a, b, 'rgba(255,255,255,0.7)', 8);
    drawCurve(ctx, a, b, '#7cc350', 4);
  });

  /* Draw in-progress selection line */
  if (_selLine) {
    drawCurve(ctx, _selLine.a, _selLine.b, 'rgba(124,195,80,0.45)', 3, [10, 7]);
  }

  /* Render canvas as background-image — guarantees it's behind all child elements */
  wrap.style.backgroundImage = 'url(' + c.toDataURL() + ')';
}

function drawSelectionLine(s1, i1, s2, i2) {
  const left = s1 === 'left' ? { side: s1, idx: i1 } : { side: s2, idx: i2 };
  const right = s1 === 'right' ? { side: s1, idx: i1 } : { side: s2, idx: i2 };
  const a = getCardEdge(left.side, left.idx);
  const b = getCardEdge(right.side, right.idx);
  if (!a || !b) return;
  _selLine = { a, b };
  drawLines();
}

function clearSelectionLine() {
  _selLine = null;
  drawLines();
}

/* ====== LEVEL MANAGEMENT ====== */
function startLevel() {
  const level = LEVEL;
  state.selected = null;
  state.matched = new Set();
  state.matchedPairs = [];
  state.moves = 0;
  state.isProcessing = false;
  _selLine = null;

  const n = level.pairs.length;
  state.leftOrder = [1, 0, 2];
  state.rightOrder = [2, 1, 0];

  document.getElementById('boardWrap').style.backgroundImage = 'none';
  hideTutorialHand();
  renderBoard();
  setTimeout(showTutorialHand, 500);
}


/* ====== RENDER ====== */
function renderBoard() {
  const level = LEVEL;
  const colLeft = document.getElementById('colLeft');
  const colRight = document.getElementById('colRight');
  colLeft.innerHTML = '';
  colRight.innerHTML = '';

  function makeCard(emoji, side, i, pairIdx) {
    const card = document.createElement('div');
    card.className = 'card';
    card.textContent = emoji;
    card.dataset.side = side;
    card.dataset.idx = i;
    card.dataset.pairIdx = pairIdx;
    if (state.matched.has(pairIdx)) card.classList.add('matched');
    card.addEventListener('click', function() { onCardTap(side, i, pairIdx); });
    return card;
  }

  state.leftOrder.forEach(function(pi, i) {
    colLeft.appendChild(makeCard(level.pairs[pi][0], 'left', i, pi));
  });
  state.rightOrder.forEach(function(pi, i) {
    colRight.appendChild(makeCard(level.pairs[pi][1], 'right', i, pi));
  });

  requestAnimationFrame(function() { drawLines(); });
}

/* ====== TAP HANDLER ====== */
function onCardTap(side, idx, pairIdx) {
  if (state.isProcessing) return;
  if (state.matched.has(pairIdx)) return;
  hideTutorialHand();

  const level = LEVEL;
  const card = getCardEl(side, idx);

  /* Deselect same card */
  if (state.selected && state.selected.side === side && state.selected.idx === idx) {
    state.selected = null;
    card.classList.remove('selected');
    clearSelectionLine();
    playSound('tap');
    return;
  }

  /* First selection */
  if (state.selected === null) {
    state.selected = { side: side, idx: idx, pairIdx: pairIdx };
    card.classList.add('selected');
    playSound('tap');
    return;
  }

  /* Same side — switch selection */
  if (state.selected.side === side) {
    var prev = getCardEl(state.selected.side, state.selected.idx);
    if (prev) prev.classList.remove('selected');
    clearSelectionLine();
    state.selected = { side: side, idx: idx, pairIdx: pairIdx };
    card.classList.add('selected');
    playSound('tap');
    return;
  }

  /* Second selection — different side, check match */
  drawSelectionLine(state.selected.side, state.selected.idx, side, idx);
  card.classList.add('selected');
  state.moves++;

  var firstCard = getCardEl(state.selected.side, state.selected.idx);

  if (state.selected.pairIdx === pairIdx) {
    /* CORRECT MATCH */
    playSound('match');
    state.matched.add(pairIdx);
    var leftIdx = state.selected.side === 'left' ? state.selected.idx : idx;
    var rightIdx = state.selected.side === 'right' ? state.selected.idx : idx;
    state.matchedPairs.push({ leftIdx: leftIdx, rightIdx: rightIdx });

    firstCard.classList.remove('selected');
    card.classList.remove('selected');
    firstCard.classList.add('match-anim');
    card.classList.add('match-anim');
    spawnSparkles(firstCard);
    spawnSparkles(card);

    setTimeout(function() {
      firstCard.classList.remove('match-anim');
      card.classList.remove('match-anim');
      firstCard.classList.add('matched');
      card.classList.add('matched');
      clearSelectionLine();
      drawLines();
    }, 450);

    state.selected = null;

    if (state.matched.size === level.pairs.length) {
      setTimeout(function() { onLevelComplete(); }, 600);
    }
  } else {
    /* WRONG MATCH */
    playSound('wrong');
    state.isProcessing = true;
    firstCard.classList.add('wrong');
    card.classList.add('wrong');

    setTimeout(function() {
      firstCard.classList.remove('selected', 'wrong');
      card.classList.remove('selected', 'wrong');
      clearSelectionLine();
      state.selected = null;
      state.isProcessing = false;
    }, 450);
  }
}

/* ====== SPARKLES ====== */
function spawnSparkles(el) {
  var rect = el.getBoundingClientRect();
  var cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
  var colors = ['#7cc350','#5ab030','#f5a623','#64d2ff','#ff9f43','#a8e06c'];
  for (var i = 0; i < 10; i++) {
    var s = document.createElement('div');
    s.className = 'sparkle';
    var angle = (Math.PI * 2 * i) / 10, dist = 25 + Math.random() * 30;
    s.style.cssText = 'left:' + cx + 'px;top:' + cy + 'px;background:' + colors[i % colors.length] + ';--tx:' + (Math.cos(angle) * dist) + 'px;--ty:' + (Math.sin(angle) * dist) + 'px;animation:sparkleAnim 0.5s ease-out forwards;';
    document.body.appendChild(s);
    setTimeout((function(el) { return function() { el.remove(); }; })(s), 500);
  }
}

/* ====== LEVEL COMPLETE / WIN ====== */
function onLevelComplete() {
  playSound('win');
  fireConfetti();
  /* Redirect to store after a short celebration delay */
  setTimeout(function() { openStore(); }, 800);
}

/* ====== CONFETTI ====== */
function fireConfetti() {
  var canvas = document.getElementById('confetti');
  var ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  var particles = [];
  var colors = ['#7cc350','#5ab030','#f5a623','#64d2ff','#ff9f43','#a855f7','#ff6b9d'];
  for (var i = 0; i < 100; i++) {
    particles.push({
      x: canvas.width / 2 + (Math.random() - 0.5) * 160,
      y: canvas.height * 0.4,
      vx: (Math.random() - 0.5) * 14,
      vy: -Math.random() * 15 - 5,
      size: Math.random() * 7 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 12,
      life: 1
    });
  }
  var frame;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var alive = false;
    particles.forEach(function(p) {
      if (p.life <= 0) return;
      alive = true;
      p.x += p.vx; p.vy += 0.35; p.y += p.vy;
      p.rotation += p.rotSpeed; p.life -= 0.012;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
      ctx.restore();
    });
    if (alive) frame = requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  if (frame) cancelAnimationFrame(frame);
  animate();
}


/* ====== TUTORIAL HAND ====== */
var _handAnim = null;
var _handActive = false;

function showTutorialHand() {
  var pairIdx = state.leftOrder[0];
  var leftIdx = 0;
  var rightIdx = state.rightOrder.indexOf(pairIdx);
  if (rightIdx < 0) return;

  var leftCard = getCardEl('left', leftIdx);
  var rightCard = getCardEl('right', rightIdx);
  if (!leftCard || !rightCard) return;

  var hand = document.getElementById('tutorialHand');
  _handActive = true;
  hand.style.opacity = '0';

  function animateLoop() {
    if (!_handActive) return;
    var lr = leftCard.getBoundingClientRect();
    var rr = rightCard.getBoundingClientRect();
    var sx = lr.left + lr.width / 2 - 10, sy = lr.top + lr.height / 2 + 5;
    var ex = rr.left + rr.width / 2 - 10, ey = rr.top + rr.height / 2 + 5;

    hand.style.transition = 'none';
    hand.style.left = sx + 'px';
    hand.style.top = sy + 'px';
    hand.style.opacity = '1';
    hand.style.transform = 'scale(1)';

    setTimeout(function() {
      if (!_handActive) return;
      hand.style.transition = 'transform 0.15s ease';
      hand.style.transform = 'scale(0.8)';
      setTimeout(function() {
        if (!_handActive) return;
        hand.style.transform = 'scale(1)';
        setTimeout(function() {
          if (!_handActive) return;
          hand.style.transition = 'left 0.6s ease-in-out, top 0.6s ease-in-out';
          hand.style.left = ex + 'px';
          hand.style.top = ey + 'px';
          setTimeout(function() {
            if (!_handActive) return;
            hand.style.transition = 'transform 0.15s ease';
            hand.style.transform = 'scale(0.8)';
            setTimeout(function() {
              if (!_handActive) return;
              hand.style.transform = 'scale(1)';
              setTimeout(function() {
                if (!_handActive) return;
                hand.style.transition = 'opacity 0.3s';
                hand.style.opacity = '0';
                _handAnim = setTimeout(animateLoop, 600);
              }, 300);
            }, 150);
          }, 650);
        }, 200);
      }, 150);
    }, 400);
  }

  _handAnim = setTimeout(animateLoop, 800);
}

function hideTutorialHand() {
  if (!_handActive) return;
  _handActive = false;
  if (_handAnim) clearTimeout(_handAnim);
  var hand = document.getElementById('tutorialHand');
  hand.style.transition = 'opacity 0.2s';
  hand.style.opacity = '0';
}

/* ====== MRAID HELPERS ====== */
var IOS_URL = 'https://apps.apple.com/tr/app/match-villains/id6479752688';
var ANDROID_URL = 'https://play.google.com/store/apps/details?id=com.goodjobgames.matchvillains&hl=en';

function getStoreUrl() {
  var ua = navigator.userAgent || '';
  return /iPad|iPhone|iPod|Macintosh/i.test(ua) ? IOS_URL : ANDROID_URL;
}

function openStore() {
  var url = getStoreUrl();
  if (typeof mraid !== 'undefined' && mraid.open) {
    mraid.open(url);
  } else {
    window.open(url, '_blank');
  }
}

/* ====== INIT ====== */
function initGame() {
  startLevel();
  window.addEventListener('resize', function() {
    renderBoard();
  });
}

/* Wait for MRAID ready before starting */
if (typeof mraid !== 'undefined') {
  if (mraid.getState() === 'loading') {
    mraid.addEventListener('ready', function() {
      initGame();
    });
  } else {
    initGame();
  }
} else {
  /* No MRAID (testing in browser) — start immediately */
  initGame();
}
