<script>
(function(){
'use strict';
var IOS='https://apps.apple.com/tr/app/match-villains/id6479752688';
var AND='https://play.google.com/store/apps/details?id=com.goodjobgames.matchvillains&hl=en';
var T=[{id:1,x:30,y:2.8,r:5.5},{id:2,x:33,y:15.5,r:5.5},{id:3,x:55,y:45,r:5.5},{id:4,x:10,y:76,r:5.5},{id:5,x:92,y:66,r:5.5},{id:6,x:57,y:68,r:5.5}];
var TOT=6,found={},fc=0,taps=0,locked=false;
var img=document.getElementById('mall'),wrap=document.getElementById('img-wrap'),fcEl=document.querySelector('.fc');

function CTA(){var u=/iPhone|iPad|iPod/i.test(navigator.userAgent)?IOS:AND;try{window.mraid&&mraid.open?mraid.open(u):window.open(u,'_blank')}catch(e){window.open(u,'_blank')}}

function imgRect(){
  var area=document.getElementById('img-area');
  var aW=area.clientWidth,aH=area.clientHeight;
  var iR=832/1280;
  var w,h;
  if(aW/aH>iR){h=aH;w=h*iR}else{w=aW;h=w/iR}
  var ox=(aW-w)/2,oy=(aH-h)/2;
  return{x:ox,y:oy,w:w,h:h}
}

function circle(t){
  var r=imgRect();
  var cx=r.x+(t.x/100)*r.w;
  var cy=r.y+(t.y/100)*r.h;
  var rad=(t.r/100)*r.w;
  var el=document.createElement('div');
  el.className='circle';
  el.style.left=(cx-rad)+'px';
  el.style.top=(cy-rad)+'px';
  el.style.width=(rad*2)+'px';
  el.style.height=(rad*2)+'px';
  wrap.appendChild(el);
  requestAnimationFrame(function(){el.classList.add('found')});
}

function tap(cx,cy){
  if(locked){CTA();return}
  var r=imgRect();
  var lx=cx-r.x,ly=cy-r.y;
  if(lx<0||ly<0||lx>r.w||ly>r.h)return;
  var px=(lx/r.w)*100,py=(ly/r.h)*100;
  for(var i=0;i<T.length;i++){
    var t=T[i];if(found[t.id])continue;
    var d=Math.sqrt(Math.pow(px-t.x,2)+Math.pow(py-t.y,2));
    if(d<=t.r*1.3){
      found[t.id]=true;fc++;taps++;fcEl.textContent=fc;
      circle(t);
      if(taps>=3){locked=true;CTA()}
      return;
    }
  }
}

var sx=0,sy=0;
wrap.addEventListener('touchstart',function(e){if(e.touches.length===1){sx=e.touches[0].clientX;sy=e.touches[0].clientY}},{passive:true});
wrap.addEventListener('touchend',function(e){
  if(e.changedTouches.length===1){
    var t=e.changedTouches[0];
    if(Math.sqrt(Math.pow(t.clientX-sx,2)+Math.pow(t.clientY-sy,2))<10){
      e.preventDefault();
      var rect=wrap.getBoundingClientRect();
      tap(t.clientX-rect.left,t.clientY-rect.top);
    }
  }
},{passive:false});
wrap.addEventListener('click',function(e){var rect=wrap.getBoundingClientRect();tap(e.clientX-rect.left,e.clientY-rect.top)});

var lt=0;document.addEventListener('touchend',function(e){var n=Date.now();if(n-lt<300)e.preventDefault();lt=n},{passive:false});

var hdr=document.getElementById('header');
function posHeader(){
  var r=imgRect();
  hdr.style.top=Math.max(0,r.y-hdr.offsetHeight-15)+'px';
}
img.onload=posHeader;
window.addEventListener('resize',posHeader);
posHeader();

if(window.mraid){if(mraid.getState()==='loading'){mraid.addEventListener('ready',function(){})}}
})();
</script>
